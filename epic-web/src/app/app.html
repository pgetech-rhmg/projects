<div class="page">
  <header class="page-header">
    <div class="header-brand">
      <h1>EPIC</h1>
      <p class="subtitle">Enterprise Pipeline for Infrastructure &amp; Cloud</p>
    </div>
    <div class="header-user">
      <div class="avatar">RM</div>
      <div class="user-info">
        <span class="welcome">Welcome</span>
        <span class="user-name">Robb Morgan</span>
      </div>
    </div>
  </header>

  <main class="page-content">
    <div class="section-header">
      <h2>My Apps</h2>
      <button class="add-btn" (click)="onAddApp()" title="Add new app">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        New App
      </button>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>App Name</th>
            <th>Technology</th>
            <th>Last Pipeline Run</th>
            <th>Cloud</th>
            <th>Environment</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          @for (app of apps(); track app.name) {
            <tr>
              <td class="app-name">{{ app.name }}</td>
              <td>
                <span class="badge badge--tech">{{ app.technology }}</span>
              </td>
              <td class="timestamp">{{ app.lastPipelineRun }}</td>
              <td>
                <span class="badge badge--cloud badge--cloud-{{ app.cloud | lowercase }}">
                  {{ app.cloud }}
                </span>
              </td>
              <td>
                <span class="badge badge--env badge--env-{{ app.environment }}">
                  {{ app.environment }}
                </span>
              </td>
              <td class="actions">
                <button class="icon-btn" (click)="onEdit(app)" title="Manage {{ app.name }}">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                  </svg>
                </button>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </main>
</div>

<router-outlet />
