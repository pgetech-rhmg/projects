jobs:
- job: DeployJob
  displayName: "Deploy App"
  pool:
    vmImage: ubuntu-latest
    
  workspace:
    clean: all

  #############################################################################
  # Steps
  #############################################################################
  steps:

    ###########################################################################
    # Download App Source (for cloud config)
    ###########################################################################
    - task: DownloadPipelineArtifact@2
      displayName: "Download app source"
      inputs:
        artifactName: epic-app
        targetPath: "$(System.DefaultWorkingDirectory)/${{ parameters.appName }}"


    ###########################################################################
    # Read Cloud Config
    ###########################################################################
    - bash: |
        set -euo pipefail

        CONFIG="$(System.DefaultWorkingDirectory)/${{ parameters.appName }}/.pipeline/epic.json"

        echo ">> Reading cloud config from $CONFIG"

        AWS_ACCOUNT_ID=$(jq -r '.cloud.awsAccountId' "$CONFIG")
        AWS_REGION=$(jq -r '.cloud.awsRegion // "us-west-2"' "$CONFIG")

        if [ -z "$AWS_ACCOUNT_ID" ] || [ "$AWS_ACCOUNT_ID" = "null" ]; then
          echo "##vso[task.logissue type=error]cloud.awsAccountId is required in epic.json"
          exit 1
        fi

        echo "##vso[task.setvariable variable=CLOUD_AWS_ACCOUNT_ID]$AWS_ACCOUNT_ID"
        echo "##vso[task.setvariable variable=CLOUD_AWS_REGION]$AWS_REGION"
        echo "##vso[task.setvariable variable=CLOUD_S3]$(jq -r '.cloud.s3 // empty' "$CONFIG")"
        echo "##vso[task.setvariable variable=CLOUD_CLOUDFRONT]$(jq -r '.cloud.cloudfront // empty' "$CONFIG")"
        echo "##vso[task.setvariable variable=CLOUD_EC2_INSTANCE_ID]$(jq -r '.cloud.ec2InstanceId // empty' "$CONFIG")"
        echo "##vso[task.setvariable variable=CLOUD_APP_EXECUTABLE]$(jq -r '.cloud.appExecutable // empty' "$CONFIG")"
      displayName: 'Read cloud config'


    ###########################################################################
    # Download Build Artifact
    ###########################################################################
    - task: DownloadPipelineArtifact@2
      displayName: "Download build artifact"
      inputs:
        artifactName: epic-build
        targetPath: "$(System.DefaultWorkingDirectory)/${{ parameters.appName }}/${{ parameters.codePath }}/.build"


    ###########################################################################
    # Download Output File
    ###########################################################################
    - task: DownloadPipelineArtifact@2
      displayName: "Download output file"
      inputs:
        artifactName: terraform-outputs
        targetPath: "$(System.DefaultWorkingDirectory)/${{ parameters.appName }}/${{ parameters.codePath }}/.terraform"


    ###########################################################################
    # Deploy - HTML (static), Angular (node)
    ###########################################################################
    - ${{ if or(eq(parameters.appType, 'html'), eq(parameters.appType, 'angular')) }}:
      - template: basic/main.yml
        parameters:
          ${{ insert }}: ${{ parameters }}
          terraformOutputPath: "$(System.DefaultWorkingDirectory)/${{ parameters.appName }}/${{ parameters.codePath }}/.terraform/output.json"


    ###########################################################################
    # Deploy - Dynamic (appType)
    ###########################################################################
    - ${{ if and(ne(parameters.appType, 'html'), ne(parameters.appType, 'angular')) }}:
      - template: ${{ parameters.appType }}/main.yml
        parameters:
          ${{ insert }}: ${{ parameters }}
          terraformOutputPath: "$(System.DefaultWorkingDirectory)/${{ parameters.appName }}/${{ parameters.codePath }}/.terraform/output.json"
