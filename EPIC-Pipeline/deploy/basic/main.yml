###############################################################################
# Steps
###############################################################################
steps:

  #############################################################################
  # Deploy
  #############################################################################
  - task: AWSShellScript@1
    inputs:
      awsCredentials: 'AWS'
      regionName: 'us-west-2'
      scriptType: 'inline'
      arguments: ${{ parameters.awsAccountId }}
      inlineScript: |
        set -euo pipefail
        
        AWS_ACCOUNT_ID=$1
        
        # Assume the app account role using EPIC credentials
        CREDS=$(aws sts assume-role \
          --role-arn "arn:aws:iam::$AWS_ACCOUNT_ID:role/pge-epic-deployment-role" \
          --role-session-name "PGE-EPIC-DEPLOY-ADO-$(Build.BuildId)" \
          --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
          --output text)
        
        export AWS_ACCESS_KEY_ID=$(echo $CREDS | cut -d' ' -f1)
        export AWS_SECRET_ACCESS_KEY=$(echo $CREDS | cut -d' ' -f2)
        export AWS_SESSION_TOKEN=$(echo $CREDS | cut -d' ' -f3)
        
        echo "Deploying ${{ parameters.appType }}..."
        
        BUILD_PATH="$(System.DefaultWorkingDirectory)/${{ parameters.appName }}/${{ parameters.codePath }}/.build"
        BUCKET_NAME="${{ parameters.s3 }}"
        DISTRIBUTION_ID="${{ parameters.cloudfront }}"
        
        echo "Syncing to S3..."
        aws s3 sync "$BUILD_PATH" "s3://$BUCKET_NAME" --delete
        
        echo "Invalidating CloudFront..."
        aws cloudfront create-invalidation \
          --distribution-id "$DISTRIBUTION_ID" \
          --paths "/*"
        
        echo "Deployment complete."
    displayName: "Deploy ${{ parameters.appType }}"
