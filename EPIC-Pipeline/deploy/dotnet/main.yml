###############################################################################
# Steps
###############################################################################
steps:

  #############################################################################
  # Zip Published Output
  #############################################################################
  - bash: |
      set -euo pipefail

      echo "Zipping build files..."

      BUILD_PATH="$(System.DefaultWorkingDirectory)/${{ parameters.appName }}/${{ parameters.codePath }}/.build"

      cd "$BUILD_PATH"

      zip -r ../deploy.zip .
    displayName: "Create Deployment ZIP"


  #############################################################################
  # Check for EF Core Migration Bundle
  #############################################################################
  - bash: |
      BUILD_PATH="$(System.DefaultWorkingDirectory)/${{ parameters.appName }}/${{ parameters.codePath }}/.build"
      if [ -f "$BUILD_PATH/efbundle" ]; then
        echo ">> EF Core migration bundle found"
        echo "##vso[task.setvariable variable=EF_BUNDLE_EXISTS]true"
      else
        echo ">> No EF Core migration bundle — migrations will be skipped"
        echo "##vso[task.setvariable variable=EF_BUNDLE_EXISTS]false"
      fi
    displayName: 'Check for EF migration bundle'


  #############################################################################
  # Parse Output File (if available)
  #############################################################################
  - bash: |
      if [ -f "${{ parameters.terraformOutputPath }}" ]; then
        BUCKET_NAME=$(cat "${{ parameters.terraformOutputPath }}" | jq -r '.bucket_name.value // empty')
        INSTANCE_ID=$(cat "${{ parameters.terraformOutputPath }}" | jq -r '.instance_id.value // empty')
      fi

      S3=${BUCKET_NAME:-$(CLOUD_S3)}
      EC2=${INSTANCE_ID:-$(CLOUD_EC2_INSTANCE_ID)}

      echo "##vso[task.setvariable variable=BUCKET_NAME]$S3"
      echo "##vso[task.setvariable variable=INSTANCE_ID]$EC2"
    displayName: 'Parse output file'


  #############################################################################
  # Wait for EC2 Instance Ready
  #############################################################################
  - task: AWSShellScript@1
    displayName: 'Wait for EC2 Instance Ready'
    inputs:
      awsCredentials: 'AWS'
      arguments: $(CLOUD_AWS_ACCOUNT_ID)
      regionName: $(CLOUD_AWS_REGION)
      scriptType: 'inline'
      inlineScript: |
        set -euo pipefail

        AWS_ACCOUNT_ID=$1

        CREDS=$(aws sts assume-role \
          --role-arn "arn:aws:iam::$AWS_ACCOUNT_ID:role/pge-epic-deployment-role" \
          --role-session-name "PGE-EPIC-DEPLOY-ADO-$(Build.BuildId)" \
          --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
          --output text)

        export AWS_ACCESS_KEY_ID=$(echo $CREDS | cut -d' ' -f1)
        export AWS_SECRET_ACCESS_KEY=$(echo $CREDS | cut -d' ' -f2)
        export AWS_SESSION_TOKEN=$(echo $CREDS | cut -d' ' -f3)

        INSTANCE_ID="$(INSTANCE_ID)"

        echo "Waiting for EC2 instance $INSTANCE_ID to pass status checks..."
        aws ec2 wait instance-status-ok --instance-ids "$INSTANCE_ID"

        echo "Waiting for SSM agent to register..."
        timeout 300 bash -c "
          until aws ssm describe-instance-information \
            --filters Key=InstanceIds,Values=$INSTANCE_ID \
            --query 'InstanceInformationList[0].PingStatus' \
            --output text 2>/dev/null | grep -q Online; do
            echo 'SSM agent not ready yet...'
            sleep 10
          done
        "

        echo "Instance ready."


  #############################################################################
  # Upload to S3
  #############################################################################
  - task: AWSShellScript@1
    displayName: "Upload ZIP to S3"
    inputs:
      awsCredentials: 'AWS'
      arguments: $(CLOUD_AWS_ACCOUNT_ID)
      regionName: $(CLOUD_AWS_REGION)
      scriptType: 'inline'
      inlineScript: |
        set -euo pipefail

        AWS_ACCOUNT_ID=$1

        CREDS=$(aws sts assume-role \
          --role-arn "arn:aws:iam::$AWS_ACCOUNT_ID:role/pge-epic-deployment-role" \
          --role-session-name "PGE-EPIC-DEPLOY-ADO-$(Build.BuildId)" \
          --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
          --output text)

        export AWS_ACCESS_KEY_ID=$(echo $CREDS | cut -d' ' -f1)
        export AWS_SECRET_ACCESS_KEY=$(echo $CREDS | cut -d' ' -f2)
        export AWS_SESSION_TOKEN=$(echo $CREDS | cut -d' ' -f3)

        echo "Deploying zip file..."

        ZIP_PATH="$(System.DefaultWorkingDirectory)/${{ parameters.appName }}/${{ parameters.codePath }}/deploy.zip"
        S3_BUCKET="$(BUCKET_NAME)"

        aws s3 cp "$ZIP_PATH" "s3://$S3_BUCKET/${{ parameters.appName }}.zip"


  #############################################################################
  # Run EF Core Migrations (optional — if efbundle exists in build artifact)
  #############################################################################
  - task: AWSShellScript@1
    displayName: "Run EF Core migrations"
    condition: and(succeeded(), eq(variables['EF_BUNDLE_EXISTS'], 'true'))
    inputs:
      awsCredentials: 'AWS'
      arguments: $(CLOUD_AWS_ACCOUNT_ID)
      regionName: $(CLOUD_AWS_REGION)
      scriptType: 'inline'
      inlineScript: |
        set -euo pipefail

        AWS_ACCOUNT_ID=$1

        CREDS=$(aws sts assume-role \
          --role-arn "arn:aws:iam::$AWS_ACCOUNT_ID:role/pge-epic-deployment-role" \
          --role-session-name "PGE-EPIC-DEPLOY-ADO-$(Build.BuildId)" \
          --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
          --output text)

        export AWS_ACCESS_KEY_ID=$(echo $CREDS | cut -d' ' -f1)
        export AWS_SECRET_ACCESS_KEY=$(echo $CREDS | cut -d' ' -f2)
        export AWS_SESSION_TOKEN=$(echo $CREDS | cut -d' ' -f3)

        INSTANCE_ID="$(INSTANCE_ID)"
        S3_BUCKET="$(BUCKET_NAME)"
        APP_NAME="${{ parameters.appName }}"

        echo "Running EF Core migrations on $INSTANCE_ID"

        COMMAND_ID=$(aws ssm send-command \
          --instance-ids "$INSTANCE_ID" \
          --document-name "AWS-RunShellScript" \
          --comment "EF Core migrations for $APP_NAME (Build $(Build.BuildId))" \
          --parameters commands="[
            \"set -e\",
            \"cd /opt/$APP_NAME\",
            \"sudo aws s3 cp s3://$S3_BUCKET/$APP_NAME.zip /opt/$APP_NAME/\",
            \"sudo unzip -o /opt/$APP_NAME/$APP_NAME.zip -d /opt/$APP_NAME/app\",
            \"if [ -f /opt/$APP_NAME/app/efbundle ]; then\",
            \"  echo 'Running migration bundle...'\",
            \"  sudo chmod +x /opt/$APP_NAME/app/efbundle\",
            \"  source /etc/systemd/system/$APP_NAME-api.service 2>/dev/null || true\",
            \"  CONNECTION_STRING=$(grep 'ConnectionStrings__' /etc/systemd/system/$APP_NAME-api.service | sed 's/.*ConnectionStrings__EpicDb=//' | head -1)\",
            \"  sudo /opt/$APP_NAME/app/efbundle --connection \\\"$CONNECTION_STRING\\\"\",
            \"  echo 'Migrations complete'\",
            \"else\",
            \"  echo 'No efbundle found — skipping migrations'\",
            \"fi\"
          ]" \
          --query 'Command.CommandId' \
          --output text)

        echo "SSM Command ID: $COMMAND_ID"

        aws ssm wait command-executed \
          --command-id "$COMMAND_ID" \
          --instance-id "$INSTANCE_ID"

        echo "EF Core migrations complete."


  #############################################################################
  # Deploy to EC2 via SSM (.NET)
  #############################################################################
  - task: AWSShellScript@1
    displayName: "Deploy to EC2 via SSM (.NET)"
    inputs:
      awsCredentials: 'AWS'
      arguments: $(CLOUD_AWS_ACCOUNT_ID)
      regionName: $(CLOUD_AWS_REGION)
      scriptType: 'inline'
      inlineScript: |
        set -euo pipefail

        AWS_ACCOUNT_ID=$1

        CREDS=$(aws sts assume-role \
          --role-arn "arn:aws:iam::$AWS_ACCOUNT_ID:role/pge-epic-deployment-role" \
          --role-session-name "PGE-EPIC-DEPLOY-ADO-$(Build.BuildId)" \
          --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
          --output text)

        export AWS_ACCESS_KEY_ID=$(echo $CREDS | cut -d' ' -f1)
        export AWS_SECRET_ACCESS_KEY=$(echo $CREDS | cut -d' ' -f2)
        export AWS_SESSION_TOKEN=$(echo $CREDS | cut -d' ' -f3)

        INSTANCE_ID="$(INSTANCE_ID)"
        S3_BUCKET="$(BUCKET_NAME)"
        APP_NAME="${{ parameters.appName }}"
        APP_EXECUTABLE="$(CLOUD_APP_EXECUTABLE)"

        echo "Deploying to EC2: $INSTANCE_ID"

        COMMAND_ID=$(aws ssm send-command \
          --instance-ids "$INSTANCE_ID" \
          --document-name "AWS-RunShellScript" \
          --comment "Deploy $APP_NAME" \
          --parameters commands="[
            \"set -e\",
            \"sudo mkdir -p /opt/$APP_NAME\",
            \"cd /opt/$APP_NAME && sudo rm -rf app\",
            \"sudo mkdir -p /opt/$APP_NAME/app\",
            \"sudo aws s3 cp s3://$S3_BUCKET/$APP_NAME.zip /opt/$APP_NAME/\",
            \"sudo unzip -o /opt/$APP_NAME/$APP_NAME.zip -d /opt/$APP_NAME/app\",
            \"sudo chmod +x /opt/$APP_NAME/app/$APP_EXECUTABLE\",
            \"sudo systemctl daemon-reload\",
            \"sudo systemctl stop $APP_NAME || true\",
            \"sudo systemctl start $APP_NAME\",
            \"sudo systemctl is-active $APP_NAME\"
          ]" \
          --query 'Command.CommandId' \
          --output text)

        echo "SSM Command ID: $COMMAND_ID"

        aws ssm wait command-executed \
          --command-id "$COMMAND_ID" \
          --instance-id "$INSTANCE_ID"

        echo "Deployment complete."
