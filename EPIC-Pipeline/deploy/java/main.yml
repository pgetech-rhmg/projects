###############################################################################
# Steps
###############################################################################
steps:

  #############################################################################
  # Zip Published Output
  #############################################################################
  - bash: |
      set -euo pipefail

      echo "Zipping build files..."

      BUILD_PATH="$(System.DefaultWorkingDirectory)/${{ parameters.appName }}/${{ parameters.codePath }}/.build"

      cd "$BUILD_PATH"

      zip -r ../deploy.zip .
    displayName: "Create Deployment ZIP"


  #############################################################################
  # Parse Output File (if available)
  #############################################################################
  - bash: |
      if [ -f "${{ parameters.terraformOutputPath }}" ]; then
        BUCKET_NAME=$(cat "${{ parameters.terraformOutputPath }}" | jq -r '.bucket_name.value // empty')
        INSTANCE_ID=$(cat "${{ parameters.terraformOutputPath }}" | jq -r '.instance_id.value // empty')
      fi

      S3=${BUCKET_NAME:-${{ parameters.s3 }}}
      EC2=${INSTANCE_ID:-${{ parameters.ec2InstanceId }}}

      echo "##vso[task.setvariable variable=BUCKET_NAME]$S3"
      echo "##vso[task.setvariable variable=INSTANCE_ID]$EC2"
    displayName: 'Parse output file'


  #############################################################################
  # Upload to S3
  #############################################################################
  - task: AWSShellScript@1
    inputs:
      awsCredentials: 'AWS'
      arguments: ${{ parameters.awsAccountId }}
      regionName: ${{ parameters.awsRegion }}
      scriptType: 'inline'
      inlineScript: |
        set -euo pipefail
        
        AWS_ACCOUNT_ID=$1
        
        # Assume the app account role using EPIC credentials
        CREDS=$(aws sts assume-role \
          --role-arn "arn:aws:iam::$AWS_ACCOUNT_ID:role/pge-epic-deployment-role" \
          --role-session-name "PGE-EPIC-DEPLOY-ADO-$(Build.BuildId)" \
          --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
          --output text)
        
        export AWS_ACCESS_KEY_ID=$(echo $CREDS | cut -d' ' -f1)
        export AWS_SECRET_ACCESS_KEY=$(echo $CREDS | cut -d' ' -f2)
        export AWS_SESSION_TOKEN=$(echo $CREDS | cut -d' ' -f3)
        
        echo "Deploying zip file..."
        
        ZIP_PATH="$(System.DefaultWorkingDirectory)/${{ parameters.appName }}/${{ parameters.codePath }}/deploy.zip"
        S3_BUCKET="$(BUCKET_NAME)"
        
        aws s3 cp "$ZIP_PATH" "s3://$S3_BUCKET/${{ parameters.appName }}.zip"
    displayName: "Upload ZIP to S3"


  #############################################################################
  # Deploy to EC2 via SSM
  #############################################################################
  - task: AWSShellScript@1
    inputs:
      awsCredentials: 'AWS'
      arguments: ${{ parameters.awsAccountId }}
      regionName: ${{ parameters.awsRegion }}
      scriptType: 'inline'
      inlineScript: |
        set -euo pipefail
        
        AWS_ACCOUNT_ID=$1
        
        # Assume the app account role using EPIC credentials
        CREDS=$(aws sts assume-role \
          --role-arn "arn:aws:iam::$AWS_ACCOUNT_ID:role/pge-epic-deployment-role" \
          --role-session-name "PGE-EPIC-DEPLOY-ADO-$(Build.BuildId)" \
          --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
          --output text)
        
        export AWS_ACCESS_KEY_ID=$(echo $CREDS | cut -d' ' -f1)
        export AWS_SECRET_ACCESS_KEY=$(echo $CREDS | cut -d' ' -f2)
        export AWS_SESSION_TOKEN=$(echo $CREDS | cut -d' ' -f3)
        
        echo "Deploying ${{ parameters.appType }}..."
        
        INSTANCE_ID="$(INSTANCE_ID)"
        S3_BUCKET="$(BUCKET_NAME)"
        APP_NAME="${{ parameters.appName }}"
        
        echo "Deploying to EC2: $INSTANCE_ID"
        
        aws ssm send-command \
          --instance-ids "$INSTANCE_ID" \
          --document-name "AWS-RunShellScript" \
          --comment "Deploy $APP_NAME" \
          --parameters commands="[
            \"set -e\",
            \"sudo mkdir -p /opt/$APP_NAME\",
            \"cd /opt/$APP_NAME\",
            \"sudo rm -rf app\",
            \"sudo mkdir -p app\",
            \"sudo aws s3 cp s3://$S3_BUCKET/$APP_NAME.zip .\",
            \"sudo unzip -o $APP_NAME.zip -d app\",
            \"sudo systemctl daemon-reload\",
            \"sudo systemctl stop $APP_NAME || true\",
            \"sudo systemctl start $APP_NAME\"
          ]"
        
        echo "Deployment complete."
    displayName: "Deploy to EC2 via SSM (Java)"