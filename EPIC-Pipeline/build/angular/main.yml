###############################################################################
# Steps
###############################################################################
steps:

  #############################################################################
  # Use Node Version
  #############################################################################
  - task: NodeTool@0
    displayName: "Use Node ${{ parameters.nodeVersion }}"
    inputs:
      versionSpec: "${{ parameters.nodeVersion }}"


  #############################################################################
  # Verify Node
  #############################################################################
  - bash: |
      set -euo pipefail

      node --version
      npm --version
    displayName: "Verify Node"


  # #############################################################################
  # # Configure npm registry
  # #############################################################################
  # - bash: |
  #     set -euo pipefail

  #     NPMRC="$(System.DefaultWorkingDirectory)/${{ parameters.appName }}/${{ parameters.codePath }}/.npmrc"

  #     echo "registry=https://jfrog.io.pge.com/artifactory/ccoe-cicd-prod-npm-virtual/" > "$NPMRC"
  #     echo "always-auth=true" >> "$NPMRC"

  #     echo ">> .npmrc written"
  #   displayName: "Configure npm registry"


  # #############################################################################
  # # Authenticate with JFrog npm
  # #############################################################################
  # - task: npmAuthenticate@0
  #   displayName: "Authenticate with JFrog npm"
  #   inputs:
  #     workingFile: "$(System.DefaultWorkingDirectory)/${{ parameters.appName }}/${{ parameters.codePath }}/.npmrc"
  #     customEndpoint: "JFrog"


  #############################################################################
  # Install Dependencies
  #############################################################################
  - bash: |
      set -euo pipefail

      cd "$(System.DefaultWorkingDirectory)/${{ parameters.appName }}/${{ parameters.codePath }}"

      echo ">> Installing dependencies"
      npm install
    displayName: "Install dependencies"


  #############################################################################
  # Build
  #############################################################################
  - bash: |
      set -euo pipefail

      cd "$(System.DefaultWorkingDirectory)/${{ parameters.appName }}/${{ parameters.codePath }}"

      echo ">> Building app"
      npm run build
      
      rm -rf .build/*
      cp -R dist/. .build/
    displayName: "Build app"
