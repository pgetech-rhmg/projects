###############################################################################
# Steps
###############################################################################
steps:

  #############################################################################
  # Set Java Version
  #############################################################################
  - task: JavaToolInstaller@0
    displayName: "Use Java ${{ coalesce(parameters.runtimeVersion, variables.defaultRuntimeVersion) }}"
    inputs:
      versionSpec: "${{ coalesce(parameters.runtimeVersion, variables.defaultRuntimeVersion) }}"
      jdkArchitectureOption: "x64"
      jdkSourceOption: "PreInstalled"


  #############################################################################
  # Verify Java & Build Tool
  #############################################################################
  - bash: |
      set -euo pipefail

      echo ">> Java version"
      java -version

      ${{ if eq(parameters.buildType, 'maven') }}:
      echo ">> Maven version"
      mvn -version
      ${{ elseif eq(parameters.buildType, 'gradle') }}:
      echo ">> Gradle version"
      gradle -version
      ${{ endif }}
    displayName: "Verify Java & Build Tool"


  #############################################################################
  # Build JAR (Maven)
  #############################################################################
  - ${{ if eq(parameters.buildType, 'maven') }}:
    # - task: JFrogMaven@1
    #   displayName: "Build JAR (Maven)"
    #   inputs:
    #     mavenPomFile: "$(System.DefaultWorkingDirectory)/${{ parameters.appName }}/${{ parameters.codePath }}/pom.xml"
    #     goals: "clean package -DskipTests"
    #     artifactoryResolverService: "JFrog"
    #     targetResolveReleaseRepo: "ccoe-cicd-prod-maven-virtual"
    #     targetResolveSnapshotRepo: "ccoe-cicd-prod-maven-virtual"

    - bash: |
        set -euo pipefail

        cd "$(System.DefaultWorkingDirectory)/${{ parameters.appName }}/${{ parameters.codePath }}"

        echo ">> Building JAR with Maven"
        mvn clean package -DskipTests

        echo ">> Preparing .build output"
        mkdir -p .build
        cp target/*.jar .build/
      displayName: "Build JAR (Maven)"


  #############################################################################
  # Build JAR (Gradle)
  #############################################################################
  - ${{ if eq(parameters.buildType, 'gradle') }}:
    # - task: JFrogGradle@1
    #   displayName: "Build JAR (Gradle)"
    #   inputs:
    #     gradleBuildFile: "$(System.DefaultWorkingDirectory)/${{ parameters.appName }}/${{ parameters.codePath }}/build.gradle"
    #     tasks: "clean build -x test"
    #     artifactoryResolverService: "JFrog"
    #     targetResolveRepo: "ccoe-cicd-prod-maven-virtual"

    - bash: |
        set -euo pipefail

        cd "$(System.DefaultWorkingDirectory)/${{ parameters.appName }}/${{ parameters.codePath }}"

        echo ">> Building JAR with Gradle"
        gradle clean build -x test

        echo ">> Preparing .build output"
        mkdir -p .build
        cp build/libs/*.jar .build/
      displayName: "Build JAR (Gradle)"
