###############################################################################
# Steps
###############################################################################
steps:

  #############################################################################
  # Initialize build artifact
  #############################################################################
  - bash: |
      set -euo pipefail

      cd "$(System.DefaultWorkingDirectory)/${{ parameters.appName }}/${{ parameters.codePath }}"

      rm -rf .build

      mkdir .build

      rsync -a --exclude=".build" ./ .build/

      cd .build

      rm -f .gitignore
      rm -f requirements-dev.txt
      rm -rf tests
      rm -rf .pipeline
    displayName: "Pre-load .build"


  #############################################################################
  # Set Python Version
  #############################################################################
  - task: UsePythonVersion@0
    displayName: "Use Python ${{ parameters.pythonVersion }}"
    inputs:
      versionSpec: "${{ parameters.pythonVersion }}"
      addToPath: true


  #############################################################################
  # Verify Python
  #############################################################################
  - bash: |
      set -euo pipefail

      cd "$(System.DefaultWorkingDirectory)/${{ parameters.appName }}/${{ parameters.codePath }}"

      echo ">> Python version"
      python --version

      echo ">> Python path"
      which python
    displayName: "Verify Python"


  #############################################################################
  # Create Virtual Environment
  #############################################################################
  - bash: |
      set -euo pipefail

      cd "$(System.DefaultWorkingDirectory)/${{ parameters.appName }}/${{ parameters.codePath }}"

      echo ">> Creating virtual environment"
      python -m venv .venv
    displayName: "Create venv"


  # #############################################################################
  # # Check requirements files
  # #############################################################################
  # - bash: |
  #     set -euo pipefail

  #     cd "$(System.DefaultWorkingDirectory)/${{ parameters.appName }}/${{ parameters.codePath }}"

  #     if [ -f requirements.txt ]; then
  #       echo "##vso[task.setvariable variable=hasRequirements]true"
  #       echo ">> requirements.txt found"
  #     else
  #       echo "##vso[task.setvariable variable=hasRequirements]false"
  #       echo ">> requirements.txt not found, skipping"
  #     fi

  #     if [ -f requirements-dev.txt ]; then
  #       echo "##vso[task.setvariable variable=hasRequirementsDev]true"
  #       echo ">> requirements-dev.txt found"
  #     else
  #       echo "##vso[task.setvariable variable=hasRequirementsDev]false"
  #       echo ">> requirements-dev.txt not found, skipping"
  #     fi
  #   displayName: "Check requirements files"


  # #############################################################################
  # # Install Runtime Dependencies
  # #############################################################################
  # - task: JFrogPipInstall@1
  #   displayName: "Install runtime dependencies"
  #   condition: eq(variables['hasRequirements'], 'true')
  #   inputs:
  #     artifactoryService: "JFrog"
  #     targetRepoName: "ccoe-cicd-prod-pypi-virtual"
  #     virtualEnvActivation: ". $(System.DefaultWorkingDirectory)/${{ parameters.appName }}/${{ parameters.codePath }}/.venv/bin/activate"
  #     arguments: "-r requirements.txt"
  #     workingDirectory: "$(System.DefaultWorkingDirectory)/${{ parameters.appName }}/${{ parameters.codePath }}"


  # #############################################################################
  # # Install Dev Dependencies
  # #############################################################################
  # - task: JFrogPipInstall@1
  #   displayName: "Install dev dependencies"
  #   condition: eq(variables['hasRequirementsDev'], 'true')
  #   inputs:
  #     artifactoryService: "JFrog"
  #     targetRepoName: "ccoe-cicd-prod-pypi-virtual"
  #     virtualEnvActivation: ". $(System.DefaultWorkingDirectory)/${{ parameters.appName }}/${{ parameters.codePath }}/.venv/bin/activate"
  #     arguments: "-r requirements-dev.txt"
  #     workingDirectory: "$(System.DefaultWorkingDirectory)/${{ parameters.appName }}/${{ parameters.codePath }}"


  #############################################################################
  # Install Dependencies
  #############################################################################
  - bash: |
      set -euo pipefail

      cd "$(System.DefaultWorkingDirectory)/${{ parameters.appName }}/${{ parameters.codePath }}"

      echo ">> Activating venv"
      source .venv/bin/activate

      echo ">> Upgrading pip"
      python -m pip install --upgrade pip

      if [ -f requirements.txt ]; then
        echo ">> Installing runtime dependencies"
        python -m pip install -r requirements.txt
      else
        echo ">> No requirements.txt found, skipping"
      fi

      if [ -f requirements-dev.txt ]; then
        echo ">> Installing dev dependencies"
        python -m pip install -r requirements-dev.txt
      else
        echo ">> No requirements-dev.txt found, skipping"
      fi
    displayName: "Install dependencies"

  #############################################################################
  # Install Project
  #############################################################################
  - bash: |
      set -euo pipefail

      cd "$(System.DefaultWorkingDirectory)/${{ parameters.appName }}/${{ parameters.codePath }}"

      echo ">> Activating venv"
      source .venv/bin/activate

      echo ">> Installing project"
      python -m pip install -e .
    displayName: "Install project"


  #############################################################################
  # Build = Syntax Validation
  #############################################################################
  - bash: |
      set -euo pipefail

      cd "$(System.DefaultWorkingDirectory)/${{ parameters.appName }}/${{ parameters.codePath }}"

      echo ">> Activating venv"
      source .venv/bin/activate

      echo ">> Running compileall"
      python -m compileall app main.py
    displayName: "Build (syntax validation)"


  #############################################################################
  # Build = egg (Legacy)
  #############################################################################
  - ${{ if eq(parameters.buildType, 'egg') }}:
    - bash: |
        set -euo pipefail

        cd "$(System.DefaultWorkingDirectory)/${{ parameters.appName }}/${{ parameters.codePath }}"

        source .venv/bin/activate

        echo ">> Building egg distribution"
        python setup.py bdist_egg
        
        rm -rf .build
        cp -R dist/. .build/
      displayName: "Build egg"


  #############################################################################
  # Build = wheel
  #############################################################################
  - ${{ if eq(parameters.buildType, 'wheel') }}:
    - bash: |
        set -euo pipefail

        cd "$(System.DefaultWorkingDirectory)/${{ parameters.appName }}/${{ parameters.codePath }}"

        source .venv/bin/activate

        echo ">> Building wheel"
        python -m build --wheel
        
        rm -rf .build
        cp -R dist/. .build/
      displayName: "Build wheel"


  #############################################################################
  # Build = sdist
  #############################################################################
  - ${{ if eq(parameters.buildType, 'sdist') }}:
    - bash: |
        set -euo pipefail

        cd "$(System.DefaultWorkingDirectory)/${{ parameters.appName }}/${{ parameters.codePath }}"

        source .venv/bin/activate

        echo ">> Building source distribution (sdist)"
        python -m build --sdist
        
        rm -rf .build
        cp -R dist/. .build/
      displayName: "Build sdist"
