jobs:
- job: DeployInfraJob
  displayName: "Deploy Infrastructure"
  pool:
    vmImage: ubuntu-latest
    
  workspace:
    clean: all

  #############################################################################
  # Steps
  #############################################################################
  steps:

    ###########################################################################
    # Download App Artifact
    ###########################################################################
    - task: DownloadPipelineArtifact@2
      displayName: "Download infrastructure code"
      inputs:
        artifactName: epic-app
        targetPath: $(System.DefaultWorkingDirectory)/${{ parameters.appName }}


    ###########################################################################
    # Read Cloud Config
    ###########################################################################
    - bash: |
        set -euo pipefail

        CONFIG="$(System.DefaultWorkingDirectory)/${{ parameters.appName }}/.pipeline/epic.json"

        echo ">> Reading cloud config from $CONFIG"

        echo "##vso[task.setvariable variable=CLOUD_AWS_ACCOUNT_ID]$(jq -r '.cloud.awsAccountId' "$CONFIG")"
        echo "##vso[task.setvariable variable=CLOUD_AWS_REGION]$(jq -r '.cloud.awsRegion // "us-west-2"' "$CONFIG")"
      displayName: 'Read cloud config'


    ###########################################################################
    # Install Terraform
    ###########################################################################
    - task: TerraformInstaller@1
      displayName: 'Install Terraform'
      inputs:
        terraformVersion: 'latest'

    
    ###########################################################################
    # Configure Git Credentials for Terraform
    ###########################################################################
    - bash: |
        git config --global url."https://$(GITHUB_PAT)@github.com/".insteadOf "https://github.com/"
      displayName: 'Configure Git credentials for Terraform'
      env:
        GITHUB_PAT: $(GITHUB_PAT)


    ###########################################################################
    # Assume Deployment Role in Target Account
    ###########################################################################
    - task: AWSShellScript@1
      displayName: 'Assume Target Account Role'
      inputs:
        awsCredentials: 'AWS'
        regionName: $(CLOUD_AWS_REGION)
        scriptType: 'inline'
        inlineScript: |
          set -euo pipefail

          aws sts assume-role \
            --role-arn "arn:aws:iam::$(CLOUD_AWS_ACCOUNT_ID):role/pge-epic-deployment-role" \
            --role-session-name "epic-terraform-deploy" \
            --duration-seconds 3600 \
            --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
            --output text \
          | while read -r key secret token; do
              echo "##vso[task.setvariable variable=AWS.AccessKeyID;issecret=true]$key"
              echo "##vso[task.setvariable variable=AWS.SecretAccessKey;issecret=true]$secret"
              echo "##vso[task.setvariable variable=AWS.SessionToken;issecret=true]$token"
            done


    ###########################################################################
    # Deploy Infrastructure with Terraform
    ###########################################################################
    - task: AWSShellScript@1
      displayName: 'Terraform Init'
      inputs:
        regionName: $(CLOUD_AWS_REGION)
        scriptType: 'inline'
        inlineScript: |
          set -euo pipefail

          cd ${{ parameters.appName }}/.infra

          terraform init \
            -backend-config="bucket=pge-epic-terraform-state" \
            -backend-config="use_lockfile=true" \
            -backend-config="key=$(CLOUD_AWS_ACCOUNT_ID)/${{ parameters.appName }}-${{ parameters.appType }}/${{ parameters.environment }}/terraform.tfstate" \
            -backend-config="region=$(CLOUD_AWS_REGION)" \
            -backend-config="encrypt=true"


    ###########################################################################
    # Validate the Terraform code
    ###########################################################################
    - task: AWSShellScript@1
      displayName: 'Terraform Validate'
      inputs:
        regionName: $(CLOUD_AWS_REGION)
        scriptType: 'inline'
        inlineScript: |
          set -euo pipefail
        
          cd ${{ parameters.appName }}/.infra

          terraform validate


    ###########################################################################
    # Create the AWS resources
    ###########################################################################
    - ${{ if eq(parameters.terraformAction, 'apply') }}:

      #########################################################################
      # Plan
      #########################################################################
      - task: AWSShellScript@1
        displayName: 'Terraform Plan'
        inputs:
          regionName: $(CLOUD_AWS_REGION)
          scriptType: 'inline'
          inlineScript: |
            set -euo pipefail

            cd ${{ parameters.appName }}/.infra

            terraform plan \
              -var="aws_account_id=$(CLOUD_AWS_ACCOUNT_ID)" \
              -var="environment=${{ parameters.environment }}" \
              -var="aws_region=$(CLOUD_AWS_REGION)" \
              -out=tfplan

      #########################################################################
      # Apply
      #########################################################################
      - task: AWSShellScript@1
        displayName: 'Terraform Apply'
        inputs:
          regionName: $(CLOUD_AWS_REGION)
          scriptType: 'inline'
          inlineScript: |
            set -euo pipefail
        
            cd ${{ parameters.appName }}/.infra

            terraform apply -auto-approve tfplan

            terraform output -json > $(System.DefaultWorkingDirectory)/output.json

      #########################################################################
      # Upload Outputs
      #########################################################################
      - task: PublishPipelineArtifact@1
        displayName: 'Publish Terraform Outputs'
        inputs:
          targetPath: $(System.DefaultWorkingDirectory)/output.json
          artifact: terraform-outputs
          publishLocation: pipeline


    ###########################################################################
    # Destory the AWS resources
    ###########################################################################
    - ${{ if eq(parameters.terraformAction, 'destroy') }}:

      #########################################################################
      # Plan
      #########################################################################
      - task: AWSShellScript@1
        displayName: 'Terraform Plan Destroy'
        inputs:
          regionName: $(CLOUD_AWS_REGION)
          scriptType: 'inline'
          inlineScript: |
            set -euo pipefail

            cd ${{ parameters.appName }}/.infra

            terraform plan -destroy \
              -var="aws_account_id=$(CLOUD_AWS_ACCOUNT_ID)" \
              -var="environment=${{ parameters.environment }}" \
              -var="aws_region=$(CLOUD_AWS_REGION)" \
              -out=tfplan-destroy

      #########################################################################
      # Apply
      #########################################################################
      - task: AWSShellScript@1
        displayName: 'Terraform Destroy'
        inputs:
          regionName: $(CLOUD_AWS_REGION)
          scriptType: 'inline'
          inlineScript: |
            set -euo pipefail
        
            cd ${{ parameters.appName }}/.infra

            terraform apply -auto-approve tfplan-destroy
