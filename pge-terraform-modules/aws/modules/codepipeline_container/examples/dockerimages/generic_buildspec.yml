# Do not change version. This is the version of aws buildspec, not the version of your buldspec file.
version: 0.2
env:
  git-credential-helper: yes

phases:
  install:
    commands:
      - echo "Entered the install phase..."
      - echo "Installing WIZ CLI"
      - echo $APP_ENVIRONMENT
      - curl -o wizcli https://downloads.wiz.io/wizcli/latest/wizcli-linux-amd64 && chmod +x wizcli
      - export PATH=$PWD/:$PATH
      - wizcli version
      - wizcli auth --id "$WIZ_CLIENT_ID" --secret "$WIZ_CLIENT_SECRET"
      - docker login -u $ARTIFACTORY_USER -p $ARTIFACTORY_TOKEN $ARTIFACTORY_DOCKER_REGISTRY

  pre_build:
    commands:
      - echo "Entered the pre_build phase..."
      - echo `jf --version`

  build:
    on-failure: ABORT
    commands:
      - echo "Entered the Wiz scanning phase execution..."

     
      - ls -al
      - IMAGE_TAG=pge-latest
      - echo $IMAGE_TAG
      - docker build . -t $DOCKER_IMAGE_NAME:$IMAGE_TAG --build-arg BASE_IMAGE_URL=$ARTIFACTORY_DOCKER_REGISTRY --build-arg ENVIRONMENT=$APP_ENVIRONMENT --build-arg OWNER=$APP_OWNERS --build-arg IMAGE_TYPE=$IMAGE_TYPE
      - |
         if [[ "$PUBLISH_DOCKER_REGISTRY" == "ECR" || "$PUBLISH_DOCKER_REGISTRY" == "BOTH" ]]; then
            docker tag $DOCKER_IMAGE_NAME:$IMAGE_TAG $AWS_ACCOUNT_NUMBER.dkr.ecr.$AWS_REGION.amazonaws.com/$DOCKER_IMAGE_NAME:$IMAGE_TAG
            docker tag $AWS_ACCOUNT_NUMBER.dkr.ecr.$AWS_REGION.amazonaws.com/$DOCKER_IMAGE_NAME:$IMAGE_TAG $AWS_ACCOUNT_NUMBER.dkr.ecr.$AWS_REGION.amazonaws.com/$DOCKER_IMAGE_NAME:pge-latest
         fi

         if [[ "$PUBLISH_DOCKER_REGISTRY" == "JFROG" || "$PUBLISH_DOCKER_REGISTRY" == "BOTH" ]]; then
            docker tag $DOCKER_IMAGE_NAME:$IMAGE_TAG $ARTIFACTORY_DOCKER_REGISTRY/$DOCKER_IMAGE_NAME:$IMAGE_TAG
            docker tag $ARTIFACTORY_DOCKER_REGISTRY/$DOCKER_IMAGE_NAME:$IMAGE_TAG $ARTIFACTORY_DOCKER_REGISTRY/$DOCKER_IMAGE_NAME:pge-latest
         fi
      - |
          if [[ "$PUBLISH_DOCKER_REGISTRY" == "JFROG" || "$PUBLISH_DOCKER_REGISTRY" == "BOTH" ]]; then
            DEPLOY_IMAGE=$ARTIFACTORY_DOCKER_REGISTRY/$DOCKER_IMAGE_NAME:pge-latest
          else
            DEPLOY_IMAGE=$AWS_ACCOUNT_NUMBER.dkr.ecr.$AWS_REGION.amazonaws.com/$DOCKER_IMAGE_NAME:pge-latest
          fi
      
      # Scan using Wiz
      - echo wiz scanning ....
      - echo scanning image $DOCKER_IMAGE_NAME:$IMAGE_TAG
      - docker images 
      - wizcli docker scan --image $DOCKER_IMAGE_NAME:$IMAGE_TAG -f json > $DOCKER_IMAGE_NAME:$IMAGE_TAG.json
      - ls -ltra
      - chmod +x $DOCKER_IMAGE_NAME:$IMAGE_TAG.json
      - REPORT_FILE=$DOCKER_IMAGE_NAME:$IMAGE_TAG.json
      - echo $APP_ENVIRONMENT
      - SCAN_STATUS=$(jq -r ".status.\"verdict\"" $REPORT_FILE)
      - echo "Analyzing WIZ Scan result"
      - |
        if [ "$SCAN_STATUS" == 'PASSED_BY_POLICY' ]; then
          echo "SCANNING PASSED Proceeding further"
        else
          
          REPORT_URL=$(jq -r '.reportUrl' $DOCKER_IMAGE_NAME:$IMAGE_TAG.json)
          echo "Found Vulnerabilities or Compliance Issues. SEVERITY - "
          echo "For more details access the report here $REPORT_URL"
          echo "***** Found vulnerabilities and not pushing the image - *****"
          if [[ "${APP_ENVIRONMENT,,}" != "dev" ]]; then 
              exit 1;
          else 
             echo "###################################################################################################################"
             echo ******* CONTINUING as its "${APP_ENVIRONMENT,,}" ENVIRONMENT and please fix vulnerabilities before QA/PROD ******
             echo "###################################################################################################################"
          fi
        fi
 
      
  post_build:
    commands:
       - echo "Entering Publishing phase..."
       - echo $PUBLISH_DOCKER_REGISTRY
       - |
          echo 'Build is successfully completed'
          if [[ "$PUBLISH_DOCKER_REGISTRY" == "ECR" || "$PUBLISH_DOCKER_REGISTRY" == "BOTH" ]]; then
            echo 'Push docker images to Elastic Container Registry'
            aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_NUMBER.dkr.ecr.$AWS_REGION.amazonaws.com
            aws ecr create-repository --repository-name $DOCKER_IMAGE_NAME || true
            docker push $AWS_ACCOUNT_NUMBER.dkr.ecr.$AWS_REGION.amazonaws.com/$DOCKER_IMAGE_NAME:$IMAGE_TAG
            docker push $AWS_ACCOUNT_NUMBER.dkr.ecr.$AWS_REGION.amazonaws.com/$DOCKER_IMAGE_NAME:pge-latest
          fi

          if [[ "$PUBLISH_DOCKER_REGISTRY" == "JFROG" || "$PUBLISH_DOCKER_REGISTRY" == "BOTH" ]]; then
            echo 'Push docker images to Jfrog Docker registry'
            docker login -u $ARTIFACTORY_USER -p $ARTIFACTORY_TOKEN $ARTIFACTORY_DOCKER_REGISTRY
            docker push $ARTIFACTORY_DOCKER_REGISTRY/$DOCKER_IMAGE_NAME:$IMAGE_TAG
            docker push $ARTIFACTORY_DOCKER_REGISTRY/$DOCKER_IMAGE_NAME:pge-latest
          fi
                   
artifacts:
  files:
    - '**/*'

 