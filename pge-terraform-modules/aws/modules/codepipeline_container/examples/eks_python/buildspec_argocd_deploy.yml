# AWS CodeBuild Buildspec for ArgoCD GitOps Deployment
#
# This buildspec generates an ArgoCD Application manifest for GitOps deployment:
# - ArgoCD Application manifest for the nodejs web app (pulls from Artifactory Helm repo)
#
# The manifest is created locally, then committed and pushed to the ArgoCD GitOps repository 
# for automated deployment. This assumes the ExternalSecret for Artifactory helm repo credentials
# already exists in your cluster, as well as the ExternalSecret for the application to pull
# from the private Artifactory docker registry. See these reference examples:
# https://github.com/pgetech/ccoe-managed-eks-addons/tree/main/addons/extending-argocd
#
# This buildspec makes git commits and pushes to your ArgoCD GitHub repository, so it configures
# the git environment with appropriate credentials.
#
# Do not change version. This is the version of aws buildspec, not the version of your buldspec file.
version: 0.2
env:
  git-credential-helper: yes

phases:
  install:
    runtime-versions:
      python: $PYTHON_RUNTIME

  # Configure git environment for ArgoCD repository commits
  pre_build:
    commands:
      - echo "Entered the pre_build phase..."
      - echo "Setting up git configuration"
      - git config --global user.email "codebuild@pge.com"
      - git config --global user.name "CodeBuild ArgoCD Deployment"

  # Generate manifests and deploy via GitOps
  build:
    on-failure: ABORT
    commands:
      - echo "Changing to application directory"
      - cd ./reference-pipelines/nodejs/ecs-eks/nodejs-webapp
      - echo "Generate ArgoCD Application manifest"
      - echo "VERSION_FILE is set to $VERSION_FILE"
      - |
        if [ -z "$VERSION_FILE" ]; then
          echo "VERSION_FILE environment variable is empty, using default package.json"
          VERSION_FILE="package.json"
        fi
      - echo "Using version file $VERSION_FILE"
      - |
        if [ -f "$VERSION_FILE" ]; then
          VERSION=$(jq -r '.version' $VERSION_FILE)
          echo "Version read: $VERSION"
        else
          echo "Version file $VERSION_FILE not found, using default version"
          VERSION="latest"
        fi
      - echo "Application version $VERSION"
      - CHART_VERSION=$VERSION

      # Create ArgoCD Application manifest
      - echo "Creating ArgoCD Application manifest"
      - APPLICATION_NAME="${CONTAINER_NAME}-${NAMESPACE}"
      - echo "Application name $APPLICATION_NAME"
      - echo "Chart version to use $CHART_VERSION"
      - |
        cat > argocd-application.yaml << EOF
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: $APPLICATION_NAME
          namespace: argocd
        spec:
          project: default
          source:
            repoURL: $ARTIFACTORY_HOST/artifactory/api/helm/$HELMCHART_VIRTUAL
            chart: $CONTAINER_NAME
            targetRevision: $CHART_VERSION
            helm:
              values: |
                image:
                  tag: $CHART_VERSION
                  repository: $ARTIFACTORY_DOCKER_REGISTRY/$CONTAINER_NAME
                imagePullSecrets: artifactory-docker-credentials
          destination:
            server: https://kubernetes.default.svc
            namespace: $NAMESPACE
          syncPolicy:
            automated:
              prune: true
              selfHeal: true
            syncOptions:
              - CreateNamespace=true
        EOF
      - echo "Generated ArgoCD Application manifest:"
      - cat argocd-application.yaml

      # Clone ArgoCD monitoring repository and commit the application manifest
      - echo "Cloning ArgoCD repository"
      - git clone https://$ARGOCD_GITHUB_TOKEN@github.com/$GITHUB_ORG/$ARGOCD_REPO_NAME.git argocd-repo
      - cd argocd-repo

      # Create directory structure if it doesn't exist
      - mkdir -p $ARGOCD_REPO_PATH

      # Copy ArgoCD Application manifest to GitOps repository
      - echo "Copying ArgoCD Application manifest to repository"
      - cp ../argocd-application.yaml $ARGOCD_REPO_PATH/$APPLICATION_NAME.yaml

      # Commit and push changes
      - git add $ARGOCD_REPO_PATH/$APPLICATION_NAME.yaml
      - |
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Deploy $APPLICATION_NAME version $CHART_VERSION"
          git push origin main
          echo "Successfully committed ArgoCD application manifest to ArgoCD repository"
        fi
  post_build:
    commands:
      - echo "ArgoCD Application deployment manifest has been committed to ArgoCD repository"
      - echo "ArgoCD will detect the changes and deploy the application automatically"