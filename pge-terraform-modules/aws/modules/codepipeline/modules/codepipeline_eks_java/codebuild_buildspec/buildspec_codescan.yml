# Do not change version. This is the version of aws buildspec, not the version of your buldspec file.
#Regardless of what you compile your code with, the SonarQube analysis should be run with a specific Java version, For SonarQube 9.* compatibility, make sure the JAVA_HOME=/path/to/java11
version: 0.2
env:
  git-credential-helper: yes
  exported-variables:
    - PROJECT_ROOT_DIRECTORY
    - JAVA_RUNTIME
  
phases:
  install:
    runtime-versions:
      java: $JAVA_RUNTIME_CODESCAN
  pre_build:
    commands:
      - echo "Entered the pre_build phase..."
      - echo "Making sure Java is installed"
      - echo `java -version`
      - echo "Making sure Maven is installed"
      - echo `mvn --version`
  build:
    on-failure: ABORT
    commands:
      - echo "Entered the build phase execution..."
      - echo Build started on `date`

      - |
        if [ "$PROJECT_ROOT_DIRECTORY" != "" ] ; then
          echo "Change directory to $PROJECT_ROOT_DIRECTORY"
          cd $PROJECT_ROOT_DIRECTORY
          ls -l
        fi

      - ls -al 
     
      #Sonar scanning
      - mvn clean verify sonar:sonar -Dsonar.projectKey=$PROJECT_KEY -Dsonar.projectName=$PROJECT_NAME -Dsonar.host.url=$SONAR_HOST -Dsonar.token=$SONAR_TOKEN  -Dinternal_user=$ARTIFACTORY_USER -Dinternal_pw=$ARTIFACTORY_TOKEN -Dsonar.maven.scanAll=true -s settings.xml
  
      # Get Quality Gate Status 
      - curl -u "$SONAR_TOKEN:" $SONAR_HOST/api/qualitygates/project_status?projectKey=$PROJECT_KEY >result.json
      - echo `date`
        
      - export cetaskid=$(cat target/sonar/report-task.txt | grep ceTaskId | cut -d'=' -f2)
      - curl -u "$SONAR_TOKEN:" $SONAR_HOST/api/ce/task?id=$cetaskid > status.json
      - cat status.json
      - export START=$(date +%s)
      - echo $START
      - |
        while [ $(jq -r '.task.status' status.json) = IN_PROGRESS ] || [ $(jq -r '.task.status' status.json) = PENDING ] ;
        do
          curl -s -u "$SONAR_TOKEN:" $SONAR_HOST/api/ce/task?id=$cetaskid > status.json ;
          export END=$(date +%s)
          echo $END
          export ANALYSISTIME=$((END-START))
          echo $ANALYSISTIME
          if [ $ANALYSISTIME -gt 600 ] ; then
            export CODEBUILD_BUILD_SUCCEEDING=0 ;
            break ;
          fi
        done
      - |
        if [[ $CODEBUILD_BUILD_SUCCEEDING == 0 ]]; then 
          echo "Alaysis taking longer than usual time. Default value is set to 600s. Please verify." ;
          exit 1; 
        fi
      - |
        if [ $(jq -r '.task.status' status.json) = SUCCESS ] ; then
          export analysisid=$(jq -r '.task.analysisId' status.json) ;
          echo $analysisid ;
        elif [ $(jq -r '.task.status' status.json) = FAILED ] ; then
          echo "Analysis Failed in the server. Please verify." ;
          export CODEBUILD_BUILD_SUCCEEDING=0 && exit 1;
        fi
      - curl -u "$SONAR_TOKEN:" $SONAR_HOST/api/ce/task?id=$cetaskid >status.json
      - cat status.json    
        
      - curl -u "$SONAR_TOKEN:" $SONAR_HOST/api/qualitygates/project_status?analysisId=$analysisid > result.json
      - cat result.json
      - |
        if [ $(jq -r '.projectStatus.status' result.json) != OK ] && [ $APP_ENVIRONMENT != "DEV" ] ; then
           echo "Quality gate status is not success - exiting with error"
           echo "Please check your application qualitygate and issues reported in $SONAR_HOST/dashboard?id=$PROJECT_NAME"
           exit 1;
        fi

post_build:
    commands:
       - echo "SonarQube Scanning is successfully completed"
     
artifacts:
    files:
      - '**/*'


#adding default cache paths, https://docs.aws.amazon.com/codeartifact/latest/ug/dependency-caching.html
cache:
  paths:
  - '/root/.m2/**/*'