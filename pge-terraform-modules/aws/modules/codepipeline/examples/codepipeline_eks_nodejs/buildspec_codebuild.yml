# Do not change version. This is the version of aws buildspec, not the version of your buldspec file.
version: 0.2
env:
  git-credential-helper: yes
  exported-variables:
    - ARTIFACT_NAME
    - PROJECT_ROOT_DIRECTORY
    - ARTIFACTORY_HOST
    - ARTIFACTORY_REPO_KEY
    - ARTIFACTORY_REPO_KEY_PATH
    - ARTIFACTORY_UPLOAD_FILE
    - NODEJS_RUNTIME
  variables:
    ARTIFACTORY_TOKEN : "${ARTIFACTORY_TOKEN}"
    ARTIFACTORY_REPO_KEY : "${ARTIFACTORY_REPO_KEY}"
    ARTIFACTORY_REPO_KEY_PATH : "${ARTIFACTORY_REPO_KEY}"
    ARTIFACTORY_UPLOAD_FILE : "${ARTIFACTORY_UPLOAD_FILE}"
    NODEJS_RUNTIME : "${NODEJS_RUNTIME}"

phases:
  install:
    runtime-versions:
      nodejs: $NODEJS_RUNTIME
    commands:

      - echo listing files and directories
      - ls -lart

  pre_build:
    commands:
      - 'ls -lart'
      - echo "Install JFROG CLI"
      - curl -k -fL https://install-cli.jfrog.io | sh && jf --version

  build:
    commands:
      - echo Build started on `date`
      - |
        if [ "$PROJECT_ROOT_DIRECTORY" != "" ] ; then
          echo "Change directory to $PROJECT_ROOT_DIRECTORY"
          cd $PROJECT_ROOT_DIRECTORY
          ls -l
        fi
      - echo present working directory `pwd`
      - echo Compiling the Node.js code
      - 'ls -lart'
      - echo "Entered the install phase..."
      - echo Build started on `date`

      # Jfrog server conifguration for authentication
      - jf c add "${ARTIFACTORY_HOST}" --access-token="${ARTIFACTORY_TOKEN}" --url="${ARTIFACTORY_HOST}" --interactive=false
      - jf rt ping
      - jf c s

      # Before using the npm-install and npm-publish commands, the project needs to be pre-configured with the Artifactory server and repositories, to be used for building and publishing the project.
      - jf npmc --repo-deploy $ARTIFACTORY_REPO_KEY --repo-resolve $ARTIFACTORY_REPO_KEY
      - 'ls -lart'

      # building project
      - echo Installing source NPM dependencies...
      - jf npm install

# Include only the files required for your application to run.
# Do not use recursively include artifacts from node_modules directory as it will include unnecessary packages
# ExpressJS apps will need other artifact directories included (bin/*, public/*, routes/*, views/* etc).
artifacts:
  files:
      - '**/*'
