name: InstallCloudWatchAgent
description: "Install Install CloudWatch Agent on Amazon Linux 2023"
schemaVersion: 1.0
phases:
  - name: build
    steps:
      - action: "ExecuteBash"
        name: "InstallCloudWatchAgent"
        inputs:
          commands:
            - sudo yum update -y
            - sudo yum install -y amazon-ssm-agent
            - sudo systemctl enable amazon-ssm-agent
            - sudo systemctl start amazon-ssm-agent
