description: This document defines the EC2 Image Builder Custom Component.
schemaVersion: 1.0
name: custom-component
phases:
  - name: build
    steps:
      - action: ExecuteBash
        inputs:
          commands:
            - 'BUCKET_NAME=$$(aws ssm get-parameter --region us-west-2 --name /imagebuilder/s3bucket --with-decryption --query "Parameter.[Value]" --output text)'
            - 'STAGING=/ec2-image-builder-staging'
            - 'mkdir -f $${STAGING}'
            - 'mkdir -f $${STAGING}/custom-component'
            - 'echo "Downloading component files from S3 $${BUCKET_NAME}/components/linux/custom-component/files-to-download"'
            - 'aws s3 cp s3://$${BUCKET_NAME}/components/linux/custom-component/files-to-download $${STAGING}/custom-component --recursive'
            - 'echo "Downloading agent installation files from S3 $${BUCKET_NAME}/components/linux/agent-installation-files"'
            - 'mkdir -f $${STAGING}/agent-installation-files'
            - 'aws s3 cp s3://$${BUCKET_NAME}/components/linux/agent-installation-files $${STAGING}/agent-installation-files --recursive'
            - 'chmod 744 $${STAGING}/custom-component/*.sh'
            - '$${STAGING}/custom-component/build-custom-component.sh > $${STAGING}/custom-component/build-custom-component.log 2>&1'
            - '$${STAGING}/custom-component/install-pge-rootCA.sh > $${STAGING}/custom-component/install_pge_cert.log 2>&1'
            - 'rm $${STAGING}/custom-component/install-pge-rootCA.sh'
        name: Build
  - name: test
    steps:
      - action: ExecuteBash
        inputs:
          commands:
              - 'STAGING=/ec2-image-builder-staging'
              - '$${STAGING}/custom-component/test-custom-component.sh > $${STAGING}/custom-component/test-custom-component.log 2>&1'
        name: Test
