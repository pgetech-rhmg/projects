name: "InstallSSMAgent"
description: Install And Configure SSM Agent
schemaVersion: 1.0
phases:
  - name: "build"
    steps:
      - name: "UpdateSystem"
        action: "ExecuteBash"
        inputs:
          commands:
            - sudo yum update -y
            - sudo yum install wget -y

      - name: "InstallSSMAgent"
        action: "ExecuteBash"
        inputs:
          commands:
            - sudo dnf install -y https://s3.us-west-2.amazonaws.com/amazon-ssm-us-west-2/latest/linux_amd64/amazon-ssm-agent.rpm


      - name: "StartAndEnableSSMAgent"
        action: "ExecuteBash"
        inputs:
          commands:
            - sudo systemctl enable amazon-ssm-agent
            - sudo systemctl start amazon-ssm-agent
            - sudo systemctl status amazon-ssm-agent

  - name: test
    steps:
      - name: TestSSMAgent
        action: "ExecuteBash"
        inputs:
          commands:
            - |
              systemctl status amazon-ssm-agent | grep active >/dev/null
              if [ $? = 0 ]
              then
                  echo "Succeeded : SSM agent is running"
              else
                  echo "Failed : SSM agent is not running"
              fi
                      