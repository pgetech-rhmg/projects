---
description: 'FIS Experiment: Stop Secondary SQL Server instances in non-primary AZ (with strict tag-based safety controls)'
parameters:
  targetAvailabilityZone:
    description: 'The Availability Zone to target for the experiment'
    value: 'SPECIFY_AT_RUNTIME'
targets:
  secondaryDBInstancesInTargetAZ:
    resourceType: aws:ec2:instance
    selectionMode: ALL
    resourceTags:
      # REQUIRED: Both tags must match for instance to be targeted
      FISTarget: 'True'
      FISDBRole: Secondary
    filters:
      - path: State.Name
        values:
          - running
      - path: Placement.AvailabilityZone
        values:
          - $targetAvailabilityZone
actions:
  stopSecondaryDBInstances:
    actionId: aws:ec2:stop-instances-v2
    description: 'Stop secondary SQL Server instances in target AZ to test primary stability'
    parameters:
      duration: PT5M  # Keep instances stopped for 5 minutes
    targets:
      Instances: secondaryDBInstancesInTargetAZ
stopConditions:
  - source: none
    # TODO: Add CloudWatch alarm ARN to auto-stop experiment if critical metrics breach
roleArn: arn:aws:iam::ACCOUNT_ID:role/FISExperimentRole  # REPLACE: Your FIS IAM role ARN
tags:
  Name: OIH-Secondary-DB-AZ-Failure-Stop
  Environment: DEV
  TestType: HA-DR
  Component: SQL-Server-Secondary
  TargetAZ: us-west-2a
  TestScenario: Secondary-Isolation
logConfiguration:
  cloudWatchLogsConfiguration:
    logGroupArn: arn:aws:logs:REGION:ACCOUNT_ID:log-group:/aws/fis/experiments  # REPLACE: Your CloudWatch log group ARN
  logSchemaVersion: 2
