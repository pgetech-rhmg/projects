---
description: 'FIS Experiment: Stop EC2 instances in a target Availability Zone'
targets:
  ec2InstancesInTargetAZ:
    resourceType: aws:ec2:instance
    selectionMode: ALL
    resourceTags:
      Environment: QA
      # Add additional tags to scope the target instances
      # Application: OIH
    filters:
      - path: State.Name
        values:
          - running
      - path: Placement.AvailabilityZone
        values:
          - us-east-1a  # Replace with your target AZ
actions:
  stopInstances:
    actionId: aws:ec2:stop-instances-v2
    description: 'Stop all running EC2 instances in the target AZ'
    parameters:
      duration: PT5M  # Keep instances stopped for 5 minutes
    targets:
      Instances: ec2InstancesInTargetAZ
stopConditions:
  - source: none
roleArn: arn:aws:iam::ACCOUNT_ID:role/FISExperimentRole  # Replace with your FIS IAM role ARN
tags:
  Name: OIH-AZ-Failure-EC2-Stop
  Environment: QA
  TestType: HA-DR
  Component: EC2
logConfiguration:
  cloudWatchLogsConfiguration:
    logGroupArn: arn:aws:logs:us-east-1:ACCOUNT_ID:log-group:/aws/fis/experiments  # Replace with your CloudWatch log group ARN
  logSchemaVersion: 2
