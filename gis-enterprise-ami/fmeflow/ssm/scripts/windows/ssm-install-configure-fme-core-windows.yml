---
schemaVersion: "2.2"
description: "SSM document to install FME Flow Core with Web Services on Windows Server for fault-tolerant architecture with FSx shared storage"
parameters:
    Region:
        type: String
        description: "AWS Region"
        default: "us-west-2"
    S3InstallBucket:
        type: String
        description: "S3 bucket containing installation files"
        default: "elevate-installer"
    FMEFlowS3KeyName:
        type: String
        description: "S3 key for FME Flow installation package"
        default: "esri/fmeflow/fme-flow-2025.2.2-b25827-win-x64.exe"
    FsxDnsName:
        type: String
        description: "FSx file system DNS name for shared storage"
        default: "amznfsxcuemjjkd.aws.pge.com"
    InstancePrivateDNSName:
        type: String
        description: "FME Flow Core EC2 Instance Private DNS Name"
        default: "ip-10-88-100-196.us-west-2.compute.internal"
    LoadBalancerDNSName:
        type: String
        description: "DNS Name of the Application Load Balancer"
        default: "go-fme-dev.nonprod.pge.com"
    DatabaseClusterEndpoint:
        type: String
        description: "Endpoint of the PostgreSQL Database cluster"
        default: "fme-server-database.cluster-cni6a46o4af3.us-west-2.rds.amazonaws.com"
    FMEFlowVersion:
        type: String
        description: "FME Flow version (must contain year in format: fme-flow-YYYY.x.x)"
        default: "fme-flow-2025.2.2-b25827"
    FMEDBAdminUserName:
        type: String
        description: "FME PostgreSQL database admin user"
        default: "superadmin"
    FMEDBAdminPasswordSecretName:
        type: String
        description: "AWS Secrets Manager secret name for FME PostgreSQL database admin password"
        default: "rds!cluster-4eb48b5f-724c-4c1c-bab7-27516c3970ab"
    FMEDBPasswordSecretName:
        type: String
        default: "fme/db-fmeflow"
        description: "AWS Secrets Manager secret name for FME PostgreSQL database password"
    PostgreSQLClientS3KeyName:
        type: String
        description: "S3 key for PostgreSQL client installer"
        default: "esri/fmeflow/postgresql-18.1-2-windows-x64.exe"
    InstallDrive:
        type: String
        description: "Drive letter for FME Flow installation"
        default: "E:"
    InstallEngine:
        type: String
        description: "Install FME Engine on same machine (Yes/No)"
        default: "Yes"
        allowedValues:
            - "Yes"
            - "No"

mainSteps:
    - name: ConfigureFirewall
      action: aws:runPowerShellScript
      onFailure: Abort
      inputs:
          runCommand:
              - |
                  try {
                      $ports = @(8080, 8443, 80, 443, 5432, 6379, 7069, 7070, 7071, 7072, 7073, 7074, 7075, 7076, 7077, 7078, 7079, 8078, 35357, 7501, 7500)
                      foreach ($port in $ports) {
                          if (-not (Get-NetFirewallRule -DisplayName "FME Flow Core - Port $port" -ErrorAction SilentlyContinue)) {
                              New-NetFirewallRule -DisplayName "FME Flow Core - Port $port" -Direction Inbound -Protocol TCP -LocalPort $port -Action Allow | Out-Null
                          }
                      }
                      @(@{Name="FME Flow Core - Ports 7100-7150"; Start=7100; End=7150}, @{Name="FME Flow Core - Ports 32768-60999"; Start=32768; End=60999}) | ForEach-Object {
                          if (-not (Get-NetFirewallRule -DisplayName $_.Name -ErrorAction SilentlyContinue)) {
                              New-NetFirewallRule -DisplayName $_.Name -Direction Inbound -Protocol TCP -LocalPort "$($_.Start)-$($_.End)" -Action Allow | Out-Null
                          }
                      }
                  } catch {
                      Write-Error "Failed to configure firewall: $_"
                      exit 1
                  }

    - name: PrepareInstallation
      action: aws:runPowerShellScript
      onFailure: Abort
      inputs:
          runCommand:
              - |
                  try {
                      $installDrive = '{{ InstallDrive }}'
                      $downloadDir = 'fmeflow-downloads'
                      $s3Bucket = '{{ S3InstallBucket }}'
                      $s3Key = '{{ FMEFlowS3KeyName }}'
                      $fsxDns = '{{ FsxDnsName }}'
                      $fmeVersionFull = '{{ FMEFlowVersion }}' -replace '-b\d+$', ''
                      $fmeYear = $fmeVersionFull -replace '^.*-(\d{4})\..*$', '$1'
                      $fmeVersion = "fmeflow_${fmeYear}"

                      $downloadPath = "${installDrive}\${downloadDir}"
                      $installDir = "${installDrive}\${fmeVersion}"
                      $fsxPath = "\\${fsxDns}\share"
                      $fsxSystemsharePath = "${fsxPath}\fmeflow_systemshare"

                      if (-not (Test-Path $downloadPath)) { New-Item -ItemType Directory -Path $downloadPath -Force | Out-Null }
                      if (-not (Test-Path $installDir)) { New-Item -ItemType Directory -Path $installDir -Force | Out-Null }

                      $installerFile = Split-Path -Leaf $s3Key
                      $installerPath = Join-Path $downloadPath $installerFile
                      aws s3 cp "s3://${s3Bucket}/${s3Key}" $installerPath --no-progress
                      if (-not (Test-Path $installerPath)) { throw "Installer download failed" }
                      Unblock-File -Path $installerPath

                      for ($letter = [byte][char]'Z'; $letter -ge [byte][char]'M'; $letter--) {
                          $driveLetter = [char]$letter + ":"
                          if (-not (Test-Path $driveLetter)) {
                              $availableDrive = $driveLetter
                              break
                          }
                      }
                      if (-not $availableDrive) { throw "No available drive letters" }

                      net use $availableDrive /delete /yes 2>&1 | Out-Null
                      Start-Sleep -Seconds 1
                      net use $availableDrive $fsxPath /persistent:yes 2>&1 | Out-Null
                      if ($LASTEXITCODE -ne 0) { throw "Failed to mount FSx share" }

                      if (-not (Test-Path $fsxSystemsharePath)) { New-Item -ItemType Directory -Path $fsxSystemsharePath -Force | Out-Null }
                  } catch {
                      Write-Error "Failed to prepare installation: $_"
                      exit 1
                  }

    - name: InstallPostgreSQLClient
      action: aws:runPowerShellScript
      onFailure: Abort
      timeoutSeconds: 900
      inputs:
          runCommand:
              - |
                  try {
                      $installDrive = '{{ InstallDrive }}'
                      $downloadDir = 'fmeflow-downloads'
                      $downloadPath = "${installDrive}\${downloadDir}"

                      if (Get-Command psql -ErrorAction SilentlyContinue) { exit 0 }

                      $s3Bucket = '{{ S3InstallBucket }}'
                      $postgresS3Key = '{{ PostgreSQLClientS3KeyName }}'
                      $postgresInstallerPath = Join-Path $downloadPath (Split-Path -Leaf $postgresS3Key)
                      $postgresInstallDir = "${installDrive}\PostgreSQL\18"

                      if (-not (Test-Path (Split-Path -Parent $postgresInstallDir))) {
                          New-Item -ItemType Directory -Path (Split-Path -Parent $postgresInstallDir) -Force | Out-Null
                      }

                      aws s3 cp "s3://${s3Bucket}/${postgresS3Key}" $postgresInstallerPath --no-progress
                      if (-not (Test-Path $postgresInstallerPath)) { throw "Failed to download PostgreSQL client" }

                      $secretName = '{{ FMEDBAdminPasswordSecretName }}'
                      $region = '{{ Region }}'
                      $secretJson = aws secretsmanager get-secret-value --secret-id $secretName --region $region --query 'SecretString' --output text 2>&1
                      $secret = $secretJson | ConvertFrom-Json
                      $postgresPassword = if ($secret.password) { $secret.password } else { $secretJson }

                      $postgresArgs = @("--mode", "unattended", "--unattendedmodeui", "none", "--prefix", "`"$postgresInstallDir`"", "--datadir", "`"${installDrive}\PostgreSQL\18\data`"", "--disable-components", "server,pgAdmin,stackbuilder", "--superpassword", "$postgresPassword")
                      $process = Start-Process -FilePath $postgresInstallerPath -ArgumentList $postgresArgs -Wait -PassThru -NoNewWindow

                      $psqlPath = "${installDrive}\PostgreSQL\18\bin\psql.exe"
                      if (Test-Path $psqlPath) {
                          $env:PATH = "$(Split-Path -Parent $psqlPath);$env:PATH"
                      }
                      if (-not (Get-Command psql -ErrorAction SilentlyContinue)) { throw "PostgreSQL client not found after installation" }
                  } catch {
                      Write-Error "Failed to install PostgreSQL client: $_"
                      exit 1
                  }

    - name: InstallFMEFlowCore
      action: aws:runPowerShellScript
      onFailure: Abort
      timeoutSeconds: 900
      inputs:
          runCommand:
              - |
                  try {
                      $installDrive = '{{ InstallDrive }}'
                      $downloadDir = 'fmeflow-downloads'
                      $s3Key = '{{ FMEFlowS3KeyName }}'
                      $externalHost = '{{ LoadBalancerDNSName }}'
                      $coreHost = '{{ InstancePrivateDNSName }}'
                      $dbHost = '{{ DatabaseClusterEndpoint }}'
                      $dbName = 'fmeflow'
                      $dbUser = 'fmeflow'

                      # Retrieve FME database password from Secrets Manager
                      $secretName = '{{ FMEDBPasswordSecretName }}'
                      $region = '{{ Region }}'
                      $secretJson = aws secretsmanager get-secret-value --secret-id $secretName --region $region --query 'SecretString' --output text 2>&1
                      $secret = $secretJson | ConvertFrom-Json
                      $dbPassword = if ($secret.password) { $secret.password } else { $secretJson }

                      $fsxDns = '{{ FsxDnsName }}'
                      $fmeVersionFull = '{{ FMEFlowVersion }}' -replace '-b\d+$', ''
                      $fmeYear = $fmeVersionFull -replace '^.*-(\d{4})\..*$', '$1'
                      $fmeVersion = "fmeflow_${fmeYear}"

                      $downloadPath = "${installDrive}\${downloadDir}"
                      $logFolderPath = "${installDrive}\fmeflow-log"
                      $installerPath = Join-Path $downloadPath (Split-Path -Leaf $s3Key)
                      $extractDir = Join-Path $downloadPath "extract"
                      $installDir = "${installDrive}\${fmeVersion}"
                      $fsxSystemsharePath = "\\${fsxDns}\share\fmeflow_systemshare"

                      if (-not (Test-Path $logFolderPath)) { New-Item -ItemType Directory -Path $logFolderPath -Force | Out-Null }
                      if (-not (Test-Path $installerPath)) { throw "Installer not found: $installerPath" }
                      if (-not (Test-Path $installDir)) { throw "Installation directory not found: $installDir" }
                      if (-not (Test-Path $fsxSystemsharePath)) { throw "FSx shared directory not found: $fsxSystemsharePath" }

                      $installEngine = '{{ InstallEngine }}'
                      $components = if ($installEngine -eq 'Yes') { "FMEFlowCore,FMEEngine,Services" } else { "FMEFlowCore,Services" }

                      $msiProps = @("/qb", "/norestart", "/l*v `"${logFolderPath}\install.log`"", "ADDLOCAL=$components", "INSTALLDIR=`"${installDir}`"", "EXTERNALHOSTNAME=`"${externalHost}`"", "COREHOSTNAME=`"${coreHost}`"", "NODENAME=`"${coreHost}`"", "LOGPREFIX=`"${coreHost}_`"", "DATABASETYPE=PostGreSQL", "DATABASENAME=`"${dbName}`"", "DATABASEUSER=`"${dbUser}`"", "DATABASEHOST=`"${dbHost}`"", "DATABASEPORT=5432", "INSTALLTYPE=Distributed", "DATABASEPASSWORD=`"${dbPassword}`"", "DATABASECONNECTIONSTRING=`"jdbc:postgresql://${dbHost}:5432/${dbName}`"", "SERVLETTYPE=Default", "REPOSITORYSERVERROOTDIR=`"${fsxSystemsharePath}`"", "FMEFLOWSHAREDDATA=`"${fsxSystemsharePath}`"", "FIRSTLOGINCHANGEPASSWORD=true")

                      $exeArgs = "-d`"${extractDir}`" -s -sp`"$($msiProps -join ' ')`""
                      $process = Start-Process -FilePath $installerPath -ArgumentList $exeArgs -Wait -PassThru -NoNewWindow

                      if ($process.ExitCode -eq 1000) { exit 0 }
                      if ($process.ExitCode -eq 2638) {
                          Write-Host "WARNING: Exit code 2638 - Another installation is in progress or reboot pending. Installation may have completed successfully."
                          exit 0
                      }
                      if ($process.ExitCode -ne 0 -and $process.ExitCode -ne 3010) {
                          if (Test-Path "${logFolderPath}\install.log") { Get-Content "${logFolderPath}\install.log" -Tail 50 }
                          throw "Installation failed with exit code: $($process.ExitCode)"
                      }
                  } catch {
                      Write-Error "Failed to install FME Flow Core: $_"
                      exit 1
                  }

    - name: StopFMEFlowServices
      action: aws:runPowerShellScript
      onFailure: Abort
      inputs:
          runCommand:
              - |
                  try {
                      $installEngine = '{{ InstallEngine }}'
                      $services = @("FME Flow Application Server", "FME Flow Core")
                      if ($installEngine -eq 'Yes') { $services += "FME Flow Engines" }

                      foreach ($svcName in $services) {
                          $svc = Get-Service -Name $svcName -ErrorAction SilentlyContinue
                          if ($svc -and $svc.Status -eq 'Running') {
                              Stop-Service -Name $svcName -Force -ErrorAction SilentlyContinue
                              $timeout = 30; $count = 0
                              while ($svc.Status -ne 'Stopped' -and $count -lt $timeout) {
                                  Start-Sleep -Seconds 1
                                  $svc.Refresh()
                                  $count++
                              }
                          }
                      }
                      Start-Sleep -Seconds 5
                  } catch {
                      Write-Error "Failed to stop FME Flow services: $_"
                      exit 1
                  }

    - name: ConfigureDatabasePermissions
      action: aws:runPowerShellScript
      onFailure: Abort
      timeoutSeconds: 600
      inputs:
          runCommand:
              - |
                  try {
                      $installDrive = '{{ InstallDrive }}'; $dbHost = '{{ DatabaseClusterEndpoint }}'; $dbName = 'fmeflow'; $dbUser = 'fmeflow'; $dbAdminUser = '{{ FMEDBAdminUserName }}'; $dbSchema = 'fmeflow'
                      $fmeVersionFull = '{{ FMEFlowVersion }}' -replace '-b\d+$', ''
                      $fmeYear = $fmeVersionFull -replace '^.*-(\d{4})\..*$', '$1'
                      $fmeVersion = "fmeflow_${fmeYear}"
                      $downloadPath = "${installDrive}\fmeflow-downloads"; $installDir = "${installDrive}\${fmeVersion}"; $psqlPath = "${installDrive}\PostgreSQL\18\bin\psql.exe"; $tableCreateScript = "${installDir}\Server\database\postgresql\postgresql_createSchema.sql"
                      if (!(Test-Path $psqlPath)) { throw "PostgreSQL client not found" }; if (!(Test-Path $tableCreateScript)) { throw "FME schema script not found" }

                      # Retrieve FME database user password from Secrets Manager
                      $dbUserSecretName = '{{ FMEDBPasswordSecretName }}'
                      $region = '{{ Region }}'
                      $dbUserSecretJson = aws secretsmanager get-secret-value --secret-id $dbUserSecretName --region $region --query 'SecretString' --output text 2>&1
                      $dbUserSecret = $dbUserSecretJson | ConvertFrom-Json
                      $dbUserPassword = if ($dbUserSecret.password) { $dbUserSecret.password } else { $dbUserSecretJson }

                      $sqlScript = Join-Path $downloadPath "fme_permissions.sql"
                      $sqlContent = @("DO `$`$ BEGIN IF NOT EXISTS (SELECT 1 FROM pg_user WHERE usename = '$dbUser') THEN CREATE USER $dbUser WITH LOGIN PASSWORD '$dbUserPassword'; END IF; END `$`$;","CREATE SCHEMA IF NOT EXISTS $dbSchema;","GRANT ALL ON SCHEMA $dbSchema TO $dbUser;","ALTER SCHEMA $dbSchema OWNER TO $dbUser;","ALTER ROLE $dbUser IN DATABASE $dbName SET search_path TO $dbSchema, public;","GRANT USAGE, CREATE ON SCHEMA $dbSchema TO $dbUser;","GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA $dbSchema TO $dbUser;","GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA $dbSchema TO $dbUser;","ALTER DEFAULT PRIVILEGES IN SCHEMA $dbSchema GRANT ALL PRIVILEGES ON TABLES TO $dbUser;","ALTER DEFAULT PRIVILEGES IN SCHEMA $dbSchema GRANT ALL PRIVILEGES ON SEQUENCES TO $dbUser;","GRANT CONNECT, CREATE, TEMPORARY ON DATABASE $dbName TO $dbUser;") -join "`n"
                      $utf8NoBOM = New-Object System.Text.UTF8Encoding($false); [System.IO.File]::WriteAllText($sqlScript, $sqlContent, $utf8NoBOM)

                      $secretJson = aws secretsmanager get-secret-value --secret-id '{{ FMEDBAdminPasswordSecretName }}' --region '{{ Region }}' --query 'SecretString' --output text
                      $dbAdminPassword = ($secretJson | ConvertFrom-Json).password; if (!$dbAdminPassword) { $dbAdminPassword = $secretJson }
                      $env:PGPASSWORD = $dbAdminPassword

                      # Check if schema and user already exist
                      $checkUserQuery = "SELECT 1 FROM pg_user WHERE usename = '$dbUser';"
                      $userExists = & $psqlPath -h $dbHost -p 5432 -U $dbAdminUser -d $dbName -t -c $checkUserQuery 2>&1

                      $checkSchemaQuery = "SELECT 1 FROM information_schema.schemata WHERE schema_name = '$dbSchema';"
                      $schemaExists = & $psqlPath -h $dbHost -p 5432 -U $dbAdminUser -d $dbName -t -c $checkSchemaQuery 2>&1

                      if ($userExists -match '1' -and $schemaExists -match '1') {
                          Write-Host "User '$dbUser' and schema '$dbSchema' already exist. Skipping creation."
                      } else {
                          Write-Host "Creating user and schema..."
                          $result1 = & $psqlPath -h $dbHost -p 5432 -U $dbAdminUser -d $dbName -f $sqlScript 2>&1
                          if ($LASTEXITCODE -ne 0) { throw "Permission config failed: $result1" }
                      }

                      # Create schema tables
                      Write-Host "Creating schema tables..."
                      $result2 = & $psqlPath -h $dbHost -p 5432 -U $dbAdminUser -d $dbName -v ON_ERROR_STOP=1 -c "SET search_path TO `"$dbSchema`", public;" -f $tableCreateScript 2>&1
                      if ($LASTEXITCODE -ne 0) { throw "Schema creation failed: $result2" }

                      Remove-Item -Path $sqlScript -Force -ErrorAction SilentlyContinue; Remove-Item Env:\PGPASSWORD -ErrorAction SilentlyContinue
                  } catch {
                      Remove-Item Env:\PGPASSWORD -ErrorAction SilentlyContinue
                      Write-Error "Failed to configure database permissions: $_"
                      exit 1
                  }

    - name: GenerateSelfSignedCertificate
      action: aws:runPowerShellScript
      onFailure: Abort
      timeoutSeconds: 300
      inputs:
          runCommand:
              - |
                  try {
                      $installDrive = '{{ InstallDrive }}'; $externalHost = '{{ LoadBalancerDNSName }}'; $downloadPath = "${installDrive}\fmeflow-downloads"
                      $fmeVersionFull = '{{ FMEFlowVersion }}' -replace '-b\d+$', ''
                      $fmeYear = $fmeVersionFull -replace '^.*-(\d{4})\..*$', '$1'
                      $fmeVersion = "fmeflow_${fmeYear}"
                      $jreBinPath = "${installDrive}\${fmeVersion}\Utilities\jre\bin"; $keytoolPath = Join-Path $jreBinPath "keytool.exe"; $keystorePath = Join-Path $jreBinPath "tomcat.keystore"; $pfxPath = Join-Path $downloadPath "server.pfx"
                      if (!(Test-Path $keytoolPath)) { throw "keytool not found" }

                      $secretJson = aws secretsmanager get-secret-value --secret-id '{{ FMEDBAdminPasswordSecretName }}' --region '{{ Region }}' --query 'SecretString' --output text
                      $keystorePassword = ($secretJson | ConvertFrom-Json).password; if (!$keystorePassword) { $keystorePassword = $secretJson }

                      # Sanitize password: replace XML-unsafe characters
                      $keystorePassword = $keystorePassword -replace '<', '_' -replace '>', '_' -replace '&', '_' -replace '"', '_' -replace "'", '_'

                      Write-Host "Keystore is: $($keystorePassword)"
                      if (Test-Path $keystorePath) { Remove-Item -Path $keystorePath -Force }
                      $keytoolArgs = @("-genkeypair","-noprompt","-alias","tomcat","-keyalg","RSA","-keysize","2048","-validity","365","-keystore",$keystorePath,"-storetype","PKCS12","-dname","CN=${externalHost}, OU=IT, O=PGE, L=Oakland, S=CA, C=US","-storepass",$keystorePassword,"-keypass",$keystorePassword,"-ext","san=dns:${externalHost}")
                      $result = & $keytoolPath $keytoolArgs 2>&1; if ($LASTEXITCODE -ne 0) { throw "Certificate generation failed: $result" }
                      if (!(Test-Path $keystorePath)) { throw "Keystore not created" }
                      if (Test-Path $pfxPath) { Remove-Item -Path $pfxPath -Force }
                      Copy-Item -Path $keystorePath -Destination $pfxPath -Force; if (!(Test-Path $pfxPath)) { throw "PFX not created" }
                  } catch {
                      Write-Error "Failed to generate self-signed certificate: $_"
                      exit 1
                  }

    - name: ConfigureSSLWithFMEScript
      action: aws:runPowerShellScript
      onFailure: Abort
      timeoutSeconds: 600
      inputs:
          runCommand:
              - |
                  try {
                      $installDrive = '{{ InstallDrive }}'; $downloadPath = "${installDrive}\fmeflow-downloads"
                      $fmeVersionFull = '{{ FMEFlowVersion }}' -replace '-b\d+$', ''
                      $fmeYear = $fmeVersionFull -replace '^.*-(\d{4})\..*$', '$1'
                      $fmeVersion = "fmeflow_${fmeYear}"
                      $installDir = "${installDrive}\${fmeVersion}"
                      $configureSSLScript = "${installDir}\Utilities\configureSSL.ps1"; $pfxFilePath = Join-Path $downloadPath "server.pfx"
                      if (!(Test-Path $configureSSLScript)) { throw "configureSSL.ps1 not found" }; if (!(Test-Path $pfxFilePath)) { throw "PFX certificate not found" }

                      $secretJson = aws secretsmanager get-secret-value --secret-id '{{ FMEDBAdminPasswordSecretName }}' --region '{{ Region }}' --query 'SecretString' --output text
                      $certPassword = ($secretJson | ConvertFrom-Json).password; if (!$certPassword) { $certPassword = $secretJson }

                      # Sanitize password: replace XML-unsafe characters
                      $sanitizedPassword = $certPassword -replace '<', '_' -replace '>', '_' -replace '&', '_' -replace '"', '_' -replace "'", '_'

                      $securePwd = ConvertTo-SecureString -String $sanitizedPassword -AsPlainText -Force

                      Push-Location -Path "${installDir}\Utilities"
                      try {
                          & $configureSSLScript -PfxFilePath $pfxFilePath -PfxPassword $securePwd -Port 443
                          if ($LASTEXITCODE -ne 0) { throw "configureSSL.ps1 failed" }
                      } finally { Pop-Location }

                      $serverXmlPath = "${installDir}\Utilities\tomcat\conf\server.xml"
                      if (Test-Path $serverXmlPath) {
                          [xml]$serverXml = Get-Content -Path $serverXmlPath -Raw
                          $existingPort80 = $serverXml.Server.Service.Connector | Where-Object { $_.port -eq '80' }
                          if (!$existingPort80) {
                              $serviceNode = $serverXml.Server.Service; $newConnector = $serverXml.CreateElement("Connector")
                              $newConnector.SetAttribute("port","80"); $newConnector.SetAttribute("protocol","HTTP/1.1"); $newConnector.SetAttribute("redirectPort","443"); $newConnector.SetAttribute("connectionTimeout","20000"); $newConnector.SetAttribute("maxParameterCount","1000")
                              $httpsConnector = $serviceNode.Connector | Where-Object { $_.port -eq '443' }
                              if ($httpsConnector) { $serviceNode.InsertAfter($newConnector, $httpsConnector) | Out-Null } else { $serviceNode.AppendChild($newConnector) | Out-Null }
                              $serverXml.Save($serverXmlPath)
                          }
                      }
                  } catch {
                      Write-Error "Failed to configure SSL: $_"
                      exit 1
                  }

    - name: UpdateSAMLConfiguration
      action: aws:runPowerShellScript
      onFailure: Abort
      inputs:
          runCommand:
              - |
                  try {
                      $fmeVersionFull = '{{ FMEFlowVersion }}' -replace '-b\d+$', ''
                      $fmeYear = $fmeVersionFull -replace '^.*-(\d{4})\..*$', '$1'
                      $fmeVersion = "fmeflow_${fmeYear}"
                      $samlPropertiesPath = "{{ InstallDrive }}\${fmeVersion}\Utilities\tomcat\webapps\fmesaml\WEB-INF\classes\application.properties"
                      if (!(Test-Path $samlPropertiesPath)) { exit 0 }
                      $content = Get-Content -Path $samlPropertiesPath -Raw; $baseUrl = "https://{{ LoadBalancerDNSName }}"
                      if ($content -match 'fmeserver\.saml\.custom\.baseurl=.*') { $content = $content -replace 'fmeserver\.saml\.custom\.baseurl=.*', "fmeserver.saml.custom.baseurl=$baseUrl" } else { $content += "`nfmeserver.saml.custom.baseurl=$baseUrl`n" }
                      Set-Content -Path $samlPropertiesPath -Value $content -NoNewline
                  } catch {
                      Write-Error "Failed to update SAML configuration: $_"
                      exit 1
                  }

    - name: StartFMEFlowServices
      action: aws:runPowerShellScript
      onFailure: Abort
      inputs:
          runCommand:
              - |
                  try {
                      $services = @("FME Flow Core", "FME Flow Application Server"); if ('{{ InstallEngine }}' -eq 'Yes') { $services += "FME Flow Engines" }
                      foreach ($svcName in $services) {
                          $svc = Get-Service -Name $svcName -ErrorAction SilentlyContinue
                          if ($svc) { Start-Service -Name $svcName -ErrorAction SilentlyContinue; Set-Service -Name $svcName -StartupType Automatic -ErrorAction SilentlyContinue; Start-Sleep -Seconds 5 }
                      }
                      Start-Sleep -Seconds 20

                      $fmeVersionFull = '{{ FMEFlowVersion }}' -replace '-b\d+$', ''
                      $fmeYear = $fmeVersionFull -replace '^.*-(\d{4})\..*$', '$1'
                      $fmeVersion = "fmeflow_${fmeYear}"
                      $installDrive = '{{ InstallDrive }}'
                      $restartBatchFile = "${installDrive}\${fmeVersion}\Server\WindowsService\restartFMEFlowWindowsService.bat"
                      if (Test-Path $restartBatchFile) {
                          $process = Start-Process -FilePath $restartBatchFile -Wait -PassThru -NoNewWindow
                          if ($process.ExitCode -ne 0) { Write-Warning "Restart batch file returned exit code: $($process.ExitCode)" }
                          Start-Sleep -Seconds 10
                      }
                  } catch {
                      Write-Error "Failed to start FME Flow services: $_"
                      exit 1
                  }

    - name: CleanupInstallationFiles
      action: aws:runPowerShellScript
      onFailure: Abort
      inputs:
          runCommand:
              - |
                  try {
                      $installDrive = "{{ InstallDrive }}"
                      $downloadPath = "${installDrive}\fmeflow-downloads"
                      $logPath = "${installDrive}\fmeflow-log"

                      if (Test-Path $downloadPath) {
                          Get-ChildItem -Path $downloadPath -Force | Where-Object { $_.FullName -ne $logPath } | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
                          if ((Get-ChildItem -Path $downloadPath -Force | Measure-Object).Count -eq 0) {
                              Remove-Item -Path $downloadPath -Force -ErrorAction SilentlyContinue
                          }
                      }
                  } catch {
                      Write-Error "Failed to cleanup installation files: $_"
                      exit 1
                  }
