---
schemaVersion: "2.2"
description: "Configure ArcGIS Server on Windows with local storage"
parameters:
    Region:
        type: String
        description: "AWS Region"
        default: "us-west-2"
    DeploymentBucket:
        type: String
        description: "S3 bucket containing deployment files and installers"
        default: "elevate-installer"
    LicenseFileS3Key:
        type: String
        description: "S3 key for ArcGIS Server license file (.ecp)"
        default: "esri/arcgis-enterprise/11-5/license/server/ArcGISGISServerAdvanced_ArcGISServer_1556363.ecp"
    ArcGISVersion:
        type: String
        description: "ArcGIS version"
        default: "11.5"
    InstallDrive:
        type: String
        description: "Drive letter for installation (e.g., E:)"
        default: "E:"
    ServerInstallerS3Key:
        type: String
        description: "S3 keys for ArcGIS Server installers (comma-separated for multiple files)"
        default: "esri/arcgis-enterprise/11-5/ArcGIS_Server_Windows_115_195344.exe,esri/arcgis-enterprise/11-5/ArcGIS_Server_Windows_115_195344.exe.001"

mainSteps:
    - name: ConfigureFirewall
      action: "aws:runPowerShellScript"
      description: "Configure Windows Firewall for ArcGIS Server"
      inputs:
          runCommand:
              - |
                  try {
                      Write-Host "Configuring Windows Firewall for ArcGIS Server..."

                      # ArcGIS Server ports
                      $ports = @(
                          6080,   # ArcGIS Server HTTP
                          6443,   # ArcGIS Server HTTPS
                          6006,   # ArcGIS Server Directory
                          6099,   # ArcGIS Server GeoAnalytics
                          80,     # HTTP
                          443     # HTTPS
                      )

                      foreach ($port in $ports) {
                          $ruleName = "ArcGIS Server - Port $port"
                          $existingRule = Get-NetFirewallRule -DisplayName $ruleName -ErrorAction SilentlyContinue
                          if ($existingRule) {
                              Write-Host "Firewall rule already exists for port $port"
                          } else {
                              New-NetFirewallRule -DisplayName $ruleName -Direction Inbound -Protocol TCP -LocalPort $port -Action Allow -ErrorAction Stop
                              Write-Host "Created firewall rule for port $port"
                          }
                      }

                      # Port ranges for ArcGIS Server services
                      $portRanges = @(
                          @{Start=4000; End=4004; Description="ArcGIS Server SOC"},
                          @{Start=7100; End=7150; Description="ArcGIS Server Communication"}
                      )

                      foreach ($range in $portRanges) {
                          $ruleName = "ArcGIS Server - $($range.Description)"
                          $existingRule = Get-NetFirewallRule -DisplayName $ruleName -ErrorAction SilentlyContinue
                          if ($existingRule) {
                              Write-Host "Firewall rule already exists for $($range.Description)"
                          } else {
                              New-NetFirewallRule -DisplayName $ruleName -Direction Inbound -Protocol TCP -LocalPort "$($range.Start)-$($range.End)" -Action Allow -ErrorAction Stop
                              Write-Host "Created firewall rule for $($range.Description) (ports $($range.Start)-$($range.End))"
                          }
                      }

                      Write-Host "SUCCESS: Firewall configuration completed"
                  }
                  catch {
                      Write-Host "ERROR: Firewall configuration failed - $_"
                      exit 1
                  }

    - name: CreateDirectories
      action: "aws:runPowerShellScript"
      description: "Create installation directories"
      inputs:
          runCommand:
              - |
                  try {
                      $installDrive = "{{ InstallDrive }}"
                      $arcgisVersion = "{{ ArcGISVersion }}"

                      $directories = @(
                          "${installDrive}\arcgis-${arcgisVersion}-downloads",
                          "${installDrive}\arcgisserver",
                          "${installDrive}\arcgisserver\${arcgisVersion}",
                          "${installDrive}\arcgisserver\${arcgisVersion}\config-store",
                          "${installDrive}\arcgisserver\${arcgisVersion}\directories"
                      )

                      foreach ($dir in $directories) {
                          if (-not (Test-Path -Path $dir)) {
                              New-Item -Path $dir -ItemType Directory -Force | Out-Null
                              Write-Host "Created directory: $dir"
                          } else {
                              Write-Host "Directory already exists: $dir"
                          }
                      }

                      Write-Host "SUCCESS: Directory creation completed"
                      Write-Host "  Installation Directory: ${installDrive}\arcgisserver\${arcgisVersion}"
                      Write-Host "  Config Store: ${installDrive}\arcgisserver\${arcgisVersion}\config-store"
                      Write-Host "  Directories: ${installDrive}\arcgisserver\${arcgisVersion}\directories"
                  }
                  catch {
                      Write-Host "ERROR: Directory creation failed - $_"
                      exit 1
                  }

    - name: DownloadInstallerAndLicense
      action: "aws:runPowerShellScript"
      description: "Download ArcGIS Server installer and license file from S3"
      inputs:
          runCommand:
              - |
                  try {
                      $region = "{{ Region }}"
                      $bucket = "{{ DeploymentBucket }}"
                      $installerKey = "{{ ServerInstallerS3Key }}"
                      $licenseKey = "{{ LicenseFileS3Key }}"
                      $installDrive = "{{ InstallDrive }}"
                      $arcgisVersion = "{{ ArcGISVersion }}"

                      $downloadDir = "${installDrive}\arcgis-${arcgisVersion}-downloads"

                      # Split installer keys by comma and trim whitespace
                      $installerKeys = $installerKey -split ',' | ForEach-Object { $_.Trim() }

                      Write-Host "Downloading ArcGIS Server installer(s) from S3..."
                      Write-Host "Number of installers to download: $($installerKeys.Count)"

                      $installerPaths = @()
                      foreach ($key in $installerKeys) {
                          Write-Host "Downloading: $key"
                          $installerPath = Join-Path $downloadDir (Split-Path $key -Leaf)

                          aws s3 cp "s3://${bucket}/${key}" "$installerPath" --region $region --no-progress
                          if ($LASTEXITCODE -ne 0) {
                              throw "Failed to download installer from S3: $key"
                          }
                          Write-Host "Downloaded installer to: $installerPath"
                          $installerPaths += $installerPath
                      }

                      # Download license file
                      Write-Host "Downloading license file from S3..."
                      $licensePath = Join-Path $downloadDir "server.ecp"

                      aws s3 cp "s3://${bucket}/${licenseKey}" "$licensePath" --region $region --no-progress
                      if ($LASTEXITCODE -ne 0) {
                          throw "Failed to download license file from S3"
                      }
                      Write-Host "Downloaded license file to: $licensePath"

                      # Verify installers exist
                      foreach ($installerPath in $installerPaths) {
                          if (-not (Test-Path -Path $installerPath)) {
                              throw "Installer file not found after download: $installerPath"
                          }
                      }
                      Write-Host "All installer files verified"

                      # Verify license exists
                      if (-not (Test-Path -Path $licensePath)) {
                          throw "License file not found after download"
                      }

                      Write-Host "SUCCESS: Downloads completed"
                  }
                  catch {
                      Write-Host "ERROR: Download failed - $_"
                      exit 1
                  }

    - name: InstallArcGISServer
      action: "aws:runPowerShellScript"
      description: "Extract and install ArcGIS Server"
      inputs:
          runCommand:
              - |
                  try {
                      $installDrive = "{{ InstallDrive }}"
                      $arcgisVersion = "{{ ArcGISVersion }}"
                      $downloadDir = "${installDrive}\arcgis-${arcgisVersion}-downloads"
                      $installerKey = "{{ ServerInstallerS3Key }}"
                      $installDir = "${installDrive}\arcgisserver\${arcgisVersion}"

                      Write-Host "Installing ArcGIS Server..."
                      Write-Host "Install Directory: $installDir"

                      # Split installer keys by comma and trim whitespace
                      $installerKeys = $installerKey -split ',' | ForEach-Object { $_.Trim() }

                      Write-Host "Number of installers to process: $($installerKeys.Count)"

                      foreach ($key in $installerKeys) {
                          $installerPath = Join-Path $downloadDir (Split-Path $key -Leaf)
                          $installerFileName = Split-Path $key -Leaf

                          Write-Host "Processing file: $installerFileName"
                          Write-Host "File path: $installerPath"

                          # Verify file exists
                          if (-not (Test-Path -Path $installerPath)) {
                              throw "File not found at: $installerPath"
                          }

                          # Only .exe files are extracted and installed, other files are just supporting files
                          if ($installerFileName -match '\.exe$') {
                              Write-Host "This is the main installer (.exe) - will extract and install"

                              # This is a self-extracting .exe file
                              $extractDir = Join-Path $downloadDir ($installerFileName -replace '\.exe$', '')

                              Write-Host "Extract directory: $extractDir"

                              # Extract the installer
                              Write-Host "Extracting installer to: $extractDir"
                              if (-not (Test-Path -Path $extractDir)) {
                                  New-Item -Path $extractDir -ItemType Directory -Force | Out-Null
                              }

                              # Extract using Start-Process with -ArgumentList for self-extracting exe
                              $extractArgs = @("/s", "/d `"$extractDir`"")
                              $extractProcess = Start-Process -FilePath $installerPath -ArgumentList $extractArgs -Wait -PassThru -NoNewWindow

                              if ($extractProcess.ExitCode -ne 0) {
                                  Write-Host "Warning: Extractor returned exit code $($extractProcess.ExitCode), checking if files were extracted..."
                              }

                              # Wait a moment for extraction to complete
                              Start-Sleep -Seconds 25

                              # Setup.exe is at fixed path: <extractDir>\ArcGIS 11.5\ArcGISServer\Setup.exe
                              $setupExePath = Join-Path $extractDir "ArcGIS 11.5\ArcGISServer\Setup.exe"

                              Write-Host "Expected Setup.exe path: $setupExePath"

                              if (-not (Test-Path -Path $setupExePath)) {
                                  throw "Setup.exe not found at expected path: $setupExePath"
                              }

                              Write-Host "Verified Setup.exe exists at: $setupExePath"

                              # Install silently using Setup.exe
                              Write-Host "Starting silent installation..."
                              $installArgs = @(
                                  "/qb",
                                  "ACCEPTEULA=yes",
                                  "INSTALLDIR=`"$installDir`""
                              )

                              $process = Start-Process -FilePath $setupExePath -ArgumentList $installArgs -Wait -PassThru -NoNewWindow

                              if ($process.ExitCode -ne 0) {
                                  throw "Installation failed for $installerFileName with exit code: $($process.ExitCode)"
                              }

                              Write-Host "Completed installation of: $installerFileName"
                          } else {
                              # For non-.exe files (like .msi, patches, etc.), they are just supporting files
                              Write-Host "This is a supporting file (not .exe) - downloaded successfully"
                              Write-Host "File available at: $installerPath"
                          }
                      }

                      Write-Host "All ArcGIS Server installations completed"

                      # Verify installation
                      $serverExe = Join-Path $installDir "Server\framework\etc\service\bin\ArcGISServer.exe"
                      if (-not (Test-Path -Path $serverExe)) {
                          throw "Installation verification failed - server executable not found"
                      }

                      Write-Host "SUCCESS: ArcGIS Server installed successfully"
                  }
                  catch {
                      Write-Host "ERROR: Installation failed - $_"
                      exit 1
                  }

    - name: AuthorizeLicense
      action: "aws:runPowerShellScript"
      description: "Authorize ArcGIS Server license"
      inputs:
          runCommand:
              - |
                  try {
                      $installDrive = "{{ InstallDrive }}"
                      $arcgisVersion = "{{ ArcGISVersion }}"
                      $downloadDir = "${installDrive}\arcgis-${arcgisVersion}-downloads"
                      $licensePath = Join-Path $downloadDir "server.ecp"
                      $installDir = "${installDrive}\arcgisserver\${arcgisVersion}"

                      Write-Host "Authorizing ArcGIS Server license..."

                      # Verify license file exists
                      if (-not (Test-Path -Path $licensePath)) {
                          throw "License file not found at: $licensePath"
                      }

                      # Find authorization tool
                      $authTool = Join-Path $installDir "Server\tools\SoftwareAuthorization\SoftwareAuthorization.exe"
                      if (-not (Test-Path -Path $authTool)) {
                        throw "Authorization tool not found"
                      }

                      Write-Host "Authorization tool: $authTool"
                      Write-Host "License file: $licensePath"

                      # Run authorization
                      $process = Start-Process -FilePath $authTool -ArgumentList "/S /Ver $arcgisVersion /LIF `"$licensePath`"" -Wait -PassThru -NoNewWindow

                      if ($process.ExitCode -ne 0) {
                          throw "License authorization failed with exit code: $($process.ExitCode)"
                      }

                      Write-Host "SUCCESS: License authorized successfully"
                  }
                  catch {
                      Write-Host "ERROR: License authorization failed - $_"
                      exit 1
                  }

    - name: VerifyServiceRunning
      action: "aws:runPowerShellScript"
      description: "Verify ArcGIS Server service is running"
      inputs:
          runCommand:
              - |
                  try {
                      Write-Host "========================================"
                      Write-Host "Verifying ArcGIS Server Service"
                      Write-Host "========================================"

                      # Wait for ArcGIS Server service to start
                      Write-Host "Waiting for ArcGIS Server service to start..."
                      $maxAttempts = 30
                      $attempt = 0
                      $serviceStarted = $false

                      while ($attempt -lt $maxAttempts -and -not $serviceStarted) {
                          $service = Get-Service -Name "ArcGIS Server" -ErrorAction SilentlyContinue
                          if ($service -and $service.Status -eq "Running") {
                              $serviceStarted = $true
                              Write-Host "ArcGIS Server service is running"
                          } else {
                              Write-Host "Attempt $($attempt + 1)/$maxAttempts : Service not running yet..."
                              Start-Sleep -Seconds 10
                              $attempt++
                          }
                      }

                      if (-not $serviceStarted) {
                          throw "ArcGIS Server service failed to start"
                      }

                      Write-Host "SUCCESS: ArcGIS Server service verified as running"
                  }
                  catch {
                      Write-Host "ERROR: Service verification failed - $_"
                      exit 1
                  }

    - name: CleanupInstallationFiles
      action: "aws:runPowerShellScript"
      description: "Clean up installation files and download folders"
      inputs:
          runCommand:
              - |
                  try {
                      $installDrive = '{{ InstallDrive }}'
                      $arcgisVersion = '{{ ArcGISVersion }}'

                      Write-Host "========================================"
                      Write-Host "Cleaning up Installation Files"
                      Write-Host "========================================"
                      Write-Host ""

                      # Define cleanup paths
                      $downloadPath = "${installDrive}\arcgis-${arcgisVersion}-downloads"

                      # Remove download directory
                      if (Test-Path $downloadPath) {
                          Write-Host "Removing download directory: $downloadPath"
                          Remove-Item -Path $downloadPath -Recurse -Force -ErrorAction SilentlyContinue
                          Write-Host "✓ Download directory removed"
                      } else {
                          Write-Host "Download directory not found (already cleaned): $downloadPath"
                      }

                      # Remove ArcGIS installation logs from user AppData
                      Write-Host ""
                      Write-Host "Cleaning ArcGIS installation logs from AppData..."
                      $appDataLogs = Get-ChildItem -Path "C:\Users\*\AppData\Local\ESRI" -Directory -ErrorAction SilentlyContinue
                      if ($appDataLogs) {
                          foreach ($folder in $appDataLogs) {
                              Write-Host "Removing: $($folder.FullName)"
                              Remove-Item -Path $folder.FullName -Recurse -Force -ErrorAction SilentlyContinue
                          }
                          Write-Host "✓ ArcGIS logs cleaned from AppData"
                      } else {
                          Write-Host "No ArcGIS logs found in AppData"
                      }

                      # Remove temporary ArcGIS files
                      Write-Host ""
                      Write-Host "Cleaning temporary ArcGIS files..."
                      $tempFiles = Get-ChildItem -Path $env:TEMP -Filter "ArcGIS*" -ErrorAction SilentlyContinue
                      if ($tempFiles) {
                          foreach ($file in $tempFiles) {
                              Write-Host "Removing: $($file.FullName)"
                              Remove-Item -Path $file.FullName -Recurse -Force -ErrorAction SilentlyContinue
                          }
                          Write-Host "✓ Temporary ArcGIS files cleaned"
                      } else {
                          Write-Host "No temporary ArcGIS files found"
                      }

                      Write-Host ""
                      Write-Host "SUCCESS: Cleanup completed"
                  }
                  catch {
                      Write-Host "ERROR: Cleanup failed - $_"
                      exit 1
                  }

    - name: FinalizeConfiguration
      action: "aws:runPowerShellScript"
      description: "Finalize configuration and log completion"
      inputs:
          runCommand:
              - |
                  try {
                      Write-Host "========================================"
                      Write-Host "ArcGIS Server Installation Completed"
                      Write-Host "========================================"
                      Write-Host "Time: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')"
                      Write-Host "========================================"
                      Write-Host ""
                      Write-Host "ArcGIS Server service is installed and running"
                      Write-Host "Site creation must be performed separately"
                      Write-Host ""
                      Write-Host "SUCCESS: Installation complete"
                  }
                  catch {
                      Write-Host "ERROR: Finalization failed - $_"
                      exit 1
                  }
