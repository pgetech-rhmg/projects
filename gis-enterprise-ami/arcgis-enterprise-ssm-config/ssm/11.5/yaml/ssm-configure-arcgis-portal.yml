schemaVersion: "2.2"
description: "Configure ArcGIS Portal - Primary or Standby node deployment with high availability"
parameters:
  S3Bucket:
    type: String
    description: "S3 bucket containing cookbook artifacts and deployment assets"
  S3Region:
    type: String
    description: "AWS region for the S3 bucket"
    default: "us-west-2"
  PortalRootCertName:
    type: String
    description: "Filename of the root certificate in S3"
  PortalPfxCertName:
    type: String
    description: "Filename of the PFX certificate in S3"
  EsriVersion:
    type: String
    description: "Esri software version (e.g., 11.5)"
  PortalLicenseName:
    type: String
    description: "Filename of the portal license in S3"
  PortalAdminUsername:
    type: String
    description: "Portal administrator username"
    default: "portaladmin"
  PortalAdminPassword:
    type: String
    description: "Portal administrator password"
  PortalAdminEmail:
    type: String
    description: "Portal administrator email address"
  SecurityQuestionAnswer:
    type: String
    description: "Portal security question answer"
  PortalPrivateDomain:
    type: String
    description: "Private domain for Portal (e.g., internal-portal.domain.com)"
  PortalDomain:
    type: String
    description: "Public domain for Portal (e.g., portal.domain.com)"
  PortalHostname:
    type: String
    description: "Portal machine hostname (e.g., portal-server.domain.com)"
  PortalRole:
    type: String
    description: "Portal role: Primary or Standby"
    default: "Primary"
    allowedValues:
      - "Primary"
      - "Standby"
  PrimaryPortalDNSName:
    type: String
    description: "Primary ArcGIS Portal DNS Name (for standby join and HA operations)"
    default: ""
  EfsId:
    type: String
    description: "EFS file system ID for shared portal content store"
mainSteps:
  - action: aws:runShellScript
    name: prepSystem
    inputs:
      runCommand:
        - "#!/bin/bash"
        - "set -euxo pipefail"
        - ""
        - "LOG_DIR=/var/log/portal-config"
        - 'mkdir -p "$LOG_DIR"'
        - 'exec > >(tee -a "$LOG_DIR/prepSystem.log") 2>&1'
        - 'echo "=== prepSystem: starting at $(date) ==="'
        - ""
        - 'echo "=== prepSystem: finished at $(date) ==="'

  - action: aws:runShellScript
    name: MountEfsStorage
    description: "Mount EFS share for Portal content store"
    inputs:
      runCommand:
        - "#!/bin/bash"
        - "set -euxo pipefail"
        - ""
        - "LOG_DIR=/var/log/portal-config"
        - 'mkdir -p "$LOG_DIR"'
        - 'exec > >(tee -a "$LOG_DIR/MountEfsStorage.log") 2>&1'
        - 'echo "=== MountEfsStorage: starting at $(date) ==="'
        - ""
        - 'EFS_ID="{{ EfsId }}"'
        - 'MNT_DIR="/mnt/arcgisportal"'
        - ""
        - 'if [ -z "$EFS_ID" ]; then'
        - '  echo "ERROR: EFS_ID not provided"'
        - "  exit 1"
        - "fi"
        - ""
        - 'echo "Installing required packages..."'
        - "yum update -y"
        - "yum install -y jq curl"
        - ""
        - 'echo "Building and Installing efs-utils from source..."'
        - "curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y"
        - "source /root/.cargo/env"
        - "yum -y install golang git rpm-build make rust cargo openssl-devel cmake wget perl"
        - 'if [ ! -d "efs-utils" ]; then'
        - "  git clone https://github.com/aws/efs-utils"
        - "  cd efs-utils"
        - "  make rpm"
        - "  yum -y install build/amazon-efs-utils*rpm"
        - "fi"
        - ""
        - 'echo "Mounting EFS share..."'
        - 'if [[ -d "${MNT_DIR}" ]]; then'
        - '  echo "Directory ${MNT_DIR} already exists"'
        - "else"
        - '  mkdir -p "${MNT_DIR}"'
        - '  echo "Created directory ${MNT_DIR}"'
        - "fi"
        - ""
        - 'echo "Adding EFS mount to fstab (avoid duplicates)..."'
        - 'if ! grep -q "${EFS_ID}:/" /etc/fstab; then'
        - '  echo "${EFS_ID}:/ ${MNT_DIR} efs _netdev,tls,iam 0 0" >> /etc/fstab'
        - '  echo "Successfully added EFS mount to /etc/fstab"'
        - "else"
        - '  echo "EFS mount already exists in /etc/fstab"'
        - "fi"
        - ""
        - "mount -fav"
        - ""
        - 'if mountpoint -q "${MNT_DIR}"; then'
        - '  echo "EFS share mounted successfully"'
        - "else"
        - '  echo "ERROR: Failed to mount EFS share"'
        - "  exit 1"
        - "fi"
        - ""
        - 'if [[ ! -d "${MNT_DIR}" ]]; then'
        - '  echo "ERROR: Directory ${MNT_DIR} does not exist"'
        - "  exit 1"
        - "fi"
        - ""
        - "chown -R arcgis:arcgis /mnt/arcgisportal"
        - "chmod -R 755 /mnt/arcgisportal"
        - ""
        - 'echo "=== MountEfsStorage: finished at $(date) ==="'

  - action: aws:runShellScript
    name: downloadAssets
    inputs:
      runCommand:
        - "#!/bin/bash"
        - "set -euxo pipefail"
        - ""
        - "LOG_DIR=/var/log/portal-config"
        - 'mkdir -p "$LOG_DIR"'
        - 'exec > >(tee -a "$LOG_DIR/downloadAssets.log") 2>&1'
        - 'echo "=== downloadAssets: starting at $(date) ==="'
        - ""
        - 'mkdir -p "/opt/arcgis/certificate"'
        - 'aws s3 cp "s3://{{ S3Bucket }}/{{ PortalRootCertName }}" "/opt/arcgis/certificate/{{ PortalRootCertName }}" --region {{ S3Region }} || (echo ''Failed to download root cert'' >&2; exit 1)'
        - 'aws s3 cp "s3://{{ S3Bucket }}/{{ PortalPfxCertName }}" "/opt/arcgis/certificate/{{ PortalPfxCertName }}" --region {{ S3Region }} || (echo ''Failed to download pfx cert'' >&2; exit 1)'
        - ""
        - 'mkdir -p "/opt/arcgis/license/{{ EsriVersion }}"'
        - 'aws s3 cp "s3://{{ S3Bucket }}/{{ PortalLicenseName }}" "/opt/arcgis/license/{{ EsriVersion }}/{{ PortalLicenseName }}" --region {{ S3Region }} || (echo ''Failed to download license'' >&2; exit 1)'
        - ""
        - 'echo "=== downloadAssets: finished at $(date) ==="'

  - action: aws:runShellScript
    name: runFileServerConfig
    description: "Run Portal FileServer cinc-client config (Primary only)"
    precondition:
      StringEquals:
        - "{{ PortalRole }}"
        - "Primary"
    inputs:
      runCommand:
        - "#!/bin/bash"
        - "set -euxo pipefail"
        - ""
        - "LOG_DIR=/var/log/portal-config"
        - 'mkdir -p "$LOG_DIR"'
        - 'exec > >(tee -a "$LOG_DIR/portal-fileserver.log") 2>&1'
        - 'echo "=== runFileServerConfig: starting at $(date) ==="'
        - ""
        - "if [ ! -f /opt/cinc/attributes/arcgis-config-portal-fileserver.json ]; then"
        - '  echo "ERROR: /opt/cinc/attributes/arcgis-config-portal-fileserver.json not found" >&2'
        - "  exit 1"
        - "fi"
        - ""
        - 'cinc-client -z -c /etc/cinc/client.rb -j /opt/cinc/attributes/arcgis-config-portal-fileserver.json 2>&1 | tee -a "$LOG_DIR/portal-fileserver.log"'
        - "RC=${PIPESTATUS[0]}"
        - 'if [ $RC -ne 0 ]; then echo "FileServer cinc-client failed with exit $RC" >&2; exit $RC; fi'
        - "touch /var/run/portal_fileserver_done"
        - 'echo "=== runFileServerConfig: finished at $(date) ==="'

  - action: aws:runShellScript
    name: waitForFileServer
    description: "Wait for FileServer config to complete (Primary only)"
    precondition:
      StringEquals:
        - "{{ PortalRole }}"
        - "Primary"
    inputs:
      runCommand:
        - "#!/bin/bash"
        - "set -euxo pipefail"
        - ""
        - "LOG_DIR=/var/log/portal-config"
        - 'mkdir -p "$LOG_DIR"'
        - 'exec > >(tee -a "$LOG_DIR/waitForFileServer.log") 2>&1'
        - 'echo "Waiting for portal_fileserver_done marker..."'
        - "COUNT=0"
        - "while [ ! -f /var/run/portal_fileserver_done ]; do"
        - "  sleep 5"
        - "  COUNT=$((COUNT+1))"
        - "  if [ $COUNT -ge 720 ]; then echo 'Timed out waiting for portal_fileserver_done' >&2; exit 1; fi"
        - "done"
        - 'echo "portal_fileserver_done found, continuing."'

  - action: aws:runShellScript
    name: runPortalPrimaryConfig
    description: "Run Portal Primary cinc-client config (Primary only)"
    precondition:
      StringEquals:
        - "{{ PortalRole }}"
        - "Primary"
    inputs:
      runCommand:
        - "#!/bin/bash"
        - "set -euxo pipefail"
        - ""
        - "LOG_DIR=/var/log/portal-config"
        - 'mkdir -p "$LOG_DIR"'
        - 'exec > >(tee -a "$LOG_DIR/portal-primary.log") 2>&1'
        - 'echo "=== runPortalPrimaryConfig: starting at $(date) ==="'
        - ""
        - "if [ ! -f /opt/cinc/attributes/arcgis-config-portal-primary.json ]; then"
        - '  echo "ERROR: /opt/cinc/attributes/arcgis-config-portal-primary.json not found" >&2'
        - "  exit 1"
        - "fi"
        - ""
        - 'echo "Replacing runtime tokens in arcgis-config-portal-primary.json..."'
        - 'sed -i "s|__PORTAL_ADMIN_USERNAME__|{{ PortalAdminUsername }}|g" /opt/cinc/attributes/arcgis-config-portal-primary.json'
        - 'sed -i "s|__PORTAL_ADMIN_PASSWORD__|{{ PortalAdminPassword }}|g" /opt/cinc/attributes/arcgis-config-portal-primary.json'
        - 'sed -i "s|__PORTAL_ADMIN_EMAIL__|{{ PortalAdminEmail }}|g" /opt/cinc/attributes/arcgis-config-portal-primary.json'
        - 'sed -i "s|__SECURITY_QUESTION_ANSWER__|{{ SecurityQuestionAnswer }}|g" /opt/cinc/attributes/arcgis-config-portal-primary.json'
        - 'sed -i "s|__PORTAL_PRIVATE_DOMAIN__|{{ PortalPrivateDomain }}|g" /opt/cinc/attributes/arcgis-config-portal-primary.json'
        - 'sed -i "s|__PORTAL_DOMAIN__|{{ PortalDomain }}|g" /opt/cinc/attributes/arcgis-config-portal-primary.json'
        - 'sed -i "s|__PORTAL_HOSTNAME__|{{ PortalHostname }}|g" /opt/cinc/attributes/arcgis-config-portal-primary.json'
        - 'sed -i "s|__PORTAL_HOSTIDENTIFIER__|{{ PortalHostname }}|g" /opt/cinc/attributes/arcgis-config-portal-primary.json'
        - ""
        - 'cinc-client -z -c /etc/cinc/client.rb -j /opt/cinc/attributes/arcgis-config-portal-primary.json 2>&1 | tee -a "$LOG_DIR/portal-primary.log"'
        - "RC=${PIPESTATUS[0]}"
        - 'if [ $RC -ne 0 ]; then echo "Portal Primary cinc-client failed with exit $RC" >&2; exit $RC; fi'
        - "touch /var/run/portal_primary_done"
        - 'echo "=== runPortalPrimaryConfig: finished at $(date) ==="'

  - action: aws:runShellScript
    name: waitForPortalPrimary
    description: "Wait for Portal Primary config to complete (Primary only)"
    precondition:
      StringEquals:
        - "{{ PortalRole }}"
        - "Primary"
    inputs:
      runCommand:
        - "#!/bin/bash"
        - "set -euxo pipefail"
        - ""
        - "LOG_DIR=/var/log/portal-config"
        - 'mkdir -p "$LOG_DIR"'
        - 'exec > >(tee -a "$LOG_DIR/waitForPortalPrimary.log") 2>&1'
        - 'echo "Waiting for portal_primary_done marker..."'
        - "COUNT=0"
        - "while [ ! -f /var/run/portal_primary_done ]; do"
        - "  sleep 5"
        - "  COUNT=$((COUNT+1))"
        - "  if [ $COUNT -ge 720 ]; then echo 'Timed out waiting for portal_primary_done' >&2; exit 1; fi"
        - "done"
        - 'echo "portal_primary_done found, continuing."'

  - action: aws:runShellScript
    name: runPortalStandbyConfig
    description: "Run Portal Standby cinc-client config (Standby only)"
    precondition:
      StringEquals:
        - "{{ PortalRole }}"
        - "Standby"
    inputs:
      runCommand:
        - "#!/bin/bash"
        - "set -euxo pipefail"
        - ""
        - "LOG_DIR=/var/log/portal-config"
        - 'mkdir -p "$LOG_DIR"'
        - 'exec > >(tee -a "$LOG_DIR/portal-standby.log") 2>&1'
        - 'echo "=== runPortalStandbyConfig: starting at $(date) ==="'
        - ""
        - "if [ ! -f /opt/cinc/attributes/arcgis-config-portal-standby.json ]; then"
        - '  echo "ERROR: /opt/cinc/attributes/arcgis-config-portal-standby.json not found" >&2'
        - "  exit 1"
        - "fi"
        - ""
        - 'echo "Replacing runtime tokens in arcgis-config-portal-standby.json..."'
        - 'sed -i "s|__PRIMARY_PORTAL_DNSNAME__|{{ PrimaryPortalDNSName }}|g" /opt/cinc/attributes/arcgis-config-portal-standby.json'
        - 'sed -i "s|__PORTAL_ADMIN_USERNAME__|{{ PortalAdminUsername }}|g" /opt/cinc/attributes/arcgis-config-portal-standby.json'
        - 'sed -i "s|__PORTAL_ADMIN_PASSWORD__|{{ PortalAdminPassword }}|g" /opt/cinc/attributes/arcgis-config-portal-standby.json'
        - ""
        - 'cinc-client -z -c /etc/cinc/client.rb -j /opt/cinc/attributes/arcgis-config-portal-standby.json 2>&1 | tee -a "$LOG_DIR/portal-standby.log"'
        - "RC=${PIPESTATUS[0]}"
        - 'if [ $RC -ne 0 ]; then echo "Portal Standby cinc-client failed with exit $RC" >&2; exit $RC; fi'
        - "touch /var/run/portal_standby_done"
        - 'echo "=== runPortalStandbyConfig: finished at $(date) ==="'

  - action: aws:runShellScript
    name: waitForPortalStandby
    description: "Wait for Portal Standby config to complete (Standby only)"
    precondition:
      StringEquals:
        - "{{ PortalRole }}"
        - "Standby"
    inputs:
      runCommand:
        - "#!/bin/bash"
        - "set -euxo pipefail"
        - ""
        - "LOG_DIR=/var/log/portal-config"
        - 'mkdir -p "$LOG_DIR"'
        - 'exec > >(tee -a "$LOG_DIR/waitForPortalStandby.log") 2>&1'
        - 'echo "Waiting for portal_standby_done marker..."'
        - "COUNT=0"
        - "while [ ! -f /var/run/portal_standby_done ]; do"
        - "  sleep 5"
        - "  COUNT=$((COUNT+1))"
        - "  if [ $COUNT -ge 720 ]; then echo 'Timed out waiting for portal_standby_done' >&2; exit 1; fi"
        - "done"
        - 'echo "portal_standby_done found, continuing."'

  - action: aws:runShellScript
    name: VerifyHAStatus
    description: "Verify Portal high availability status (Standby only)"
    precondition:
      StringEquals:
        - "{{ PortalRole }}"
        - "Standby"
    inputs:
      runCommand:
        - "#!/bin/bash"
        - "set -euxo pipefail"
        - ""
        - "LOG_DIR=/var/log/portal-config"
        - 'mkdir -p "$LOG_DIR"'
        - 'exec > >(tee -a "$LOG_DIR/VerifyHAStatus.log") 2>&1'
        - 'echo "=== VerifyHAStatus: starting at $(date) ==="'
        - ""
        - 'PORTAL_ADMIN_USER="{{ PortalAdminUsername }}"'
        - 'PORTAL_ADMIN_PASSWORD="{{ PortalAdminPassword }}"'
        - 'PRIMARY_HOST_NAME="{{ PrimaryPortalDNSName }}"'
        - ""
        - 'token=$(curl -k -s -X POST "https://$PRIMARY_HOST_NAME:7443/arcgis/sharing/rest/generateToken" \'
        - '  -d "username=$PORTAL_ADMIN_USER" \'
        - '  -d "password=$PORTAL_ADMIN_PASSWORD" \'
        - '  -d "client=requestip" \'
        - '  -d "f=json" | jq -r ''.token'')'
        - ""
        - 'if [ "$token" = "null" ] || [ -z "$token" ]; then'
        - '  echo "WARNING: Failed to get admin token for verification"'
        - "  exit 0"
        - "fi"
        - ""
        - 'echo "Portal HA status:"'
        - 'curl -k -s "https://$PRIMARY_HOST_NAME:7443/arcgis/portaladmin/machines?f=json&token=$token" | jq ''.'''
        - 'echo "=== VerifyHAStatus: finished at $(date) ==="'

  - action: aws:runShellScript
    name: FinalizeConfiguration
    description: "Finalize configuration and log completion"
    inputs:
      runCommand:
        - "#!/bin/bash"
        - ""
        - "LOG_DIR=/var/log/portal-config"
        - 'mkdir -p "$LOG_DIR"'
        - 'exec > >(tee -a "$LOG_DIR/FinalizeConfiguration.log") 2>&1'
        - 'echo "=== FinalizeConfiguration: starting at $(date) ==="'
        - ""
        - 'PORTAL_ROLE="{{ PortalRole }}"'
        - 'PORTAL_HOST_NAME="{{ PortalHostname }}"'
        - ""
        - 'echo "========================================"'
        - 'echo "ArcGIS Portal initialization completed"'
        - 'echo "Portal Role: $PORTAL_ROLE"'
        - 'echo "Portal Hostname: $PORTAL_HOST_NAME"'
        - 'echo "Portal URL: https://$PORTAL_HOST_NAME:7443/arcgis/home"'
        - 'echo "Portal Admin URL: https://$PORTAL_HOST_NAME:7443/arcgis/portaladmin"'
        - 'echo "Time: $(date)"'
        - 'echo "========================================"'
        - 'echo "=== FinalizeConfiguration: finished at $(date) ==="'
