name: Install ArcGIS Web Adaptor on Linux
description: Download and install ArcGIS Web Adaptor on RHEL Linux
schemaVersion: 1.0

phases:
  - name: build
    steps:
      - name: UpdateOS
        action: UpdateOS
        inputs:
          exclude:
            - amazon-ssm-agent

      - name: InstallDependencies
        action: ExecuteBash
        inputs:
          commands:
            - yum install -y wget jq autofs unzip tar nfs-utils httpd mod_ssl java-1.8.0-openjdk which firewalld
            - systemctl enable firewalld && systemctl start firewalld
            - firewall-cmd --zone=public --permanent --add-port=8080/tcp
            - firewall-cmd --zone=public --permanent --add-port=443/tcp
            - firewall-cmd --zone=public --permanent --add-port=8443/tcp
            - firewall-cmd --zone=public --add-service=http --permanent
            - firewall-cmd --zone=public --add-service=https --permanent
            - firewall-cmd --reload

      - name: ConfigureUsers
        action: ExecuteBash
        inputs:
          commands:
            - groupadd -g 1100 arcgis || true
            - useradd -m -d /home/arcgis -u 1100 -g 1100 arcgis || true
            - groupadd -g 1101 tomcat || true
            - useradd -m -d /home/tomcat -u 1101 -g 1101 tomcat || true

      - name: CreateDirectories
        action: ExecuteBash
        inputs:
          commands:
            - mkdir -p /opt/arcgis /opt/software/{java,arcgis,tomcat}

      - name: DownloadSoftware
        action: S3Download
        inputs:
          - source: s3://${deployment_bucket}/${java_openjdk_17_key_name}
            destination: /opt/software/java/${java_version}/java_openjdk.tar.gz
          - source: s3://${deployment_bucket}/${tomcat_key_name}
            destination: /opt/software/tomcat/${tomcat_version}/apache-tomcat.tar.gz
          - source: s3://${deployment_bucket}/${webadaptor_installer_key_name}
            destination: /opt/software/arcgis/${arcgis_version}/ArcGIS_Web_Adaptor_Linux.tar.gz
          - source: s3://${deployment_bucket}/${workflow_installer_key_name}
            destination: /opt/software/arcgis/${arcgis_version}/ArcGIS_Workflow_Manager_Linux.tar.gz

      - name: InstallJava
        action: ExecuteBash
        inputs:
          commands:
            - java_dir="/opt/java-jdk-${java_version}"
            - mkdir -p "$java_dir" && tar -xzf "/opt/software/java/${java_version}/java_openjdk.tar.gz" -C "/opt/software/java/${java_version}"
            - mv "/opt/software/java/${java_version}/jdk-${java_version}/"* "$java_dir"
            - update-alternatives --install /usr/bin/java java "$java_dir/bin/java" 10
            - export JAVA_HOME="$java_dir" && export PATH="$JAVA_HOME/bin:$PATH"
            - echo "export JAVA_HOME=$java_dir" > /etc/profile.d/java.sh
            - echo "$java_dir/lib" | tee /etc/ld.so.conf.d/java.conf # Configure System Linker for JDK
            - ldconfig

      - name: InstallTomcat
        action: ExecuteBash
        inputs:
          commands:
            - tomcat_dir="/opt/tomcat-${tomcat_version}"
            - mkdir -p "$tomcat_dir"
            - tar -xzf "/opt/software/tomcat/${tomcat_version}/apache-tomcat.tar.gz" -C "/opt/software/tomcat/${tomcat_version}"
            - mv "/opt/software/tomcat/${tomcat_version}/apache-tomcat-${tomcat_version}/"* "$tomcat_dir"
            - chown -R tomcat:tomcat "$tomcat_dir"
            - chmod +x "$tomcat_dir/bin/"*.sh

      - name: ConfigureTomcatHttps
        action: ExecuteBash
        inputs:
          commands:
            - |
                TEMP_CERT="/tmp/ssl_certificate.pfx" # Generate self-signed certificate if no certificate is provided
                CERT_TEMP_DIR="/tmp/cert_gen" # Temporary directory for certificate generation
                CERT_SUBJECT="/C=US/ST=State/L=City/O=Organization/OU=IT Department/CN=$(hostname -f)"
                CERT_VALIDITY_DAYS="800"
                tomcat_dir="/opt/tomcat-${tomcat_version}"
                SERVER_XML="$tomcat_dir/conf/server.xml"
                keystore_file="$tomcat_dir/conf/keystore.jks"
                echo "Generating self-signed SSL certificate..."
                echo "ssl_cert_password: ${ssl_cert_password}"
                mkdir -p "$CERT_TEMP_DIR"
                openssl genrsa -out "$CERT_TEMP_DIR/private.key" 2048
                openssl req -new -key "$CERT_TEMP_DIR/private.key" -out "$CERT_TEMP_DIR/cert.csr" -subj "$CERT_SUBJECT"
                openssl x509 -req -in "$CERT_TEMP_DIR/cert.csr" -signkey "$CERT_TEMP_DIR/private.key" -out "$CERT_TEMP_DIR/cert.crt" -days "$CERT_VALIDITY_DAYS" || {
                    echo "ERROR: Failed to generate self-signed certificate"
                    rm -rf "$CERT_TEMP_DIR"
                    exit 1
                }
                openssl pkcs12 -export -out "$TEMP_CERT" -inkey "$CERT_TEMP_DIR/private.key" -in "$CERT_TEMP_DIR/cert.crt" -password "pass:${ssl_cert_password}" || {
                    echo "ERROR: Failed to convert certificate to PKCS12 format"
                    rm -rf "$CERT_TEMP_DIR"
                    exit 1
                }
                rm -rf "$CERT_TEMP_DIR"
                echo "Converting PFX certificate to JKS keystore..."
                if [ -f "$keystore_file" ]; then
                    rm -f "$keystore_file"
                fi
                mkdir -p "$(dirname "$keystore_file")"
                /opt/java-jdk-${java_version}/bin/keytool -importkeystore \
                -srckeystore "$TEMP_CERT" \
                -srcstoretype PKCS12 \
                -srcstorepass "${ssl_cert_password}" \
                -srcalias 1 \
                -destkeystore "$keystore_file" \
                -deststoretype JKS \
                -deststorepass "${ssl_cert_password}" \
                -destkeypass "${ssl_cert_password}" \
                -destalias "tomcat" \
                -noprompt || {
                  echo "ERROR: Failed to convert certificate to JKS keystore"
                  exit 1
                }
                chown "tomcat:tomcat" "$keystore_file"
                chmod 600 "$keystore_file"
                rm -f "$TEMP_CERT"
                echo "SSL certificate imported successfully and configuring Tomcat for HTTPS..."
                # Read existing server.xml content
                cp "$SERVER_XML" "$SERVER_XML.bak"
                
                # Remove existing HTTPS connector on port 8443 if it exists
                sed -i '/<Connector port="8443"/,/<\/Connector>/d' "$SERVER_XML"
                
                # Add new HTTPS connector with keystore configuration before </Service> tag
                sed -i "/<\/Service>/i\\
                  <!-- HTTPS Connector -->\\
                  <Connector port=\"443\"\\
                        protocol=\"org.apache.coyote.http11.Http11NioProtocol\"\\
                        maxThreads=\"150\"\\
                        SSLEnabled=\"true\"\\
                        compression=\"on\"\\
                        compressionMinSize=\"2048\"\\
                        noCompressionUserAgents=\"gozilla, traviata\"\\
                        compressibleMimeType=\"text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json\">\\
                    <SSLHostConfig>\\
                    <Certificate certificateKeystoreFile=\"$keystore_file\"\\
                          certificateKeystorePassword=\"${ssl_cert_password}\"\\
                          certificateKeyAlias=\"tomcat\"\\
                          type=\"RSA\" />\\
                    </SSLHostConfig>\\
                  </Connector>" "$SERVER_XML"
                setcap 'cap_net_bind_service=+ep' /opt/java-jdk-${java_version}/bin/java
                chown "tomcat:tomcat" "$SERVER_XML"

      - name: ConfigureTomcatService
        action: ExecuteBash
        inputs:
          commands:
            - |
                cat > /etc/systemd/system/tomcat.service << EOF
                [Unit]
                Description=Apache Tomcat
                After=network.target
                [Service]
                Type=simple
                User=tomcat
                Group=tomcat
                Environment=JAVA_HOME=/opt/java-jdk-${java_version}
                Environment=CATALINA_HOME=/opt/tomcat-${tomcat_version}
                Environment=CATALINA_PID=/opt/tomcat-${tomcat_version}/temp/tomcat.pid
                Environment=CATALINA_BASE=/opt/tomcat-${tomcat_version}
                Environment='CATALINA_OPTS=-Xms512M -Xmx1024M -server -XX:+UseParallelGC'
                Environment='JAVA_OPTS=-Djava.awt.headless=true -Djava.security.egd=file:/dev/./urandom'
                ExecStart=/opt/tomcat-${tomcat_version}/bin/catalina.sh run
                ExecStop=/opt/tomcat-${tomcat_version}/bin/catalina.sh stop
                UMask=0007
                RestartSec=10
                Restart=always
                [Install]
                WantedBy=multi-user.target
                EOF
                systemctl daemon-reload
                systemctl enable tomcat
                systemctl start tomcat
                chown -R "tomcat:tomcat" "/opt/tomcat-${tomcat_version}"
                chmod +x "/opt/tomcat-${tomcat_version}/bin/"*.sh

      - name: InstallArcGISWebAdaptor
        action: ExecuteBash
        inputs:
          commands:
            - tar -xzf "/opt/software/arcgis/${arcgis_version}/ArcGIS_Web_Adaptor_Linux.tar.gz" -C "/opt/software/arcgis/${arcgis_version}"
            - chmod +x "/opt/software/arcgis/${arcgis_version}/WebAdaptor/Setup"
            - chown arcgis:arcgis /opt/arcgis
            - cd "/opt/software/arcgis/${arcgis_version}/WebAdaptor"
            - ./Setup -m silent -l yes -d /opt/arcgis/

  - name: validate
    steps:
      - name: ValidateInstallation
        action: ExecuteBash
        inputs:
          commands:
            - test -f /opt/arcgis/webadaptor${arcgis_version}/java/arcgis.war
            - test -f /opt/tomcat-${tomcat_version}/bin/catalina.sh
            - | 
                response_code=$(curl -k -o /dev/null -s -w "%%{http_code}\n" https://localhost:443 || true)
                if [ "$response_code" -eq 200 ] || [ "$response_code" -eq 403 ]; then
                    echo "HTTPS validation successful with response code: $response_code";
                else
                  echo "ERROR: HTTPS validation failed with response code: $response_code";
                fi