schemaVersion: '2.2'
description: 'Configure ArcGIS Web Adaptor 11.5 on EC2 instance with Tomcat deployment'
parameters:
  TomcatHome:
    type: String
    description: 'Path to Tomcat installation directory'
    default: '/opt/tomcat-9.0.106'
  WAWarFile:
    type: String
    description: 'Path to Web Adaptor WAR file'
    default: '/opt/arcgis/webadaptor11.5/java/arcgis.war'
  WebAdaptorConfig:
    type: String
    description: 'JSON configuration for web adaptors with name, DNS, username and password'
    default: '[{"name":"portal","dnsName":"portal.example.com","username":"portaladmin","password":"changeme"},{"name":"hosted","dnsName":"hosted.example.com","username":"siteadmin","password":"changeme"}]'
  ArcGISVersion:
    type: String
    description: 'ArcGIS version'
    default: '11.5'
  PrivateDNSName:
    type: String
    description: 'This Webadaptor site machine private DNS name'
    default: 'ip-00-00-00-00.us-west-2.compute.internal'
  InstanceID:
    type: String
    description: 'WebAdaptor EC2 Instance ID'
    default: 'i-0123456789abcdef0'
  S3InstallBucket:
    type: String
    description: 'S3 bucket containing installation files'
    default: 'elevate-installer'
  JavaOpenJDKS3KeyName:
    type: String
    description: 'S3 key for Java OpenJDK installation package'
    default: 'tomcat/OpenJDK17U-jdk_x64_linux_hotspot_17.0.13_11.tar.gz'
  TomcatS3KeyName:
    type: String
    description: 'S3 key for Tomcat installation package'
    default: 'tomcat/apache-tomcat-9.0.106.tar.gz'
  WebAdaptorS3KeyName:
    type: String
    description: 'S3 key for ArcGIS Web Adaptor installation package'
    default: 'esri/arcgis-enterprise/11-5/ArcGIS_Web_Adaptor_Java_Linux_115_195462.tar.gz'
  JavaVersion:
    type: String
    description: 'Java OpenJDK version'
    default: '17.0.13+11'
  TomcatVersion:
    type: String
    description: 'Tomcat version'
    default: '9.0.106'
  TomcatGroupID:
    type: String
    description: 'Tomcat group ID'
    default: '1101'
  ArcGISGroupID:
    type: String
    description: 'ArcGIS group ID'
    default: '1100'

mainSteps:
  - name: DisableRHELSubscriptionManager
    action: 'aws:runShellScript'
    description: 'Disable RHEL Subscription Manager to prevent subscription prompts'
    inputs:
      runCommand:
        - |
          #!/bin/bash
          set -e
          subscription-manager config --rhsm.manage_repos=0
          subscription-manager config --rhsm.auto_enable_yum_plugins=0
          sed -i 's/enabled[ ]*=[ ]*1/enabled=0/g' /etc/yum/pluginconf.d/subscription-manager.conf
          
  - name: InitializeSystem
    action: 'aws:runShellScript'
    description: 'Initialize system and prepare for Web Adaptor installation'
    timeoutSeconds: 1800
    onFailure: Abort
    inputs:
      runCommand:
        - |
          #!/bin/bash
          set -e
          
          LOG_FILE="/var/log/arcgis-web-adaptor-setup.log"
          exec > >(tee -a "$LOG_FILE")
          exec 2>&1
          
          echo "========================================" 
          echo "Starting ArcGIS WebAdaptor initialization" 
          echo "Time: $(date)" 
          echo "========================================" 
          
          INSTANCE_ID="{{ InstanceID }}"

          # Update instance hostname
          hostnamectl set-hostname "arcgis-webadaptor-$INSTANCE_ID"
          echo "SUCCESS: Hostname updated to arcgis-webadaptor-$INSTANCE_ID"
          
          echo "Installing system dependencies..."
          
          # Install required packages
          yum update -y
          yum install -y wget jq autofs unzip tar nfs-utils httpd mod_ssl which firewalld
          
          # Configure firewall
          systemctl enable firewalld && systemctl start firewalld
          firewall-cmd --zone=public --permanent --add-port=8080/tcp
          firewall-cmd --zone=public --permanent --add-port=443/tcp
          firewall-cmd --zone=public --permanent --add-port=8443/tcp
          firewall-cmd --zone=public --add-service=http --permanent
          firewall-cmd --zone=public --add-service=https --permanent
          firewall-cmd --reload
          
          echo "SUCCESS: System dependencies installed and firewall configured"

  - name: CreateUsersAndDirectories
    action: 'aws:runShellScript'
    description: 'Create required users and directories'
    onFailure: Abort
    inputs:
      runCommand:
        - |
          #!/bin/bash
          set -e
          
          LOG_FILE="/var/log/arcgis-web-adaptor-setup.log"
          exec > >(tee -a "$LOG_FILE")
          exec 2>&1
          
          echo "========================================" 
          echo "Creating users and directories..."
          echo "Time: $(date)" 
          echo "========================================" 
          
          # Create users and groups
          if ! getent group arcgis > /dev/null 2>&1; then
          groupadd -g "{{ ArcGISGroupID }}" arcgis
          echo "Group arcgis created"
          else
          echo "Group arcgis already exists, skipping"
          fi
          
          if ! id arcgis > /dev/null 2>&1; then
          useradd -m -d /home/arcgis -u "{{ ArcGISGroupID }}" -g "{{ ArcGISGroupID }}" arcgis
          echo "User arcgis created"
          else
          echo "User arcgis already exists, skipping"
          fi
          
          if ! getent group tomcat > /dev/null 2>&1; then
          groupadd -g "{{ TomcatGroupID }}" tomcat
          echo "Group tomcat created"
          else
          echo "Group tomcat already exists, skipping"
          fi
          
          if ! id tomcat > /dev/null 2>&1; then
          useradd -m -d /home/tomcat -u "{{ TomcatGroupID }}" -g "{{ TomcatGroupID }}" tomcat
          echo "User tomcat created"
          else
          echo "User tomcat already exists, skipping"
          fi
          
          # Create directories
          if [ ! -d /opt/arcgis ]; then
            mkdir -p /opt/arcgis
            echo "Directory /opt/arcgis created"
          else
            echo "Directory /opt/arcgis already exists, skipping"
          fi

          if [ ! -d /opt/software/java ]; then
            mkdir -p /opt/software/java
            echo "Directory /opt/software/java created"
          else
            echo "Directory /opt/software/java already exists, skipping"
          fi

          if [ ! -d /opt/software/arcgis ]; then
            mkdir -p /opt/software/arcgis
            echo "Directory /opt/software/arcgis created"
          else
            echo "Directory /opt/software/arcgis already exists, skipping"
          fi

          if [ ! -d /opt/software/tomcat ]; then
            mkdir -p /opt/software/tomcat
            echo "Directory /opt/software/tomcat created"
          else
            echo "Directory /opt/software/tomcat already exists, skipping"
          fi
          echo "SUCCESS: Users and directories created"

  - name: DownloadAndInstallJava
    action: 'aws:runShellScript'
    description: 'Download and install Java OpenJDK 17'
    onFailure: Abort
    timeoutSeconds: 1800
    inputs:
      runCommand:
        - |
          #!/bin/bash
          set -e
          
          LOG_FILE="/var/log/arcgis-web-adaptor-setup.log"
          exec > >(tee -a "$LOG_FILE")
          exec 2>&1
          
          JAVA_VERSION="{{ JavaVersion }}"
          S3_BUCKET="{{ S3InstallBucket }}"
          JAVA_S3_KEY="{{ JavaOpenJDKS3KeyName }}"
          
          echo "Downloading Java OpenJDK ${JAVA_VERSION}..."
          
          # Download Java if not already present
          if [ ! -f "/opt/software/java/${JAVA_VERSION}/java_openjdk.tar.gz" ]; then
            mkdir -p "/opt/software/java/${JAVA_VERSION}"
            aws s3 cp "s3://${S3_BUCKET}/${JAVA_S3_KEY}" "/opt/software/java/${JAVA_VERSION}/java_openjdk.tar.gz"
          fi
          
          # Install Java
          java_dir="/opt/java-jdk-${JAVA_VERSION}"
          echo "Installing Java OpenJDK ${JAVA_VERSION}..."
          if [ ! -d "$java_dir" ]; then
            mkdir -p "$java_dir"
            tar -xzf "/opt/software/java/${JAVA_VERSION}/java_openjdk.tar.gz" -C "/opt/software/java/${JAVA_VERSION}"
            mv "/opt/software/java/${JAVA_VERSION}/jdk-${JAVA_VERSION}/"* "$java_dir"
            echo "Directory $java_dir created and Java installed"
          else
            echo "Directory $java_dir already exists, skipping"
          fi
          
          # Configure Java alternatives and environment
          update-alternatives --install /usr/bin/java java "$java_dir/bin/java" 10
          echo "export JAVA_HOME=$java_dir" > /etc/profile.d/java.sh
          echo "$java_dir/lib" | tee /etc/ld.so.conf.d/java.conf
          ldconfig
          
          echo "SUCCESS: Java OpenJDK ${JAVA_VERSION} installed"

  - name: DownloadAndInstallTomcat
    action: 'aws:runShellScript'
    description: 'Download and install Apache Tomcat'
    onFailure: Abort
    timeoutSeconds: 1800
    inputs:
      runCommand:
        - |
          #!/bin/bash
          set -e
          
          LOG_FILE="/var/log/arcgis-web-adaptor-setup.log"
          exec > >(tee -a "$LOG_FILE")
          exec 2>&1
          
          TOMCAT_VERSION="{{ TomcatVersion }}"
          S3_BUCKET="{{ S3InstallBucket }}"
          TOMCAT_S3_KEY="{{ TomcatS3KeyName }}"
          
          echo "Downloading and installing Apache Tomcat ${TOMCAT_VERSION}..."
          
          # Download Tomcat if not already present
          if [ ! -f "/opt/software/tomcat/${TOMCAT_VERSION}/apache-tomcat.tar.gz" ]; then
            mkdir -p "/opt/software/tomcat/${TOMCAT_VERSION}"
            aws s3 cp "s3://${S3_BUCKET}/${TOMCAT_S3_KEY}" "/opt/software/tomcat/${TOMCAT_VERSION}/apache-tomcat.tar.gz"
          fi
          
          # Install Tomcat
          tomcat_dir="/opt/tomcat-${TOMCAT_VERSION}"
          if [ ! -d "$tomcat_dir" ]; then
            mkdir -p "$tomcat_dir"
            tar -xzf "/opt/software/tomcat/${TOMCAT_VERSION}/apache-tomcat.tar.gz" -C "/opt/software/tomcat/${TOMCAT_VERSION}"
            mv "/opt/software/tomcat/${TOMCAT_VERSION}/apache-tomcat-${TOMCAT_VERSION}/"* "$tomcat_dir"
            echo "Directory $tomcat_dir created and Tomcat installed"
          else
            echo "Directory $tomcat_dir already exists, skipping"
          fi
          chown -R tomcat:tomcat "$tomcat_dir"
          chmod +x "$tomcat_dir/bin/"*.sh
          
          echo "SUCCESS: Apache Tomcat ${TOMCAT_VERSION} installed"

  - name: ConfigureTomcatHttps
    action: 'aws:runShellScript'
    description: 'Configure Tomcat with HTTPS support'
    onFailure: Abort
    inputs:
      runCommand:
        - |
          #!/bin/bash
          set -e
          
          LOG_FILE="/var/log/arcgis-web-adaptor-setup.log"
          exec > >(tee -a "$LOG_FILE")
          exec 2>&1
          
          # Generate random password for SSL certificate
          SSL_CERT_PASSWORD=$(openssl rand -base64 32 | tr -d "=+/" | cut -c1-25)
          TOMCAT_VERSION="{{ TomcatVersion }}"
          JAVA_VERSION="{{ JavaVersion }}"
          
          echo "Configuring Tomcat HTTPS..."
          
          tomcat_dir="/opt/tomcat-${TOMCAT_VERSION}"
          SERVER_XML="$tomcat_dir/conf/server.xml"
          keystore_file="$tomcat_dir/conf/keystore.jks"
          TEMP_CERT="/tmp/ssl_certificate.pfx"
          CERT_TEMP_DIR="/tmp/cert_gen"
          CERT_SUBJECT="/C=US/ST=State/L=City/O=Organization/OU=IT Department/CN=$(hostname -f)"
          CERT_VALIDITY_DAYS="800"
          
          # Generate self-signed certificate
          echo "Generating self-signed SSL certificate..."
          mkdir -p "$CERT_TEMP_DIR"
          openssl genrsa -out "$CERT_TEMP_DIR/private.key" 2048
          openssl req -new -key "$CERT_TEMP_DIR/private.key" -out "$CERT_TEMP_DIR/cert.csr" -subj "$CERT_SUBJECT"
          openssl x509 -req -in "$CERT_TEMP_DIR/cert.csr" -signkey "$CERT_TEMP_DIR/private.key" -out "$CERT_TEMP_DIR/cert.crt" -days "$CERT_VALIDITY_DAYS"
          openssl pkcs12 -export -out "$TEMP_CERT" -inkey "$CERT_TEMP_DIR/private.key" -in "$CERT_TEMP_DIR/cert.crt" -password "pass:${SSL_CERT_PASSWORD}"
          rm -rf "$CERT_TEMP_DIR"
          
          # Convert to JKS keystore
          echo "Converting certificate to JKS keystore..."
          if [ -f "$keystore_file" ]; then
            rm -f "$keystore_file"
          fi
          mkdir -p "$(dirname "$keystore_file")"
          /opt/java-jdk-${JAVA_VERSION}/bin/keytool -importkeystore \
          -srckeystore "$TEMP_CERT" \
          -srcstoretype PKCS12 \
          -srcstorepass "${SSL_CERT_PASSWORD}" \
          -srcalias 1 \
          -destkeystore "$keystore_file" \
          -deststoretype JKS \
          -deststorepass "${SSL_CERT_PASSWORD}" \
          -destkeypass "${SSL_CERT_PASSWORD}" \
          -destalias "tomcat" \
          -noprompt
          
          chown "tomcat:tomcat" "$keystore_file"
          chmod 600 "$keystore_file"
          rm -f "$TEMP_CERT"
          
          # Configure server.xml for HTTPS
          cp "$SERVER_XML" "$SERVER_XML.bak"
          sed -i '/<Connector port="8443"/,/<\/Connector>/d' "$SERVER_XML"
          sed -i "/<\/Service>/i\\
            <!-- HTTPS Connector -->\\
            <Connector port=\"443\"\\
                  protocol=\"org.apache.coyote.http11.Http11NioProtocol\"\\
                  maxThreads=\"150\"\\
                  SSLEnabled=\"true\"\\
                  compression=\"on\"\\
                  compressionMinSize=\"2048\"\\
                  noCompressionUserAgents=\"gozilla, traviata\"\\
                  compressibleMimeType=\"text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json\">\\
              <SSLHostConfig>\\
              <Certificate certificateKeystoreFile=\"$keystore_file\"\\
                    certificateKeystorePassword=\"${SSL_CERT_PASSWORD}\"\\
                    certificateKeyAlias=\"tomcat\"\\
                    type=\"RSA\" />\\
              </SSLHostConfig>\\
            </Connector>" "$SERVER_XML"
          
          # Allow Java to bind to privileged ports
          setcap 'cap_net_bind_service=+ep' /opt/java-jdk-${JAVA_VERSION}/bin/java
          chown "tomcat:tomcat" "$SERVER_XML"
          
          echo "SUCCESS: Tomcat HTTPS configured"

  - name: ConfigureTomcatService
    action: 'aws:runShellScript'
    description: 'Configure and start Tomcat service'
    onFailure: Abort
    inputs:
      runCommand:
        - |
          #!/bin/bash
          set -e
          
          LOG_FILE="/var/log/arcgis-web-adaptor-setup.log"
          exec > >(tee -a "$LOG_FILE")
          exec 2>&1
          
          TOMCAT_VERSION={{ TomcatVersion }}
          JAVA_VERSION={{ JavaVersion }}
          
          echo "Configuring Tomcat service..."
          
          cat > /etc/systemd/system/tomcat.service << EOF
          [Unit]
          Description=Apache Tomcat
          After=network.target
          [Service]
          Type=simple
          User=tomcat
          Group=tomcat
          Environment=JAVA_HOME=/opt/java-jdk-${JAVA_VERSION}
          Environment=CATALINA_HOME=/opt/tomcat-${TOMCAT_VERSION}
          Environment=CATALINA_PID=/opt/tomcat-${TOMCAT_VERSION}/temp/tomcat.pid
          Environment=CATALINA_BASE=/opt/tomcat-${TOMCAT_VERSION}
          Environment='CATALINA_OPTS=-Xms512M -Xmx1024M -server -XX:+UseParallelGC'
          Environment='JAVA_OPTS=-Djava.awt.headless=true -Djava.security.egd=file:/dev/./urandom'
          ExecStart=/opt/tomcat-${TOMCAT_VERSION}/bin/catalina.sh run
          ExecStop=/opt/tomcat-${TOMCAT_VERSION}/bin/catalina.sh stop
          UMask=0007
          RestartSec=10
          Restart=always
          [Install]
          WantedBy=multi-user.target
          EOF
          
          systemctl daemon-reload
          systemctl enable tomcat
          systemctl start tomcat
          chown -R "tomcat:tomcat" "/opt/tomcat-${TOMCAT_VERSION}"
          chmod +x "/opt/tomcat-${TOMCAT_VERSION}/bin/"*.sh
          
          echo "SUCCESS: Tomcat service configured and started"

  - name: InstallArcGISWebAdaptor
    action: 'aws:runShellScript'
    description: 'Download and install ArcGIS Web Adaptor'
    onFailure: Abort
    timeoutSeconds: 1800
    inputs:
      runCommand:
        - |
          #!/bin/bash
          set -e
          
          LOG_FILE="/var/log/arcgis-web-adaptor-setup.log"
          exec > >(tee -a "$LOG_FILE")
          exec 2>&1
          
          ARCGIS_VERSION="{{ ArcGISVersion }}"
          S3_BUCKET="{{ S3InstallBucket }}"
          WEBADAPTOR_S3_KEY="{{ WebAdaptorS3KeyName }}"
          
          echo "Downloading and installing ArcGIS Web Adaptor ${ARCGIS_VERSION}..."
          
          # Download Web Adaptor if not already present
          if [ ! -f "/opt/software/arcgis/${ARCGIS_VERSION}/ArcGIS_Web_Adaptor_Linux.tar.gz" ]; then
            mkdir -p "/opt/software/arcgis/${ARCGIS_VERSION}"
            aws s3 cp "s3://${S3_BUCKET}/${WEBADAPTOR_S3_KEY}" "/opt/software/arcgis/${ARCGIS_VERSION}/ArcGIS_Web_Adaptor_Linux.tar.gz"
          fi
          
          # Extract and install Web Adaptor
          tar -xzf "/opt/software/arcgis/${ARCGIS_VERSION}/ArcGIS_Web_Adaptor_Linux.tar.gz" -C "/opt/software/arcgis/${ARCGIS_VERSION}"
          chmod +x "/opt/software/arcgis/${ARCGIS_VERSION}/WebAdaptor/Setup"
          chown -R arcgis:arcgis /opt/arcgis
          
          # Run Web Adaptor installation
          cd "/opt/software/arcgis/${ARCGIS_VERSION}/WebAdaptor"
          su - arcgis -c "cd /opt/software/arcgis/${ARCGIS_VERSION}/WebAdaptor && ./Setup -m silent -l yes -d /opt/arcgis/"
          
          # Verify installation
          if [ ! -f "/opt/arcgis/webadaptor${ARCGIS_VERSION}/java/arcgis.war" ]; then
            echo "ERROR: Web Adaptor WAR file not found after installation"
            exit 1
          fi
          
          echo "SUCCESS: ArcGIS Web Adaptor ${ARCGIS_VERSION} installed"

  - name: ValidateInstallation
    action: 'aws:runShellScript'
    description: 'Validate Web Adaptor and Tomcat installation'
    onFailure: Abort
    inputs:
      runCommand:
        - |
          #!/bin/bash
          set -e
          
          LOG_FILE="/var/log/arcgis-web-adaptor-setup.log"
          exec > >(tee -a "$LOG_FILE")
          exec 2>&1
          
          ARCGIS_VERSION="{{ ArcGISVersion }}"
          TOMCAT_VERSION="{{ TomcatVersion }}"
          
          echo "Validating installation..."
          
          validation_errors=0
          
          # Check Web Adaptor WAR file
          if [ ! -f "/opt/arcgis/webadaptor${ARCGIS_VERSION}/java/arcgis.war" ]; then
            echo "ERROR: Web Adaptor WAR file not found"
            ((validation_errors++))
          else
            echo "✓ Web Adaptor WAR file exists"
          fi
          
          # Check Tomcat installation
          if [ ! -f "/opt/tomcat-${TOMCAT_VERSION}/bin/catalina.sh" ]; then
            echo "ERROR: Tomcat installation not found"
            ((validation_errors++))
          else
            echo "✓ Tomcat installation verified"
          fi
          
          # Check if Tomcat is running
          if systemctl is-active tomcat > /dev/null 2>&1; then
            echo "✓ Tomcat service is running"
          else
            echo "WARNING: Tomcat service is not running"
          fi
          
          # Test HTTPS connectivity
          response_code=$(curl -k -o /dev/null -s -w "%{http_code}\n" https://localhost:443 || echo "000")
          if [ "$response_code" -eq 200 ] || [ "$response_code" -eq 403 ]; then
            echo "✓ HTTPS validation successful with response code: $response_code"
          else
            echo "WARNING: HTTPS validation failed with response code: $response_code"
          fi
          
          if [[ $validation_errors -gt 0 ]]; then
            echo "ERROR: Installation validation failed with ${validation_errors} error(s)"
            exit 1
          else
            echo "SUCCESS: Installation validation passed"
          fi

  - name: CleanExistingDeployments
    action: 'aws:runShellScript'
    description: 'Remove existing Web Adaptor deployments to ensure clean installation'
    inputs:
      runCommand:
        - |
          #!/bin/bash
          set -e
          
          LOG_FILE="/var/log/arcgis-web-adaptor-setup.log"
          exec > >(tee -a "$LOG_FILE")
          exec 2>&1

          TOMCAT_HOME="{{ TomcatHome }}"
          WEBADAPTOR_CONFIG=$(cat <<'EOF'
          {{ WebAdaptorConfig }}
          EOF
          )
  
          webapp_dir="$TOMCAT_HOME/webapps"  
          echo "Cleaning existing deployments..." 
          
          # Parse JSON configuration and iterate through web adaptors
          echo "$WEBADAPTOR_CONFIG" | jq -c '.[]' | while read -r adaptor; do
          adaptor_name=$(echo "$adaptor" | jq -r '.name')
          
          # Validate adaptor name is not empty
          if [ -z "$adaptor_name" ] || [ "$adaptor_name" == "null" ]; then
            echo "WARNING: Empty or invalid adaptor name, skipping..."
            continue
          fi
          
          echo "Cleaning web adaptor: $adaptor_name" 
          deployed_war="$webapp_dir/$adaptor_name.war"
          deployed_dir="$webapp_dir/$adaptor_name"
          
          # Remove existing WAR file
          if [[ -f "$deployed_war" ]]; then
            rm -f "$deployed_war"
            echo "INFO: Removed existing WAR file: $deployed_war" 
          fi
          
          # Remove existing deployment directory
          if [[ -d "$deployed_dir" ]]; then
            rm -rf "$deployed_dir"
            echo "INFO: Removed existing deployment directory: $deployed_dir" 
          fi
          done
          
          echo "SUCCESS: Cleanup completed" 

  - name: DeployWebAdaptors
    action: 'aws:runShellScript'
    description: 'Deploy Web Adaptor WAR files to Tomcat'
    onFailure: Abort
    inputs:
      runCommand:
        - |
          #!/bin/bash
          set -e
          
          LOG_FILE="/var/log/arcgis-web-adaptor-setup.log"
          exec > >(tee -a "$LOG_FILE")
          exec 2>&1
          
          echo "========================================" 
          echo "Deploying ArcGIS WebAdaptor" 
          echo "========================================" 

          TOMCAT_HOME="{{ TomcatHome }}"
          WA_WAR_FILE="{{ WAWarFile }}"
          WEBADAPTOR_CONFIG=$(cat <<'EOF'
          {{ WebAdaptorConfig }}
          EOF
          )
          TOMCAT_USER="tomcat"
          webapp_dir="$TOMCAT_HOME/webapps"
          
          echo "Deploying web adaptors..." 
          
          # Parse JSON configuration and iterate through web adaptors
          echo "$WEBADAPTOR_CONFIG" | jq -c '.[]' | while read -r adaptor; do
          adaptor_name=$(echo "$adaptor" | jq -r '.name')
          
          # Validate adaptor name is not empty
          if [ -z "$adaptor_name" ] || [ "$adaptor_name" == "null" ]; then
            echo "WARNING: Empty or invalid adaptor name, skipping..."
            continue
          fi
          
          echo "Processing web adaptor: $adaptor_name" 
          deployed_war="$webapp_dir/$adaptor_name.war"
          
          # Copy WAR file to Tomcat webapps directory
          cp "$WA_WAR_FILE" "$deployed_war"
          chown $TOMCAT_USER:$TOMCAT_USER "$deployed_war"
          
          echo "SUCCESS: Deployed $adaptor_name to $deployed_war" 
          done
          
          echo "SUCCESS: All web adaptors deployed" 

  - name: RestartTomcat
    action: 'aws:runShellScript'
    description: 'Restart Tomcat service to deploy Web Adaptors'
    onFailure: Abort
    inputs:
      runCommand:
        - |
          #!/bin/bash
          set -e
          
          LOG_FILE="/var/log/arcgis-web-adaptor-setup.log"
          exec > >(tee -a "$LOG_FILE")
          exec 2>&1
          
          echo "========================================" 
          echo "Restarting Tomcat Service" 
          echo "========================================" 

          TOMCAT_SERVICE="tomcat"    
          echo "Managing Tomcat service..." 
          
          if systemctl is-active "$TOMCAT_SERVICE" > /dev/null 2>&1; then
            echo "INFO: Restarting Tomcat to deploy Web Adaptor..." 
            systemctl restart "$TOMCAT_SERVICE"
          else
            echo "INFO: Starting Tomcat to deploy Web Adaptor..." 
            systemctl start "$TOMCAT_SERVICE"
          fi
          
          echo "Waiting 60 seconds for deployment..." 
          sleep 60
          
          # Verify service is running
          if systemctl is-active "$TOMCAT_SERVICE" > /dev/null 2>&1; then
            echo "SUCCESS: Tomcat service is running" 
          else
            echo "ERROR: Tomcat service failed to start" 
            exit 1
          fi

  - name: ValidateDeployment
    action: 'aws:runShellScript'
    description: 'Validate Web Adaptor deployment'
    onFailure: Abort
    inputs:
      runCommand:
        - |
          #!/bin/bash
          set -e
          
          LOG_FILE="/var/log/arcgis-web-adaptor-setup.log"
          exec > >(tee -a "$LOG_FILE")
          exec 2>&1
          
          echo "========================================" 
          echo "Validating ArcGIS WebAdaptor deployment" 
          echo "========================================" 

          TOMCAT_HOME="{{ TomcatHome }}"
          webapp_dir="$TOMCAT_HOME/webapps"
          deployment_failed=0
          
          echo "Validating deployments..." 
          WEBADAPTOR_CONFIG=$(cat <<'EOF'
          {{ WebAdaptorConfig }}
          EOF
          )
          
          # Parse JSON configuration and iterate through web adaptors
          echo "$WEBADAPTOR_CONFIG" | jq -c '.[]' | while read -r adaptor; do
          adaptor_name=$(echo "$adaptor" | jq -r '.name')
          
          # Validate adaptor name is not empty
          if [ -z "$adaptor_name" ] || [ "$adaptor_name" == "null" ]; then
            echo "WARNING: Empty or invalid adaptor name, skipping..."
            continue
          fi
          
          deployed_dir="$webapp_dir/$adaptor_name"
          
          if [[ -d "$deployed_dir" ]]; then
            echo "SUCCESS: Web Adaptor '$adaptor_name' deployed successfully" 
            
            # Check for key files
            if [[ -f "$deployed_dir/WEB-INF/web.xml" ]]; then
            echo "INFO: web.xml found for $adaptor_name" 
            else
            echo "WARNING: web.xml not found for $adaptor_name" 
            fi
          else
            echo "ERROR: Web Adaptor '$adaptor_name' deployment failed" 
            deployment_failed=1
          fi
          done
          
          if [[ $deployment_failed -eq 1 ]]; then
          echo "ERROR: One or more deployments failed" 
          exit 1
          fi
    
          echo "SUCCESS: All deployments validated" 

  - name: WebAdaptorRegistration
    action: 'aws:runShellScript'
    description: 'Web Adaptor Registration'
    onFailure: Abort
    inputs:
      runCommand:
        - |
          #!/bin/bash
          set -e
          
          LOG_FILE="/var/log/arcgis-web-adaptor-setup.log"
          exec > >(tee -a "$LOG_FILE")
          exec 2>&1
          
          echo "========================================" 
          echo "Registering ArcGIS WebAdaptor" 
          echo "========================================" 
          ARC_GIS_VERSION="{{ ArcGISVersion }}"
          WEBADAPTOR_CONFIG=$(cat <<'EOF'
          {{ WebAdaptorConfig }}
          EOF
          )
          WEBADAPTOR_TOOLS_DIR="/opt/arcgis/webadaptor${ARC_GIS_VERSION}/java/tools"
          WEBADAPTOR_PRIVATE_DNS_NAME="{{ PrivateDNSName }}"

          # Parse JSON configuration and iterate through web adaptors
          echo "$WEBADAPTOR_CONFIG" | jq -c '.[]' | while read -r adaptor; do
          adaptor_name=$(echo "$adaptor" | jq -r '.name')
          dns_name=$(echo "$adaptor" | jq -r '.dnsName')
          username=$(echo "$adaptor" | jq -r '.username')
          password=$(echo "$adaptor" | jq -r '.password')
          
          # Validate required fields
          if [ -z "$adaptor_name" ] || [ "$adaptor_name" == "null" ] || \
              [ -z "$dns_name" ] || [ "$dns_name" == "null" ]; then
            echo "WARNING: Empty or invalid adaptor configuration, skipping..."
            continue
          fi
          
          echo "Registering web adaptor: $adaptor_name with site machine: $dns_name"
          
          # Determine mode based on adaptor name
          if [ "$adaptor_name" == "portal" ]; then
            MODE="portal"
            MACHINE_URL="https://$dns_name:7443"
          elif [ "$adaptor_name" == "monitor" ]; then
            MODE="monitor"
            MACHINE_URL="https://$dns_name:6443"
          elif [ "$adaptor_name" == "notebook" ]; then
            MODE="notebook"
            MACHINE_URL="https://$dns_name:6443"
          else
            MODE="server"
            MACHINE_URL="https://$dns_name:6443"
          fi
          
          echo "Running command: ${WEBADAPTOR_TOOLS_DIR}/configurewebadaptor.sh -m $MODE -w https://$WEBADAPTOR_PRIVATE_DNS_NAME/$adaptor_name/webadaptor -g $MACHINE_URL -u $username -p [REDACTED]"
                
          ${WEBADAPTOR_TOOLS_DIR}/configurewebadaptor.sh \
          -m "$MODE" \
          -w "https://$WEBADAPTOR_PRIVATE_DNS_NAME/$adaptor_name/webadaptor" \
          -g "$MACHINE_URL" \
          -u "$username" \
          -p "$password" \
          -r "true"
          
          echo "SUCCESS: Web adaptor $adaptor_name registered successfully"
          done

  - name: FinalizeConfiguration
    action: 'aws:runShellScript'
    description: 'Finalize configuration and log completion'
    inputs:
      runCommand:
        - |
          #!/bin/bash
          
          LOG_FILE="/var/log/arcgis-web-adaptor-setup.log"
          exec > >(tee -a "$LOG_FILE")
          exec 2>&1

          echo "========================================" 
          echo "Web adaptor configuration completed successfully" 
          echo "Time: $(date)" 
          echo "========================================" 
          
          # Display deployed web adaptors
          echo "" 
          echo "Deployed Web Adaptors:" 
          TOMCAT_HOME="{{ TomcatHome }}"
          WEBADAPTOR_PRIVATE_DNS_NAME="{{ PrivateDNSName }}"
          WEBADAPTOR_CONFIG=$(cat <<'EOF'
          {{ WebAdaptorConfig }}
          EOF
          )
                
          echo "$WEBADAPTOR_CONFIG" | jq -c '.[]' | while read -r adaptor; do
          adaptor_name=$(echo "$adaptor" | jq -r '.name')
          
          if [ -z "$adaptor_name" ] || [ "$adaptor_name" == "null" ]; then
            continue
          fi
          
          echo "  - $adaptor_name (https://$WEBADAPTOR_PRIVATE_DNS_NAME/$adaptor_name)" 
          done
          
          echo "" 
          echo "Configuration log: $LOG_FILE" 
