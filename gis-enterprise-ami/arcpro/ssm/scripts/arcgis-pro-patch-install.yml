schemaVersion: "2.2"
description: |
  Install ArcGIS Pro patches.
  This document installs ArcGIS Pro patches on Windows instances.
  Target instances using instance IDs or tags when running the command.
parameters:
  DownloadDrive:
    type: String
    description: Drive letter for ArcPro patch download
    default: "G:"
  ArcProPatches:
    type: String
    description: Comma-separated list of ArcPro patches S3 Key. Used when ApplyOnlyPatches is True.
    default: "s3://elevate-installer/esri/arcgis_pro/arcgis_pro_3_5/patches/ArcGIS_Pro_355_195505.msp"
  NVIDIABucket:
    type: String
    description: (Optional) NVIDIA Driver bucket name.
    default: 'ec2-windows-nvidia-drivers'
  NVIDIABucketKeyPrefix:
    type: String
    description: (Optional) NVIDIA Driver Key Prefix.
    default: 'latest'

mainSteps:
  - name: InstallNVIDIADrivers
    action: 'aws:runPowerShellScript'
    description: Install NVIDIA drivers on GPU-enabled instances
    inputs:
      timeoutSeconds: '900'
      runCommand:
        - |
          # Initialize logging and error handling
          $ErrorActionPreference = "Stop"
          $ProgressPreference = "SilentlyContinue"
          Set-TimeZone -Id "Pacific Standard Time"

          $logFile = "{{ DownloadDrive }}\installer\logs\ArcGISPro_Install.log"
          if (-not (Test-Path $logFile)) {
            New-Item -ItemType File -Path $logFile -Force | Out-Null
          }
          Start-Transcript -Path $logFile -Append
          # Check if NVIDIABucket and NVIDIABucketKeyPrefix are null or empty, if so exit gracefully
          if ([string]::IsNullOrWhiteSpace('{{ NVIDIABucket }}') -or [string]::IsNullOrWhiteSpace('{{ NVIDIABucketKeyPrefix }}')) {
            Write-Output "NVIDIABucket or NVIDIABucketKeyPrefix is not specified. Skipping NVIDIA driver installation."
            Stop-Transcript
            exit 0
          }

          # Check if NVIDIA driver is already installed
          $nvidiaSmiPath = "C:\Windows\System32\nvidia-smi.exe"
          if (Test-Path $nvidiaSmiPath) {
            try {
              $nvidiaSmiOutput = & $nvidiaSmiPath --query-gpu=driver_version --format=csv,noheader 2>&1
              if ($LASTEXITCODE -eq 0) {
                Write-Output "NVIDIA driver is already installed. Version: $nvidiaSmiOutput"
                Write-Output "Skipping NVIDIA driver installation."
                Stop-Transcript
                exit 0
              }
            } catch {
              Write-Output "NVIDIA driver check failed, proceeding with installation."
            }
          }

          Write-Output "=== Installing NVIDIA Drivers if applicable ==="
          $Bucket = '{{ NVIDIABucket }}'
          $KeyPrefix = '{{ NVIDIABucketKeyPrefix }}'
          $LocalPath = "{{ DownloadDrive }}\installer\NVIDIA_Drivers"

          if (-not (Test-Path $LocalPath)) {
            New-Item -ItemType Directory -Path $LocalPath -Force | Out-Null
          }

          $Objects = Get-S3Object -BucketName $Bucket -KeyPrefix $KeyPrefix -Region us-east-1

          # Download NVIDIA driver installer
          Write-Output "Downloading NVIDIA driver from $Bucket with prefix $KeyPrefix ..."
          try {
            foreach ($Object in $Objects) {
              $LocalFileName = $Object.Key
              if ($LocalFileName -ne '' -and $Object.Size -ne 0) {
                $LocalFilePath = Join-Path $LocalPath $LocalFileName
                Copy-S3Object -BucketName $Bucket -Key $Object.Key -LocalFile $LocalFilePath -Region us-east-1
              }
            }
          } catch {
            throw "Failed to download NVIDIA driver: $_"
          }

          # Find the NVIDIA driver installer executable
          $driverInstallerPath = Get-ChildItem -Path $LocalPath -Filter "*.exe" -Recurse | Select-Object -First 1 -ExpandProperty FullName
          if (-not $driverInstallerPath) {
            throw "NVIDIA driver installer executable not found in $LocalPath"
          }
          Write-Output "Found NVIDIA driver installer: $driverInstallerPath"

          # Install NVIDIA driver silently
          Write-Output "Installing NVIDIA driver..."
          try {
            $installArgs = "-s"
            $process = Start-Process -FilePath $driverInstallerPath -ArgumentList $installArgs -Wait -PassThru -NoNewWindow

            if ($process.ExitCode -eq 0) {
              Write-Output "NVIDIA driver installed successfully (Exit code: $($process.ExitCode))"
            } else {
              throw "NVIDIA driver installation failed with exit code: $($process.ExitCode)"
            }

          } catch {
            throw "Failed to install NVIDIA driver: $_"
          }
          New-Item -Path "HKLM:\SOFTWARE\NVIDIA Corporation\Global" -Name GridLicensing -ErrorAction SilentlyContinue
          New-ItemProperty -Path "HKLM:\SOFTWARE\NVIDIA Corporation\Global\GridLicensing" -Name "NvCplDisableManageLicensePage" -PropertyType "DWord" -Value "1"

          # validate installation
          try {
            $nvidiaSmiOutput = & $nvidiaSmiPath --query-gpu=driver_version --format=csv,noheader 2>&1
            if ($LASTEXITCODE -eq 0) {
              Write-Output "NVIDIA driver installation validated. Version: $nvidiaSmiOutput"
            } else {
              throw "NVIDIA driver validation failed after installation."
            }
          } catch {
            throw "NVIDIA driver validation failed after installation: $_"
          }
          Write-Output "=== NVIDIA Driver installation step completed ==="
          Stop-Transcript

  - name: DownloadandInstallArcGISProPatches
    action: 'aws:runPowerShellScript'
    description: Download and install ArcGIS Pro patches
    inputs:
      timeoutSeconds: '1800'
      runCommand:
        - |
          # Initialize logging and error handling
          $ErrorActionPreference = "Stop"
          $ProgressPreference = "SilentlyContinue"
          Set-TimeZone -Id "Pacific Standard Time"

          $timestamp = Get-Date -Format "yyyyMMdd_HHmmss"
          # Check if ArcProPatches is null or empty, if so exit gracefully
          if ([string]::IsNullOrWhiteSpace('{{ ArcProPatches }}')) {
            Write-Output "ArcProPatches is not specified. Skipping patch installation."
            exit 0
          }
          $logDir = "{{ DownloadDrive }}\installer\patches\logs"
          if (-not (Test-Path $logDir)) {
            New-Item -ItemType Directory -Path $logDir -Force | Out-Null
          }
          $logFile = "$logDir\ArcGISPro_InstallPatch_$timestamp.log"
          if (-not (Test-Path $logFile)) {
            New-Item -ItemType File -Path $logFile -Force | Out-Null
          }
          Start-Transcript -Path $logFile -Append
          $successCount = 0
          $failCount = 0

          # Find ArcGIS Pro in installed programs
          $uninstallKeys = @(
            "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\*",
            "HKLM:\SOFTWARE\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall\*"
          )

          $arcGISPro = Get-ItemProperty $uninstallKeys -ErrorAction SilentlyContinue |
            Where-Object { $_.DisplayName -like "ArcGIS Pro*" } |
            Select-Object -First 1

          if (-not $arcGISPro) {
            Write-Output "No existing ArcGIS Pro installation found. Skipping the patch installation."
            Stop-Transcript
            exit 0
          }
          Write-Output  "Applying the patches provided."
          $ArcProPatchesRaw = '{{ ArcProPatches }}'
          $patchDir = "{{ DownloadDrive }}\installer\patches"
          if (-not (Test-Path $patchDir)) {
            New-Item -ItemType Directory -Path $patchDir -Force | Out-Null
          }
          # Handle both JSON array format and comma-separated format
          if ($ArcProPatchesRaw -match '^\[.*\]$') {
            # JSON array format - remove brackets and split
            $ArcProPatchesRaw = $ArcProPatchesRaw.Trim('[',']').Replace('"','')
          }
          $patches = $ArcProPatchesRaw -split "," | ForEach-Object { $_.Trim() }
          foreach ($patch in $patches) {
            if ([string]::IsNullOrWhiteSpace($patch)) {
              continue
            }
            # Extract bucket and key from S3 URI (e.g., s3://bucket-name/path/to/file.msp)
            if ($patch -match '^s3://([^/]+)/(.+)$') {
              $bucketName = $Matches[1]
              $s3Key = $Matches[2]
              $fileName = Split-Path -Leaf $s3Key
              $localPatchPath = "$patchDir\$fileName"

              if (-not (Test-Path $localPatchPath)) {
                Write-Output "Downloading patch from s3://${bucketName}/${s3Key} to $localPatchPath"
                try {
                  Copy-S3Object -BucketName $bucketName -Key $s3Key -LocalFile $localPatchPath -ErrorAction Stop
                  Write-Output "Downloaded patch '$fileName' successfully"
                } catch {
                  $errMsg = $_.Exception.Message
                  throw "Failed to download patch from s3://${bucketName}/${s3Key}: ${errMsg}"
                }
              } else {
                Write-Output "Patch '$fileName' already exists at $localPatchPath. Skipping download."
              }
            } else {
              Write-Warning "Invalid S3 URI format: $patch. Expected format: s3://bucket-name/path/to/file.msp"
              continue
            }
            # Install the patch
            Write-Output "Installing patch: $fileName"
            try {
              $patchArgs = @(
                "/update", "`"$localPatchPath`""
                "/quiet"
                "/l*v", "`"$logDir\$fileName.log`""
              )
              $process = Start-Process -FilePath "msiexec.exe" -ArgumentList $patchArgs -Wait -PassThru
              if ($process.ExitCode -eq 0) {
                Write-Output "Patch '$fileName' installed successfully"
                $successCount++
              } elseif ($process.ExitCode -eq 3010) {
                Write-Output "Patch '$fileName' installed successfully (reboot may be required)"
                $successCount++
              } else {
                Write-Warning "Patch '$fileName' installation failed with exit code $($process.ExitCode)"
                $failCount++
              }
            } catch {
              Write-Warning "Failed to install patch '$fileName': $_"
              $failCount++
            }
          }
          Write-Output "Patch installation summary: $successCount successful, $failCount failed"
          # Check for log files
          $logFiles = Get-ChildItem -Path "$logDir" -Filter "*.log" -ErrorAction SilentlyContinue
          if ($logFiles) {
            Write-Output "Installation log files:"
            foreach ($log in $logFiles) {
              Write-Output "  - $($log.Name) ($([math]::Round($log.Length/1KB, 1)) KB)"
            }
          }
          else {
            Write-Warning "No installation log files found in $logDir"
          }
          Stop-Transcript
