name: InstallArcGISPortal
description: Installs Portal for ArcGIS ${ARCGIS_VERSION} on RHEL 9
schemaVersion: 1.0

phases:
  - name: build
    steps:
      - name: InstallDependencies
        action: ExecuteBash
        inputs:
          commands:
            - echo "Installing required dependencies for Portal for ArcGIS..."
            - yum install -y jq autofs unzip
            - yum install -y dos2unix fontconfig freetype motif libXtst
            - yum install -y redhat-lsb-core python3 python3-pip
        
      - name: ConfigureAutofs
        action: ExecuteBash
        inputs:
          commands:
            - echo "Configuring autofs for Portal for ArcGIS..."
            - | 
                local auto_master="/etc/auto.master"
                sed -i 's/#\/net/\/net/g' /etc/auto.master
                if [[ -f "$auto_master" ]]; then
                    # Remove comment from #/net line
                    sed -i 's|^#/net|/net|g' "$auto_master"
                    
                    # Enable and start autofs service
                    systemctl enable autofs
                    systemctl restart autofs
                    echo "INFO: Configured and started autofs service"
                else
                    echo "WARNING: auto.master file not found: $auto_master"
                fi
      
      - name: ConfigureFirewall
        action: ExecuteBash
        inputs:
          commands:
            - echo "Configuring firewall..."
            - yum install -y firewalld nfs-utils
            - firewall-cmd --zone=public --permanent --add-port=5701/tcp
            - firewall-cmd --zone=public --permanent --add-port=5702/tcp
            - firewall-cmd --zone=public --permanent --add-port=5703/tcp
            - firewall-cmd --zone=public --permanent --add-port=7080/tcp
            - firewall-cmd --zone=public --permanent --add-port=7443/tcp
            - firewall-cmd --zone=public --permanent --add-port=7005/tcp
            - firewall-cmd --zone=public --permanent --add-port=7099/tcp
            - firewall-cmd --zone=public --permanent --add-port=7120/tcp
            - firewall-cmd --zone=public --permanent --add-port=7220/tcp
            - firewall-cmd --zone=public --permanent --add-port=7654/tcp
            - firewall-cmd --zone=public --permanent --add-port=7820/tcp
            - firewall-cmd --zone=public --permanent --add-port=7830/tcp
            - firewall-cmd --zone=public --permanent --add-port=7840/tcp
            - firewall-cmd --reload
            - systemctl start firewalld
            - systemctl enable firewalld

      - name: CreateArcGISUser
        action: ExecuteBash
        inputs:
          commands:
            - echo "Creating ArcGIS user..."
            - useradd -m -d /home/arcgis -s /bin/bash arcgis
    
      - name: PrepareInstallation
        action: ExecuteBash
        inputs:
          commands:
            - echo "Preparing installation environment..."
            - mkdir -p ${install_directory}
            - mkdir -p ${installer_directory}/${arcgis_version}
            - mkdir -p ${installer_directory}/${arcgis_version}/setups
            - mkdir -p /var/log/arcgis
            - chown -R arcgis:arcgis ${install_directory}
            - chown -R arcgis:arcgis ${installer_directory}/${arcgis_version}
            - chown -R arcgis:arcgis ${installer_directory}/${arcgis_version}/setups
            - chown -R arcgis:arcgis /var/log/arcgis

      - name: PrepareInstallation
        action: ExecuteBash
        inputs:
          commands:
            - echo "Set system limits for the user..."
            - mkdir -p ${install_directory}
            - mkdir -p ${installer_directory}/${arcgis_version}
            - mkdir -p ${installer_directory}/${arcgis_version}/setups
            - mkdir -p /var/log/arcgis
            - chown -R arcgis:arcgis ${install_directory}
            - chown -R arcgis:arcgis ${installer_directory}/${arcgis_version}
            - chown -R arcgis:arcgis ${installer_directory}/${arcgis_version}/setups
            - chown -R arcgis:arcgis /var/log/arcgis
            
      - name: DownloadPortalInstaller
        action: S3Download
        inputs:
          - source: s3://${deployment_bucket}/${portal_installer_key_name}
            destination: ${installer_directory}/${arcgis_version}/Portal_for_ArcGIS.tar.gz

      - name: DownloadPortalWebStyles
        action: S3Download
        inputs:
          - source: s3://${deployment_bucket}/${portal_web_styles_key_name}
            destination: ${installer_directory}/${arcgis_version}/Portal_for_ArcGIS_Web_Styles.tar.gz
            
      - name: ExtractPortalInstaller
        action: ExecuteBash
        inputs:
          commands:
            - echo "Extracting Portal for ArcGIS installer..."
            - cd ${installer_directory}/${arcgis_version}
            - sudo -u arcgis env PATH=/usr/bin:/bin:/usr/sbin:/sbin tar -xzf Portal_for_ArcGIS.tar.gz -C ${installer_directory}/${arcgis_version}/setups
            - sudo chown -R arcgis:arcgis ${installer_directory}/${arcgis_version}/setups/ArcGISWorkflowManagerServer
            
      - name: InstallPortal
        action: ExecuteBash
        inputs:
          commands:
            - echo "Installing Portal for ArcGIS..."
            - cd /tmp/portalinstall
            - ./Setup -m silent -l yes -d /arcgis
            - echo "Portal for ArcGIS installation completed"
            
      
            
      - name: ConfigurePortalService
        action: ExecuteBash
        inputs:
          commands:
            - echo "Configuring Portal for ArcGIS service..."
            - |
              cat > /etc/systemd/system/arcgisportal.service <<'EOF'
              [Unit]
              Description=Portal for ArcGIS
              After=network.target

              [Service]
              Type=forking
              User=arcgis
              ExecStart=/arcgis/portal/startportal.sh
              ExecStop=/arcgis/portal/stopportal.sh
              RemainAfterExit=yes

              [Install]
              WantedBy=multi-user.target
              EOF
            - systemctl daemon-reload
            - systemctl enable arcgisportal
            
      - name: CleanUp
        action: ExecuteBash
        inputs:
          commands:
            - echo "Cleaning up installation files..."
            - rm -rf /tmp/portalinstall
            - rm -f /tmp/Portal_for_ArcGIS.tar.gz
            
      - name: VerifyInstallation
        action: ExecuteBash
        inputs:
          commands:
            - echo "Verifying Portal for ArcGIS installation..."
            - test -d /arcgis/portal || (echo "ERROR: Portal for ArcGIS not found in /arcgis/portal" && exit 1)
            - echo "Portal for ArcGIS ${ARCGIS_VERSION} installation verified"
