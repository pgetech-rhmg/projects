schemaVersion: '2.2'
description: 'Configure ArcGIS Portal for ArcGIS - Primary or Standby node deployment with high availability'
parameters:
  Region:
    type: String
    description: 'AWS Region'
    default: 'us-west-2'
  DeploymentBucket:
    type: String
    description: 'S3 bucket containing deployment artifacts'
  PortalAdminUser:
    type: String
    description: 'Portal administrator username'
    default: 'portaladmin'
  PortalAdminPassword:
    type: String
    description: 'Portal administrator password (use SecureString)'
  PortalLicenseFileS3Key:
    type: String
    description: 'S3 key for Portal license file (.json)'
  SiteDomain:
    type: String
    description: 'Domain name for the site'
  EfsId:
    type: String
    description: 'EFS file system ID for shared storage'
  PortalWebAdaptorName:
    type: String
    description: 'Portal Web Adaptor name'
    default: 'portal'
  SslCertFileS3Key:
    type: String
    description: 'S3 key for SSL certificate file (.pfx)'
    default: ''
  SslCertPassword:
    type: String
    description: 'SSL certificate password'
    default: ''
  PortalRole:
    type: String
    description: 'Portal role: Primary or Standby'
    default: 'Primary'
    allowedValues:
      - 'Primary'
      - 'Standby'
  InstanceID:
    type: String
    description: 'ArcGIS Portal EC2 Instance ID (for internal use)'
    default: ''
  PrivateIP:
    type: String
    description: 'ArcGIS Portal EC2 Private IP (for internal use)'
    default: ''
  PrimaryPortalDNSName:
    type: String
    description: 'Primary ArcGIS Portal DNS Name (for internal use)'
    default: ''

mainSteps:
  - name: DisableRHELSubscriptionManager
    action: 'aws:runShellScript'
    description: 'Disable RHEL Subscription Manager to prevent subscription prompts'
    inputs:
      runCommand:
        - |
          #!/bin/bash
          set -e
          subscription-manager config --rhsm.manage_repos=0
          subscription-manager config --rhsm.auto_enable_yum_plugins=0
          sed -i 's/enabled[ ]*=[ ]*1/enabled=0/g' /etc/yum/pluginconf.d/subscription-manager.conf

  - name: MountEfsStorage
    action: 'aws:runShellScript'
    description: 'Mount EFS share for Portal content store'
    inputs:
      runCommand:
        - |
          #!/bin/bash
          set -e

          LOG_FILE="/var/log/arcgis-portal-setup.log"
          exec > >(tee -a "$LOG_FILE")
          exec 2>&1
          echo "========================================"
          echo "Starting ArcGIS Portal initialization"
          echo "Time: $(date)"
          echo "========================================"

          EFS_ID="{{ EfsId }}"
          MNT_DIR="/mnt/arcgisportal"
          INSTANCE_ID="{{ InstanceID }}"

          # Update instance hostname
          hostnamectl set-hostname "arcgis-portal-$INSTANCE_ID"
          echo "SUCCESS: Hostname updated to arcgis-portal-$INSTANCE_ID"


          if [ -z "$EFS_ID" ]; then
            echo "ERROR: EFS_ID not provided"
            exit 1
          fi

          echo "Installing required packages..."
          yum update -y
          yum install -y jq curl

          echo "Building and Installing efs-utils from source..."
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source /root/.cargo/env
          yum -y install golang git rpm-build make rust cargo openssl-devel cmake wget perl # remove gcc gcc-c++ here if you already installed a compatible version following GCC Version Requirements instruction
          if [ ! -d "efs-utils" ]; then
            git clone https://github.com/aws/efs-utils
            cd efs-utils
            make rpm
            yum -y install build/amazon-efs-utils*rpm
          fi

          echo "Mount EFS share"
          if [ -n "${EFS_ID}" ]; then
            echo "Mounting EFS share"
            systemctl enable amazon-ssm-agent
            systemctl start amazon-ssm-agent
            if [[ -d "${MNT_DIR}" ]]; then
              echo "Directory already ${MNT_DIR} exists"
            else
              mkdir -p "${MNT_DIR}" # Create mount point
              echo "created directory ${MNT_DIR}"
            fi
            echo "Add EFS mount to fstab (avoid duplicates)"
            if ! grep -q "${EFS_ID}:/" /etc/fstab; then
              if echo "${EFS_ID}:/ ${MNT_DIR} efs _netdev,tls,iam 0 0" >> /etc/fstab; then
                echo "Successfully added EFS mount to /etc/fstab"
                # Test mount
                if mount -a; then
                  echo "EFS mounted successfully"
                else
                  echo "Warning: Mount test failed" >&2
                fi
              else
                echo "Error: Failed to add EFS mount to /etc/fstab" >&2
                exit 1
              fi
            else
                echo "EFS mount already exists in /etc/fstab"
            fi
            # Mount the share
            mount -fav
            # Verify EFS mount
            if mountpoint -q "${MNT_DIR}"; then
                echo "EFS share mounted successfully"

            else
                echo "ERROR: Failed to mount EFS share"
                exit 1
            fi
          else
              echo "ERROR: EFS_ID not provided"
              exit 1
          fi

          # Verify mount point
          if [[ ! -d "${MNT_DIR}" ]]; then
            echo "ERROR: Directory ${MNT_DIR} does not exist"
            exit 1
          else
            echo "Directory ${MNT_DIR} already exists"
          fi

          # Set proper ownership and permissions
          chown -R arcgis:arcgis /mnt/arcgisportal
          chmod -R 755 /mnt/arcgisportal

  - name: DownloadLicenseAndCertificates
    action: 'aws:runShellScript'
    description: 'Download Portal license file and SSL certificates from S3'
    inputs:
      runCommand:
        - |
          #!/bin/bash
          set -e

          LOG_FILE="/var/log/arcgis-portal-setup.log"
          exec > >(tee -a "$LOG_FILE")
          exec 2>&1

          echo "========================================"
          echo "DOWNLOAD LICENSE AND CERTIFICATES"
          echo "========================================"


          REGION="{{ Region }}"
          DEPLOYMENT_BUCKET="{{ DeploymentBucket }}"
          PORTAL_LICENSE_FILE_S3_KEY="{{ PortalLicenseFileS3Key }}"
          SSL_CERT_FILE_S3_KEY="{{ SslCertFileS3Key }}"

          echo "Downloading license and certificates..."

          # Ensure directory exists
          mkdir -p /opt/arcgis

          # Download Portal license file
          echo "Downloading Portal license file from S3..."
          aws s3 cp "s3://$DEPLOYMENT_BUCKET/$PORTAL_LICENSE_FILE_S3_KEY" /opt/arcgis/portal.json --region "$REGION" || {
            echo "ERROR: Failed to download Portal license file"
            exit 1
          }
          chown arcgis:arcgis /opt/arcgis/portal.json
          chmod 600 /opt/arcgis/portal.json
          echo "SUCCESS: Portal license file downloaded"

          # Download SSL certificate if provided
          if [ -n "$SSL_CERT_FILE_S3_KEY" ]; then
            echo "Downloading SSL certificate from S3..."
            aws s3 cp "s3://$DEPLOYMENT_BUCKET/$SSL_CERT_FILE_S3_KEY" /opt/arcgis/ssl_certificate.pfx --region "$REGION" || {
              echo "ERROR: Failed to download SSL certificate"
              exit 1
            }
            chown arcgis:arcgis /opt/arcgis/ssl_certificate.pfx
            chmod 600 /opt/arcgis/ssl_certificate.pfx
            echo "SUCCESS: SSL certificate downloaded"
          else
            echo "INFO: No SSL certificate configured"
          fi

  - name: SetupPrimaryPortal
    action: 'aws:runShellScript'
    description: 'Create ArcGIS Portal site (Primary Portal only)'
    precondition:
      StringEquals:
        - "{{ PortalRole }}"
        - "Primary"
    inputs:
      runCommand:
        - |
          #!/bin/bash
          set -e

          LOG_FILE="/var/log/arcgis-portal-setup.log"
          exec > >(tee -a "$LOG_FILE")
          exec 2>&1

          echo "========================================"
          echo "PRIMARY PORTAL SETUP"
          echo "========================================"

          PORTAL_ADMIN_USER="{{ PortalAdminUser }}"
          PORTAL_ADMIN_PASSWORD="{{ PortalAdminPassword }}"
          SITE_DOMAIN="{{ SiteDomain }}"
          PORTAL_CONTENT_DIR="/mnt/arcgisportal/content"


          # Create Portal site properties file
          cat > /opt/arcgis/create_portal.properties << EOF
          PORTAL_ADMIN_FIRSTNAME=admin
          PORTAL_ADMIN_LASTNAME=admin
          PORTAL_ADMIN_USERNAME=$PORTAL_ADMIN_USER
          PORTAL_ADMIN_PASSWORD=$PORTAL_ADMIN_PASSWORD
          PORTAL_ADMIN_PASSWORD_ENCRYPTED=false
          PORTAL_ADMIN_EMAIL=admin@$SITE_DOMAIN
          PORTAL_ADMIN_SECURITY_QUESTION_INDEX=1
          PORTAL_ADMIN_SECURITY_QUESTION_ANSWER=$PORTAL_ADMIN_PASSWORD
          PORTAL_LICENSE_FILE=/opt/arcgis/portal.json
          PORTAL_CONTENT_DIRECTORY=$PORTAL_CONTENT_DIR
          EOF

          # Create the Portal site
          echo "Creating Portal site..."
          /opt/arcgis/portal/tools/createportal/createportal.sh -f /opt/arcgis/create_portal.properties || {
            echo "ERROR: Failed to create Portal site"
            exit 1
          }

          # Wait for site to be fully ready
          sleep 30

          echo "SUCCESS: Primary Portal site created"

  - name: ConfigureSslCertificate
    action: 'aws:runShellScript'
    description: 'Configure SSL certificate (Primary Portal only)'
    precondition:
      StringEquals:
        - "{{ PortalRole }}"
        - "Primary"
    inputs:
      runCommand:
        - |
          #!/bin/bash
          set -e

          LOG_FILE="/var/log/arcgis-portal-setup.log"
          exec > >(tee -a "$LOG_FILE")
          exec 2>&1

          echo "========================================"
          echo "CONFIGURE SSL CERTIFICATE"
          echo "========================================"


          SSL_CERT_FILE_S3_KEY="{{ SslCertFileS3Key }}"
          SSL_CERT_PASSWORD="{{ SslCertPassword }}"

          # Check if SSL certificate is configured
          if [ ! -f "/opt/arcgis/ssl_certificate.pfx" ] || [ -z "$SSL_CERT_PASSWORD" ]; then
            echo "INFO: No SSL certificate configured"
            exit 0
          fi

          echo "Configuring SSL certificate..."

          PORTAL_ADMIN_USER="{{ PortalAdminUser }}"
          PORTAL_ADMIN_PASSWORD="{{ PortalAdminPassword }}"
          #PRIVATE_IP={{ PrivateIP }}
          #PORTAL_HOST_NAME="IP-${PRIVATE_IP//./-}.{{ Region }}.COMPUTE.INTERNAL"
          PORTAL_HOST_NAME= "{{ PrimaryPortalDNSName }}"

          # Get admin token
          token=$(curl -k -s -X POST "https://$PORTAL_HOST_NAME:7443/arcgis/sharing/rest/generateToken" \
            -d "username=$PORTAL_ADMIN_USER" \
            -d "password=$PORTAL_ADMIN_PASSWORD" \
            -d "referer=https://$PORTAL_HOST_NAME:7443" \
            -d "f=pjson" | jq -r '.token')


          if [ "$token" = "null" ] || [ -z "$token" ]; then
            echo "ERROR: Failed to get admin token"
            exit 1
          fi

          # Import SSL certificate
          curl -k -X POST "https://$PORTAL_HOST_NAME:7443/arcgis/portaladmin/security/sslCertificates/importExistingServerCertificate" \
            -F "certFile=@/opt/arcgis/ssl_certificate.pfx" \
            -F "certPassword=$SSL_CERT_PASSWORD" \
            -F "token=$token" \
            -F "f=pjson" > /var/log/ssl_cert_response.json

          echo "SSL certificate configuration response:"
          cat /var/log/ssl_cert_response.json

          echo "SUCCESS: SSL certificate configured"

  - name: JoinStandbyPortal
    action: 'aws:runShellScript'
    description: 'Join standby Portal to existing site (Standby Portal only)'
    precondition:
      StringEquals:
        - "{{ PortalRole }}"
        - "Standby"
    inputs:
      runCommand:
        - |
          #!/bin/bash
          set -e

          LOG_FILE="/var/log/arcgis-portal-setup.log"
          exec > >(tee -a "$LOG_FILE")
          exec 2>&1

          echo "========================================"
          echo "JOIN STANDBY PORTAL SETUP"
          echo "========================================"

          REGION="{{ Region }}"
          PORTAL_ADMIN_USER="{{ PortalAdminUser }}"
          PORTAL_ADMIN_PASSWORD="{{ PortalAdminPassword }}"
          PRIMARY_HOST_NAME="{{ PrimaryPortalDNSName }}"

          echo "Primary Portal Hostname: $PRIMARY_HOST_NAME"

          # Wait for primary Portal to be ready
          echo "Waiting for primary Portal to be ready..."
          max_attempts=120
          attempt=0

          while [ $attempt -lt $max_attempts ]; do
            if curl -k -s -f "https://$PRIMARY_HOST_NAME:7443/arcgis/portaladmin/healthCheck" > /dev/null 2>&1; then
              echo "Primary Portal is ready"
              break
            fi
            echo "Attempt $((attempt + 1))/$max_attempts: Primary Portal not ready yet..."
            sleep 10
            attempt=$((attempt + 1))
          done

          if [ $attempt -eq $max_attempts ]; then
            echo "ERROR: Primary Portal did not become ready in time"
            exit 1
          fi

          # Wait for local Portal service to be ready
          echo "Waiting for local Portal service to be ready..."
          attempt=0
          max_attempts=60

          while [ $attempt -lt $max_attempts ]; do
            if curl -k -s -f "https://localhost:7443/arcgis/portaladmin/healthCheck" > /dev/null 2>&1; then
              echo "Local Portal service is ready"
              break
            fi
            echo "Attempt $((attempt + 1))/$max_attempts: Local Portal service not ready yet..."
            sleep 10
            attempt=$((attempt + 1))
          done

          if [ $attempt -eq $max_attempts ]; then
            echo "ERROR: Local Portal service failed to become ready"
            exit 1
          fi

          # Join the site
          echo "Joining Portal site on primary Portal at $PRIMARY_IP..."
          curl -k -X POST "https://localhost:7443/arcgis/portaladmin/joinSite" \
            -d "adminURL=https://$PRIMARY_HOST_NAME:7443/arcgis/portaladmin" \
            -d "username=$PORTAL_ADMIN_USER" \
            -d "password=$PORTAL_ADMIN_PASSWORD" \
            -d "f=json" > /var/log/join_portal_site_response.json

          if jq -e '.status == "success"' /var/log/join_portal_site_response.json > /dev/null; then
            echo "SUCCESS: Joined Portal site successfully"
          else
            echo "ERROR: Failed to join Portal site"
            cat /var/log/join_portal_site_response.json
            exit 1
          fi

  - name: UpdatePortalProperties
    action: 'aws:runShellScript'
    description: 'Update Portal properties'
    precondition:
      StringEquals:
        - "{{ PortalRole }}"
        - "Primary"
    inputs:
      runCommand:
        - |
          #!/bin/bash
          set -e

          LOG_FILE="/var/log/arcgis-portal-setup.log"
          exec > >(tee -a "$LOG_FILE")
          exec 2>&1

          echo "========================================"
          echo "UPDATE PORTAL PROPERTIES"
          echo "========================================"

          PORTAL_ADMIN_USER="{{ PortalAdminUser }}"
          PORTAL_ADMIN_PASSWORD="{{ PortalAdminPassword }}"
          SITE_DOMAIN="{{ SiteDomain }}"
          PORTAL_WEB_ADAPTOR_NAME="{{ PortalWebAdaptorName }}"
          PRIMARY_HOST_NAME="{{ PrimaryPortalDNSName }}"

          # Get admin token
          token=$(curl -k -s -X POST "https://$PRIMARY_HOST_NAME:7443/arcgis/sharing/rest/generateToken" \
            -d "username=$PORTAL_ADMIN_USER" \
            -d "password=$PORTAL_ADMIN_PASSWORD" \
            -d "client=requestip" \
            -d "f=json" | jq -r '.token')

          if [ "$token" = "null" ] || [ -z "$token" ]; then
            echo "WARNING: Failed to get admin token for updating properties"
            exit 0
          fi

          # Update portal properties as needed
          echo "Updating Portal properties..."
          PORTAL_PROPERTIES="{\"WebContextURL\": \"https://$SITE_DOMAIN/$PORTAL_WEB_ADAPTOR_NAME\", \"privatePortalURL\": \"https://$SITE_DOMAIN/$PORTAL_WEB_ADAPTOR_NAME\"}"

          curl -k -X POST "https://$PRIMARY_HOST_NAME:7443/arcgis/portaladmin/system/properties/update" \
            -d "properties=$PORTAL_PROPERTIES" \
            -d "token=$token" \
            -d "f=json" > /var/log/portal_properties_response.json

          if jq -e '.status == "success"' /var/log/portal_properties_response.json > /dev/null; then
            echo "SUCCESS: Updated Portal properties successfully"
          else
            echo "ERROR: Failed to update Portal properties"
            cat /var/log/portal_properties_response.json
            exit 1
          fi

          echo "SUCCESS: Portal properties updated"
  - name: WaitForStandbyService
    action: 'aws:runShellScript'
    description: 'Wait for standby Portal service to be fully ready'
    precondition:
      StringEquals:
        - "{{ PortalRole }}"
        - "Standby"
    inputs:
      runCommand:
        - |
          #!/bin/bash
          set -e

          LOG_FILE="/var/log/arcgis-portal-setup.log"
          exec > >(tee -a "$LOG_FILE")
          exec 2>&1

          echo "========================================"
          echo "WAIT FOR STANDBY PORTAL SERVICE"
          echo "========================================"


          echo "Waiting for standby Portal service to be fully ready..."

          max_attempts=60
          attempt=0

          while [ $attempt -lt $max_attempts ]; do
            if curl -k -s -f "https://localhost:7443/arcgis/portaladmin/healthCheck" > /dev/null 2>&1; then
              echo "SUCCESS: Standby Portal service is ready"
              exit 0
            fi
            echo "Attempt $((attempt + 1))/$max_attempts: Service not ready yet..."
            sleep 10
            attempt=$((attempt + 1))
          done

          echo "ERROR: Standby Portal service failed to become ready"
          exit 1

  - name: VerifyHAStatus
    action: 'aws:runShellScript'
    description: 'Verify Portal high availability status (Standby Portal only)'
    precondition:
      StringEquals:
        - "{{ PortalRole }}"
        - "Standby"
    inputs:
      runCommand:
        - |
          #!/bin/bash
          set -e

          LOG_FILE="/var/log/arcgis-portal-setup.log"
          exec > >(tee -a "$LOG_FILE")
          exec 2>&1
          echo "========================================"
          echo "VERIFY PORTAL HIGH AVAILABILITY STATUS"
          echo "========================================"

          echo "Verifying Portal HA status..."

          REGION="{{ Region }}"
          PORTAL_ADMIN_USER="{{ PortalAdminUser }}"
          PORTAL_ADMIN_PASSWORD="{{ PortalAdminPassword }}"
          PRIMARY_HOST_NAME="{{ PrimaryPortalDNSName }}"



          # Get admin token
          token=$(curl -k -s -X POST "https://$PRIMARY_HOST_NAME:7443/arcgis/sharing/rest/generateToken" \
            -d "username=$PORTAL_ADMIN_USER" \
            -d "password=$PORTAL_ADMIN_PASSWORD" \
            -d "client=requestip" \
            -d "f=json" | jq -r '.token')

          if [ "$token" = "null" ] || [ -z "$token" ]; then
            echo "WARNING: Failed to get admin token for verification"
            exit 0
          fi

          # Get Portal HA status
          echo "Portal HA status:"
          curl -k -s "https://$PRIMARY_HOST_NAME:7443/arcgis/portaladmin/machines?f=json&token=$token" | jq '.'

          echo "SUCCESS: HA verification complete"

  - name: FinalizeConfiguration
    action: 'aws:runShellScript'
    description: 'Finalize configuration and log completion'
    inputs:
      runCommand:
        - |
          #!/bin/bash

          LOG_FILE="/var/log/arcgis-portal-setup.log"
          exec > >(tee -a "$LOG_FILE")
          exec 2>&1

          echo "========================================"
          echo "FINALIZE CONFIGURATION"
          echo "========================================"

          PORTAL_ROLE="{{PortalRole}}"
          INSTANCE_ID="{{ InstanceID }}"
          PRIVATE_IP="{{ PrivateIP }}"
          PORTAL_HOST_NAME="{{ PrimaryPortalDNSName }}"

          echo "========================================"
          echo "ArcGIS Portal initialization completed"
          echo "Portal Role: $PORTAL_ROLE"
          echo "Instance ID: $INSTANCE_ID"
          echo "Private IP: $PRIVATE_IP"
          echo "PORTAL_HOST_NAME: $PORTAL_HOST_NAME"
          echo "Portal URL: https://$PORTAL_HOST_NAME:7443/arcgis/home"
          echo "Portal Admin URL: https://$PORTAL_HOST_NAME:7443/arcgis/portaladmin"
          echo "Time: $(date)"
          echo "========================================"

          echo ""
          echo "Configuration logs:"
          echo "  Main: $LOG_FILE"
          echo ""
          echo "SUCCESS: Configuration complete"
