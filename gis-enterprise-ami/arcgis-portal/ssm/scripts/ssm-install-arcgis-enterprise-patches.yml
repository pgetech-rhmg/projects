schemaVersion: "2.2"
description: |
  Install ArcGIS Enterprise patches.
  This document installs ArcGIS Enterprise patches on Linux RHEL instances.
  The document supports patching ArcGIS Server, Portal for ArcGIS, and ArcGIS Data Store.
  Target instances using instance IDs or tags when running the command.
parameters:
  OnlySecurityPatches:
    type: String
    description: Install security patches only if set to "true".
    default: "false"
    allowedValues:
      - "true"
      - "false"
  ArcGISVersion:
    type: String
    description: ArcGIS Enterprise version installed on the target instances.
    default: "11.5"
    allowedValues:
      - "11.5"
  InstallDir:
    type: String
    description: The directory where ArcGIS Enterprise is installed.
    default: "/opt/arcgis"
mainSteps:
  - name: ApplyPortalPatches
    action: 'aws:runShellScript'
    description: Download and apply ArcGIS Portal patches
    inputs:
      timeoutSeconds: '1800'
      runCommand:
        - |
          #!/bin/bash
          set -e

          # Initialize logging
          timestamp=$(date +"%Y%m%d_%H%M%S")
          patch_dir="{{ InstallDir }}/patches"

          if [ ! -d "$patch_dir" ]; then
            sudo mkdir -p "$patch_dir"
            sudo chown arcgis:arcgis "$patch_dir"
          fi

          if [ "{{ OnlySecurityPatches }}" == "true" ]; then
              patch_arg="-c -i security"
            else
              patch_arg="-c -i all"
          fi

          # Check if any ArcGIS Portal is installed before proceeding
          if [ ! -d "{{ InstallDir }}/portal" ]; then
            echo "No ArcGIS Enterprise Portal installation found, Exiting."
            exit 0
          fi

          log_file="$patch_dir/ArcGIS_portal_Patch_$timestamp.log"
          exec > >(tee -a "$log_file")
          exec 2>&1

          echo "========================================"
          echo "ArcGIS Portal Patch Installation"
          echo "Time: $(date)"
          echo "========================================"

          # Check if the ESRI properties file exists with correct hostname
          instance_hostname=$(cat /etc/hostname)
          esri_prop_file="/home/arcgis/.ESRI.properties.${instance_hostname}.{{ ArcGISVersion }}"
          if [ ! -f "$esri_prop_file" ]; then
            echo "ESRI properties file not found at $esri_prop_file. copying the ESRI properties file."
            src_file=$(find /home/arcgis/ -name ".ESRI.properties.*" -type f | head -1)
            if [ -n "$src_file" ]; then
              sudo -u arcgis cp "$src_file" "$esri_prop_file"
              echo "Copied $src_file to $esri_prop_file"
            else
              echo "ERROR: No .ESRI.properties.* file found to copy"
            fi
          fi
          if [ -f "/opt/arcgis/portal/tools/patchnotification/patchnotification" ]; then
            # Set the patchnotify utility to delete the downloaded patches
            echo "Setting delete option for patch download."
            sudo -u arcgis /opt/arcgis/portal/tools/patchnotification/patchnotification -s -d $patch_dir -o always

            # apply arcgis portal patches
            echo "Applying patches to ArcGIS Portal"
            sudo -u arcgis /opt/arcgis/portal/tools/patchnotification/patchnotification $patch_arg

            echo "Verifying the ArcGIS Portal patches installation status"
            sudo -u arcgis /opt/arcgis/portal/tools/patchnotification/patchnotification -c
            echo "Patch installation completed at $(date)"
          else
            echo "Patchnotification utility not found for ArcGIS Portal. Skipping patch installation."
          fi

