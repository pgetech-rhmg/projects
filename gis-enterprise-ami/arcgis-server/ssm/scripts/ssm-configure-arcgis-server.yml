schemaVersion: '2.2'
description: 'Configure ArcGIS Server - Primary or Secondary node deployment with optional Workflow Manager'
parameters:
  Region:
    type: String
    description: 'AWS Region'
    default: 'us-west-2'
  DeploymentBucket:
    type: String
    description: 'S3 bucket containing installer and license files'
  ServerAdminUser:
    type: String
    description: 'ArcGIS Server administrator username'
    default: 'siteadmin'
  ServerAdminPassword:
    type: String
    description: 'ArcGIS Server administrator password (use SecureString)'
  LicenseFileS3Key:
    type: String
    description: 'S3 key for ArcGIS Server license file (.prvc)'
  EfsId:
    type: String
    description: 'EFS file system ID for shared storage'
  SiteDomain:
    type: String
    description: 'Domain name for the site'
  PortalAdminUser:
    type: String
    description: 'Portal administrator username'
    default: 'portaladmin'
  PortalAdminPassword:
    type: String
    description: 'Portal administrator password (use SecureString)'
    default: ''
  WebAdaptorName:
    type: String
    description: 'ArcGIS Server Web Adaptor name'
    default: 'hosted'
  SslCertPassword:
    type: String
    description: 'SSL certificate password'
    default: ''
  SslCertFileS3Key:
    type: String
    description: 'S3 key for SSL certificate file (.pfx)'
    default: ''
  WorkflowManager:
    type: String
    description: 'Enable Workflow Manager installation (true/false)'
    default: 'false'
    allowedValues:
      - 'true'
      - 'false'
  ArcGISVersion:
    type: String
    description: 'ArcGIS version'
    default: '11.5'
  ServerRole:
    type: String
    description: 'Server role: Primary or Secondary'
    default: 'Primary'
    allowedValues:
      - 'Primary'
      - 'Secondary'
  InstanceID:
    type: String
    description: 'ArcGIS Server EC2 Instance ID (for internal use)'
    default: ''
  PrivateIP:
    type: String
    description: 'ArcGIS Server EC2 Private IP (for internal use)'
    default: ''
  PrimaryServerDNSName:
    type: String
    description: 'Primary ArcGIS Server DNS Name (for internal use)'
    default: ''

mainSteps:
  - name: DisableRHELSubscriptionManager
    action: 'aws:runShellScript'
    description: 'Disable RHEL Subscription Manager to prevent subscription prompts'
    inputs:
      runCommand:
        - |
          #!/bin/bash
          set -e
          subscription-manager config --rhsm.manage_repos=0
          subscription-manager config --rhsm.auto_enable_yum_plugins=0
          sed -i 's/enabled[ ]*=[ ]*1/enabled=0/g' /etc/yum/pluginconf.d/subscription-manager.conf
          
  - name: MountEfsStorage
    action: 'aws:runShellScript'
    description: 'Mount EFS share for arcgisserver content store'
    inputs:
      runCommand:
        - |
          #!/bin/bash
          set -e
          
          LOG_FILE="/var/log/arcgis-server-setup.log"
          exec > >(tee -a "$LOG_FILE")
          exec 2>&1
          echo "========================================" 
          echo "Starting ArcGIS Server initialization" 
          echo "Time: $(date)" 
          echo "========================================" 

          EFS_ID="{{ EfsId }}"
          MNT_DIR="/mnt/arcgisserver"

            INSTANCE_ID="{{ InstanceID }}"

          # Update instance hostname
          hostnamectl set-hostname "arcgis-server-$INSTANCE_ID"
          echo "SUCCESS: Hostname updated to arcgis-server-$INSTANCE_ID"
          
          if [ -z "$EFS_ID" ]; then
            echo "ERROR: EFS_ID not provided" 
            exit 1
          fi

          echo "Installing required packages..." 
          yum update -y
          yum install -y jq curl

          echo "Building and Installing efs-utils from source..." 
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source /root/.cargo/env
          yum -y install golang git rpm-build make rust cargo openssl-devel cmake wget perl # remove gcc gcc-c++ here if you already installed a compatible version following GCC Version Requirements instruction
          if [ ! -d "efs-utils" ]; then
            git clone https://github.com/aws/efs-utils
            cd efs-utils
            make rpm
            yum -y install build/amazon-efs-utils*rpm
          fi

          echo "Mount EFS share" 
          if [ -n "${EFS_ID}" ]; then
            echo "Mounting EFS share" 
            systemctl enable amazon-ssm-agent
            systemctl start amazon-ssm-agent
            if [[ -d "${MNT_DIR}" ]]; then
              echo "Directory already ${MNT_DIR} exists" 
            else
              mkdir -p "${MNT_DIR}" # Create mount point
              echo "created directory ${MNT_DIR}" 
            fi
            echo "Add EFS mount to fstab (avoid duplicates)" 
            if ! grep -q "${EFS_ID}:/" /etc/fstab; then
              if echo "${EFS_ID}:/ ${MNT_DIR} efs _netdev,tls,iam 0 0" >> /etc/fstab; then
                echo "Successfully added EFS mount to /etc/fstab" 
                # Test mount
                if mount -a; then
                  echo "EFS mounted successfully" 
                else
                  echo "Warning: Mount test failed" >&2 
                fi
              else
                echo "Error: Failed to add EFS mount to /etc/fstab" >&2 
                exit 1
              fi
            else
                echo "EFS mount already exists in /etc/fstab" 
            fi
            # Mount the share
            mount -fav
            # Verify EFS mount
            if mountpoint -q "${MNT_DIR}"; then
                echo "EFS share mounted successfully"

            else
                echo "ERROR: Failed to mount EFS share" 
                exit 1
            fi
          else
              echo "ERROR: EFS_ID not provided" 
              exit 1
          fi
          
          # Verify mount point
          if [[ ! -d "${MNT_DIR}" ]]; then
            echo "ERROR: Directory ${MNT_DIR} does not exist" 
            exit 1
          else
            echo "Directory ${MNT_DIR} already exists" 
          fi

          # Set proper ownership and permissions
          chown -R arcgis:arcgis /mnt/arcgisserver
          chmod -R 755 /mnt/arcgisserver

  - name: CreateConfigStoreAndDirectories
    action: 'aws:runShellScript'
    description: 'Create ArcGIS Server config store and directories on EFS share'
    inputs:
      runCommand:
        - |
          #!/bin/bash
          set -e
          
          LOG_FILE="/var/log/arcgis-server-setup.log"
          exec > >(tee -a "$LOG_FILE")
          exec 2>&1
          echo "========================================"
          echo "Creating ArcGIS Server config store and directories"
          echo "========================================"
          CONFIG_STORE_CONNECTION="/mnt/arcgisserver/config-store"
          DIRECTORIES_ROOT="/mnt/arcgisserver/directories"
          
          mkdir -p "$CONFIG_STORE_CONNECTION" || {
            echo "ERROR: Failed to create config store directory" 
            exit 1
          }
          mkdir -p "$DIRECTORIES_ROOT" || {
            echo "ERROR: Failed to create directories root" 
            exit 1
          }
          echo "SUCCESS: created config store - ${CONFIG_STORE_CONNECTION} and directories - ${DIRECTORIES_ROOT}"
          # Set proper ownership and permissions
          chown -R arcgis:arcgis /mnt/arcgisserver
          chmod -R 755 /mnt/arcgisserver

  - name: DownloadLicenseAndCertificates
    action: 'aws:runShellScript'
    description: 'Download license file and SSL certificates from S3'
    inputs:
      runCommand:
        - |
          #!/bin/bash
          set -e
          
          LOG_FILE="/var/log/arcgis-server-setup.log"
          exec > >(tee -a "$LOG_FILE")
          exec 2>&1
          echo "========================================"
          echo "Downloading license file and SSL certificates from S3"
          echo "========================================"
          REGION="{{ Region }}"
          DEPLOYMENT_BUCKET="{{ DeploymentBucket }}"
          LICENSE_FILE_S3_KEY="{{ LicenseFileS3Key }}"
          SSL_CERT_FILE_S3_KEY="{{ SslCertFileS3Key }}"
          
          echo "Downloading license and certificates..." 
          
          # Download license file
          echo "Downloading license file from S3..." 
          aws s3 cp "s3://$DEPLOYMENT_BUCKET/$LICENSE_FILE_S3_KEY" /opt/arcgis/server.prvc --region "$REGION" || {
            echo "ERROR: Failed to download license file" 
            exit 1
          }
          chown arcgis:arcgis /opt/arcgis/server.prvc
          chmod 600 /opt/arcgis/server.prvc
          echo "SUCCESS: License file downloaded" 
          
          # Download SSL certificate if provided
          if [ -n "$SSL_CERT_FILE_S3_KEY" ]; then
            echo "Downloading SSL certificate from S3..." 
            aws s3 cp "s3://$DEPLOYMENT_BUCKET/$SSL_CERT_FILE_S3_KEY" /opt/arcgis/ssl_certificate.pfx --region "$REGION" || {
              echo "ERROR: Failed to download SSL certificate" 
              exit 1
            }
            chown arcgis:arcgis /opt/arcgis/ssl_certificate.pfx
            chmod 600 /opt/arcgis/ssl_certificate.pfx
            echo "SUCCESS: SSL certificate downloaded" 
          else
            echo "INFO: No SSL certificate configured" 
          fi

  - name: AuthorizeLicense
    action: 'aws:runShellScript'
    description: 'Authorize ArcGIS Server license'
    inputs:
      runCommand:
        - |
          #!/bin/bash
          set -e
          
          LOG_FILE="/var/log/arcgis-server-setup.log"
          exec > >(tee -a "$LOG_FILE")
          exec 2>&1
          echo "========================================"
          echo "Authorize ESRI License"
          echo "========================================"

          ARCGIS_HOME="/opt/arcgis/server"
          
          echo "Authorizing ArcGIS Server license..." 
          
          sudo -u arcgis $ARCGIS_HOME/tools/authorizeSoftware -f /opt/arcgis/server.prvc || {
                echo "ERROR: License authorization failed" 
                exit 1
                }
          
          echo "SUCCESS: License authorized" 

  - name: SetupPrimaryServer
    action: 'aws:runShellScript'
    description: 'Create ArcGIS Server site (Primary server only)'
    precondition:
      StringEquals:
        - "{{ ServerRole }}"
        - "Primary"
    inputs:
      runCommand:
        - |
          #!/bin/bash
          set -e
          
          LOG_FILE="/var/log/arcgis-server-setup.log"
          exec > >(tee -a "$LOG_FILE")
          exec 2>&1
        
          
          echo "========================================" 
          echo "PRIMARY SERVER SETUP" 
          echo "========================================" 
          
          SERVER_ADMIN_USER="{{ ServerAdminUser }}"
          SERVER_ADMIN_PASSWORD="{{ ServerAdminPassword }}"
          CONFIG_STORE_CONNECTION="/mnt/arcgisserver/config-store"
          DIRECTORIES_ROOT="/mnt/arcgisserver/directories"
          
          # Create site properties file
          cat > /opt/arcgis/create_server.properties << EOF
          SERVER_ADMIN_USERNAME=$SERVER_ADMIN_USER
          SERVER_ADMIN_PASSWORD=$SERVER_ADMIN_PASSWORD
          SERVER_ADMIN_PASSWORD_ENCRYPTED=false
          SERVER_DIRECTORIES_PATH=$DIRECTORIES_ROOT
          SERVER_CONFIG_STORE_CONNECTION=$CONFIG_STORE_CONNECTION
          EOF
          
          # Create the site
          echo "Creating ArcGIS Server site..." 
          /opt/arcgis/server/tools/createsite/createsite.sh -f /opt/arcgis/create_server.properties || {
            echo "ERROR: Failed to create Server site" 
            exit 1
          }
          
          # Clean up properties file
          # rm -f /opt/arcgis/create_server.properties
          
          echo "SUCCESS: Primary server site created" 

  - name: WaitForPrimaryService
    action: 'aws:runShellScript'
    description: 'Wait for ArcGIS Server service to be ready (Primary server only)'
    precondition:
      StringEquals:
        - "{{ ServerRole }}"
        - "Primary"
    inputs:
      runCommand:
        - |
          #!/bin/bash
          set -e
          
          LOG_FILE="/var/log/arcgis-server-setup.log"
          exec > >(tee -a "$LOG_FILE")
          exec 2>&1
          echo "========================================"
          echo "Wait for Primary Server Service"
          echo "========================================"
          
          echo "Waiting for ArcGIS Server service to be ready..." 
          SERVER_HOST_NAME="{{ PrimaryServerDNSName }}"
          max_attempts=60
          attempt=0
          
          while [ $attempt -lt $max_attempts ]; do
            if curl -k -s -f "https://$SERVER_HOST_NAME:6443/arcgis/admin/healthCheck" > /dev/null 2>&1; then
              echo "SUCCESS: ArcGIS Server service is ready" 
              exit 0
            fi
            echo "Attempt $((attempt + 1))/$max_attempts: Service not ready yet..." 
            sleep 10
            attempt=$((attempt + 1))
          done
          
          echo "ERROR: ArcGIS Server service failed to become ready" 
          exit 1

  - name: JoinSecondaryServer
    action: 'aws:runShellScript'
    description: 'Join secondary server to existing site (Secondary server only)'
    precondition:
      StringEquals:
        - "{{ ServerRole }}"
        - "Secondary"
    inputs:
      runCommand:
        - |
          #!/bin/bash
          set -e
          
          LOG_FILE="/var/log/arcgis-server-setup.log"
          exec > >(tee -a "$LOG_FILE")
          exec 2>&1
          
          echo "========================================" 
          echo "SECONDARY SERVER SETUP" 
          echo "========================================" 
          
          REGION="{{ Region }}"
          WEBADAPTOR_NAME="{{ WebAdaptorName }}"
          SERVER_ADMIN_USER="{{ ServerAdminUser }}"
          SERVER_ADMIN_PASSWORD="{{ ServerAdminPassword }}"
          PRIMARY_HOST_NAME="{{ PrimaryServerDNSName }}"
          echo "Primary server host name: $PRIMARY_HOST_NAME" 
          
          # Wait for primary server to be ready
          echo "Waiting for primary server to be ready..." 
          max_attempts=120
          attempt=0
          
          while [ $attempt -lt $max_attempts ]; do
            if curl -k -s -f "https://$PRIMARY_HOST_NAME:6443/arcgis/admin/healthCheck" > /dev/null 2>&1; then
              echo "Primary server is ready" 
              break
            fi
            echo "Attempt $((attempt + 1))/$max_attempts: Primary server not ready yet..." 
            sleep 10
            attempt=$((attempt + 1))
          done
          
          if [ $attempt -eq $max_attempts ]; then
            echo "ERROR: Primary server did not become ready in time" 
            exit 1
          fi
          
          # Join the site
          echo "Joining site on primary server at $PRIMARY_HOST_NAME..." 
          curl -k -X POST "https://localhost:6443/arcgis/admin/joinSite" \
            -d "adminURL=https://$PRIMARY_HOST_NAME:6443/arcgis/admin" \
            -d "username=$SERVER_ADMIN_USER" \
            -d "password=$SERVER_ADMIN_PASSWORD" \
            -d "f=json" > /var/log/join_site_response.json
          
          if jq -e '.status == "success"' /var/log/join_site_response.json > /dev/null; then
            echo "SUCCESS: Joined site successfully" 
          else
            echo "ERROR: Failed to join site" 
            cat /var/log/join_site_response.json 
            exit 1
          fi

  - name: WaitForSecondaryService
    action: 'aws:runShellScript'
    description: 'Wait for secondary server service to be ready'
    precondition:
      StringEquals:
        - "{{ ServerRole }}"
        - "Secondary"
    inputs:
      runCommand:
        - |
          #!/bin/bash
          set -e
          
          LOG_FILE="/var/log/arcgis-server-setup.log"
          exec > >(tee -a "$LOG_FILE")
          exec 2>&1
          
          echo "========================================" 
          echo "Wait for Secondary Server Service" 
          echo "========================================" 
          
          echo "Waiting for secondary server service to be ready..." 
          
          max_attempts=60
          attempt=0
          
          while [ $attempt -lt $max_attempts ]; do
            if curl -k -s -f "https://localhost:6443/arcgis/admin/healthCheck" > /dev/null 2>&1; then
              echo "SUCCESS: Secondary server service is ready" 
              exit 0
            fi
            echo "Attempt $((attempt + 1))/$max_attempts: Service not ready yet..." 
            sleep 10
            attempt=$((attempt + 1))
          done
          
          echo "ERROR: Secondary server service failed to become ready" 
          exit 1

  - name: InstallWorkflowManager
    action: 'aws:runShellScript'
    description: 'Install and configure ArcGIS Workflow Manager (if enabled)'
    precondition:
      StringEquals:
        - "{{ WorkflowManager }}"
        - "true"
    inputs:
      runCommand:
        - |
          #!/bin/bash
          set -e
          LOG_FILE="/var/log/arcgis-server-setup.log"
          exec > >(tee -a "$LOG_FILE")
          exec 2>&1
          
          echo "========================================" 
          echo "WORKFLOW MANAGER SERVER SETUP" 
          echo "========================================" 

          WORKFLOW_MANAGER="{{ WorkflowManager }}"
          installer_directory="/opt/software/arcgis/{{ ArcGISVersion }}"
          
          # Check if installer exists
          if [ ! -f "$installer_directory/arcgis_wfm_installer.tar.gz" ]; then
            echo "Workflow Manager installer not found at $installer_directory/arcgis_wfm_installer.tar.gz" 
            aws s3 cp "s3://{{ DeploymentBucket }}/esri/arcgis-enterprise/11-5/ArcGIS_Workflow_Manager_Server_115_195486.tar.gz" "$installer_directory/" --region "{{ Region }}" || {
              echo "ERROR: Failed to download Workflow Manager installer from S3" 
              exit 1
            }
          fi
      
          echo "Workflow Manager installer found" 
          
          # Extract installer
          echo "Extracting Workflow Manager installer..." 
          tar -xzf "$installer_directory/ArcGIS_Workflow_Manager_Server_115_195486.tar.gz" -C "$installer_directory/"
          chown -R arcgis:arcgis "$installer_directory/setups/ArcGISWorkflowManagerServer"
          
          # Install Workflow Manager
          echo "Installing ArcGIS Workflow Manager..." 
          cd "$installer_directory/setups/ArcGISWorkflowManagerServer"
          sudo -u arcgis ./Setup.sh -m silent -l yes -d /opt/arcgis || {
            echo "ERROR: Failed to install ArcGIS Workflow Manager" 
            exit 1
          }
          
          echo "SUCCESS: ArcGIS Workflow Manager installed" 
          
          # Create systemd service
          echo "Creating systemd service for Workflow Manager..." 
          cat > /etc/systemd/system/arcgis-workflow-manager.service << 'EOF'
          [Unit]
          Description=ArcGIS Workflow Manager
          Wants=arcgisserver.service
          After=network.target arcgisserver.service
          PartOf=arcgisserver.service

          [Service]
          Type=forking
          User=arcgis
          #PIDFile=/opt/arcgis/server/WorkflowManager/ArcGISWorkflowManager.wrapper.pid
          GuessMainPID=false
          ExecStart=/opt/arcgis/server/WorkflowManager/bin/workflowmanager.sh start
          ExecReload=/opt/arcgis/server/WorkflowManager/bin/workflowmanager.sh restart
          ExecStop=/opt/arcgis/server/WorkflowManager/bin/workflowmanager.sh stop

          [Install]
          #Alias=ArcGISWorkflowManager
          WantedBy=multi-user.target
          EOF
          
          systemctl daemon-reload
          systemctl enable arcgis-workflow-manager.service
          
          echo "SUCCESS: Workflow Manager service configured" 

  - name: VerifyClusterStatus
    action: 'aws:runShellScript'
    description: 'Verify cluster status (Secondary server only)'
    precondition:
      StringEquals:
        - "{{ ServerRole }}"
        - "Secondary"
    inputs:
      runCommand:
        - |
          #!/bin/bash
          set -e
          
          LOG_FILE="/var/log/arcgis-server-setup.log"
          exec > >(tee -a "$LOG_FILE")
          exec 2>&1
          
          echo "========================================" 
          echo "Cluster Status Verification" 
          echo "========================================" 
          
          WEBADAPTOR_NAME="{{ WebAdaptorName }}"
          SERVER_ADMIN_USER="{{ ServerAdminUser }}"
          SERVER_ADMIN_PASSWORD="{{ ServerAdminPassword }}"
          
          PRIMARY_HOST_NAME="{{ PrimaryServerDNSName }}"
          echo "Primary server host name: $PRIMARY_HOST_NAME"
          # Get admin token
          token=$(curl -k -s -X POST "https://$PRIMARY_HOST_NAME:6443/arcgis/admin/generateToken" \
            -d "username=$SERVER_ADMIN_USER" \
            -d "password=$SERVER_ADMIN_PASSWORD" \
            -d "client=requestip" \
            -d "f=json" | jq -r '.token')
          
          if [ "$token" = "null" ] || [ -z "$token" ]; then
            echo "WARNING: Failed to get admin token for verification" 
            exit 0
          fi
          
          # Get cluster status
          echo "Cluster status:" 
          curl -k -s "https://$PRIMARY_HOST_NAME:6443/arcgis/admin/clusters?f=json&token=$token" | jq '.' 
          
          echo "SUCCESS: Cluster verification complete" 

  - name: FinalizeConfiguration
    action: 'aws:runShellScript'
    description: 'Finalize configuration and log completion'
    inputs:
      runCommand:
        - |
          #!/bin/bash
          
          LOG_FILE="/var/log/arcgis-server-setup.log"
          exec > >(tee -a "$LOG_FILE")
          exec 2>&1
          
          echo "========================================" 
          echo "Finalize Configuration" 
          echo "========================================" 
          SERVER_ROLE="{{ ServerRole }}"
          INSTANCE_ID="{{ InstanceID }}"
          PRIVATE_IP="{{ PrivateIP }}"
          PRIMARY_HOST_NAME="{{ PrimaryServerDNSName }}"
          
          echo "========================================" 
          echo "ArcGIS Server initialization completed" 
          echo "Server Role: $SERVER_ROLE" 
          echo "Instance ID: $INSTANCE_ID" 
          echo "Private IP: $PRIVATE_IP" 
          echo "Time: $(date)" 
          echo "========================================" 
          
          echo "" 
          echo "Configuration logs:" 
          echo "  Main: $LOG_FILE" 
          
          if [ "$SERVER_ROLE" = "Primary" ]; then
            echo "  Primary setup: /var/log/arcgis-primary-setup.log" 
          else
            echo "  Secondary setup: /var/log/arcgis-secondary-setup.log" 
          fi
          
          if [ "{{ WorkflowManager }}" = "true" ]; then
            echo "  Workflow Manager: /var/log/arcgis-workflow-manager-setup.log" 
          fi
          
          echo "" 
          echo "Server URL: https://$PRIMARY_HOST_NAME:6443/arcgis/admin" 

          echo "SUCCESS: Configuration complete" 
