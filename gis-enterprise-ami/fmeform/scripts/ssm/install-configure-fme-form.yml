---
schemaVersion: '2.2'
description: 'Install FME Form 2025.2.2 on Windows EC2 instances from S3 with optional floating license server configuration'
parameters:
  InstallDrive:
    type: String
    description: 'Drive letter for FME Form installation (e.g., G:)'
    default: 'G:'
  S3Bucket:
    type: String
    description: 'S3 bucket containing FME Form installer'
    default: 'elevate-installer'
  S3Key:
    type: String
    description: 'S3 object key for FME Form installer'
    default: 'esri/fmeform/fme-form-2025.2.2-b25827-win-x64.exe'
  FloatingLicenseServer:
    type: String
    description: 'Floating license server hostname or IP'
    default: ''
  FloatingLicensePort:
    type: String
    description: 'Floating license server port'
    default: '27273'
mainSteps:
  - action: 'aws:runPowerShellScript'
    name: 'PrerequisiteChecks'
    onFailure: Abort
    inputs:
      runCommand:
        - |
          ###############################################################################
          # Step 1: Prerequisite Checks
          ###############################################################################

          [CmdletBinding()]
          param()

          # SSM Parameters
          $InstallDrive = '{{ InstallDrive }}'
          
          # Build paths internally
          $ExtractionPath = "${InstallDrive}\installer\fme-form-2025.2.2-extract"
          $InstallPath = "${InstallDrive}\FME\Form2025"

          # Color output functions
          function Write-Info {
              param([string]$Message)
              Write-Host "[INFO] $Message" -ForegroundColor Green
          }

          function Write-Error-Custom {
              param([string]$Message)
              Write-Host "[ERROR] $Message" -ForegroundColor Red
          }

          function Write-Success {
              param([string]$Message)
              Write-Host "[SUCCESS] $Message" -ForegroundColor Green
          }

          function Write-Step {
              param([string]$Message)
              Write-Host "[STEP] $Message" -ForegroundColor Cyan
          }

          # Check if running as Administrator
          function Test-Administrator {
              $currentUser = [Security.Principal.WindowsIdentity]::GetCurrent()
              $principal = New-Object Security.Principal.WindowsPrincipal($currentUser)
              return $principal.IsInRole([Security.Principal.WindowsBuiltInRole]::Administrator)
          }

          if (-not (Test-Administrator)) {
              Write-Error-Custom "This script must be run as Administrator"
              exit 1
          }

          Write-Info "FME Form 2025.2.2 Installation - Prerequisite Checks"
          Write-Info "===================================================="

          # Check if G: drive exists
          if (-not (Test-Path "G:\")) {
              Write-Error-Custom "G: drive not found. Please ensure the drive is available."
              exit 1
          }

          Write-Success "G: drive detected"

          # Create directories
          Write-Step "Creating required directories..."
          
          if (-not (Test-Path $ExtractionPath)) {
              Write-Info "Creating extraction directory: $ExtractionPath"
              New-Item -ItemType Directory -Path $ExtractionPath -Force | Out-Null
          }

          if (-not (Test-Path (Split-Path -Parent $InstallPath))) {
              Write-Info "Creating install parent directory: $(Split-Path -Parent $InstallPath)"
              New-Item -ItemType Directory -Path (Split-Path -Parent $InstallPath) -Force | Out-Null
          }

          $localInstallerDir = Split-Path -Parent $ExtractionPath
          if (-not (Test-Path $localInstallerDir)) {
              Write-Info "Creating local installer directory: $localInstallerDir"
              New-Item -ItemType Directory -Path $localInstallerDir -Force | Out-Null
          }

          Write-Success "Prerequisite checks completed successfully"

  - action: 'aws:runPowerShellScript'
    name: 'DownloadInstaller'
    onFailure: Abort
    inputs:
      runCommand:
        - |
          ###############################################################################
          # Step 2: Download/Copy Installer
          ###############################################################################

          [CmdletBinding()]
          param()

          # SSM Parameters
          $InstallDrive = '{{ InstallDrive }}'
          $S3Bucket = '{{ S3Bucket }}'
          $S3Key = '{{ S3Key }}'
          
          # Build paths internally
          $ExtractionPath = "${InstallDrive}\installer\fme-form-2025.2.2-extract"

          # Color output functions
          function Write-Info {
              param([string]$Message)
              Write-Host "[INFO] $Message" -ForegroundColor Green
          }

          function Write-Warn {
              param([string]$Message)
              Write-Host "[WARN] $Message" -ForegroundColor Yellow
          }

          function Write-Error-Custom {
              param([string]$Message)
              Write-Host "[ERROR] $Message" -ForegroundColor Red
          }

          function Write-Success {
              param([string]$Message)
              Write-Host "[SUCCESS] $Message" -ForegroundColor Green
          }

          function Write-Step {
              param([string]$Message)
              Write-Host "[STEP] $Message" -ForegroundColor Cyan
          }

          Write-Info "FME Form 2025.2.2 Installation - Download Installer"
          Write-Info "===================================================="

          # Define local installer path
          $localInstallerDir = Split-Path -Parent $ExtractionPath
          $installerFileName = Split-Path -Leaf $S3Key
          $localInstallerPath = Join-Path $localInstallerDir $installerFileName
          
          # Download installer from S3 if not already present
          if (-not (Test-Path $localInstallerPath)) {
              Write-Step "Downloading FME Form installer from S3..."
              Write-Info "Bucket: $S3Bucket"
              Write-Info "Key: $S3Key"
              Write-Info "Destination: $localInstallerPath"
              
              try {
                  # Check if AWS CLI is installed
                  $awsVersion = aws --version 2>&1
                  if ($LASTEXITCODE -ne 0) {
                      Write-Error-Custom "AWS CLI not found. Please install AWS CLI first."
                      Write-Info "Download from: https://aws.amazon.com/cli/"
                      exit 1
                  }
                  
                  Write-Info "AWS CLI version: $awsVersion"
                  
                  # Download from S3
                  aws s3 cp "s3://$S3Bucket/$S3Key" "$localInstallerPath" --no-progress
                  
                  if ($LASTEXITCODE -ne 0) {
                      Write-Error-Custom "Failed to download installer from S3"
                      exit 1
                  }
                  
                  Write-Success "Installer downloaded successfully from S3"
              }
              catch {
                  Write-Error-Custom "Error downloading installer from S3: $_"
                  exit 1
              }
          }
          else {
              Write-Info "Installer already exists at local path: $localInstallerPath"
          }

          # Unblock the downloaded file
          Write-Info "Unblocking installer file..."
          Unblock-File -Path $localInstallerPath -ErrorAction SilentlyContinue
          Write-Success "Installer file unblocked"

          # Verify installer exists
          if (-not (Test-Path $localInstallerPath)) {
              Write-Error-Custom "Installer not found at: $localInstallerPath"
              exit 1
          }

          # Get installer file size
          $installerSize = (Get-Item $localInstallerPath).Length / 1MB
          Write-Info "Installer size: $([math]::Round($installerSize, 2)) MB"

          Write-Success "Installer ready for installation"

  - action: 'aws:runPowerShellScript'
    name: 'CheckAndUninstallExistingVersion'
    onFailure: Abort
    inputs:
      runCommand:
        - |
          ###############################################################################
          # Step 3: Check and Uninstall Existing Version
          ###############################################################################

          [CmdletBinding()]
          param()

          # SSM Parameters
          $InstallDrive = '{{ InstallDrive }}'
          $S3Key = '{{ S3Key }}'
          
          # Build paths internally
          $InstallPath = "${InstallDrive}\FME\Form2025"

          # Color output functions
          function Write-Info { param([string]$Message) Write-Host "[INFO] $Message" -ForegroundColor Green }
          function Write-Warn { param([string]$Message) Write-Host "[WARN] $Message" -ForegroundColor Yellow }
          function Write-Error-Custom { param([string]$Message) Write-Host "[ERROR] $Message" -ForegroundColor Red }
          function Write-Success { param([string]$Message) Write-Host "[SUCCESS] $Message" -ForegroundColor Green }
          function Write-Step { param([string]$Message) Write-Host "[STEP] $Message" -ForegroundColor Cyan }

          Write-Info "FME Form 2025.2.2 Installation - Uninstall Existing"
          Write-Info "===================================================="

          # Determine target version from S3 key
          $installerFileName = Split-Path -Leaf $S3Key
          $m = [regex]::Match($installerFileName, '(?i)fme-form-(\d+\.\d+\.\d+)-b\d+')
          $targetVersion = if ($m.Success) { $m.Groups[1].Value } else { $null }
          if (-not $targetVersion) {
              $targetVersion = '2025.2.2'
              Write-Warn "Could not parse version from installer name. Defaulting to $targetVersion"
          }
          Write-Step "Target version to install: $targetVersion"

          # Detect existing FME packages via Get-Package (registry scan removed)
          Write-Step "Detecting existing FME packages via Get-Package..."
          $pkgs = Get-Package -Name "*FME*" -ErrorAction SilentlyContinue
          if (-not $pkgs) {
              Write-Success "No existing FME packages detected. Proceeding with fresh install."
              exit 0
          }

          Write-Step "Existing installation(s) detected:"
          $pkgs | ForEach-Object {
              Write-Info " - $($_.Name) $($_.Version)"
          }

          # Ensure FME executables are not running before uninstall
          Write-Step "Checking/stopping running FME processes before uninstall..."
          $fmeProcs = Get-Process -Name "*FME*" -ErrorAction SilentlyContinue
          if (-not $fmeProcs) {
              Write-Info "No running FME processes detected."
          }
          else {
              $fmeProcs | ForEach-Object {
                  try {
                      Write-Info "Stopping process: $($_.Name) (Id=$($_.Id))"
                      Stop-Process -Id $_.Id -Force -ErrorAction Stop
                  } catch {
                      Write-Warn "Could not stop process $($_.Name): $_"
                  }
              }
          }

          # Uninstall via PowerShell package provider
          Write-Step "Uninstalling existing FME packages via Get-Package..."
          foreach ($p in $pkgs) {
              Write-Info "Uninstalling package: $($p.Name) $($p.Version)"
              try {
                  Uninstall-Package -InputObject $p -Force -ErrorAction Stop
                  Write-Success "Uninstalled package: $($p.Name)"
              } catch {
                  Write-Error-Custom "Failed to uninstall package $($p.Name): $_"
                  exit 1
              }
          }

          # Ensure no FME processes remain after uninstall
          Write-Step "Verifying no FME processes remain after uninstall..."
          $postProcs = Get-Process -Name "*FME*" -ErrorAction SilentlyContinue
          if ($postProcs) {
              $postProcs | ForEach-Object {
                  try {
                      Write-Info "Stopping remaining process: $($_.Name) (Id=$($_.Id))"
                      Stop-Process -Id $_.Id -Force -ErrorAction Stop
                  } catch {
                      Write-Warn "Could not stop remaining process $($_.Name): $_"
                  }
              }
          }

          # Remove leftover install directory after uninstall (best effort)
          if (Test-Path $InstallPath) {
              Write-Step "Removing existing install directory: $InstallPath (this may take a few minutes)"
              try {
                  Remove-Item -LiteralPath $InstallPath -Recurse -Force -ErrorAction Stop
                  Write-Success "Removed existing install directory"
              }
              catch {
                  Write-Warn "Could not remove install directory ${InstallPath}: $_"
              }
          }

          Write-Success "Existing installation(s) removed. Proceeding to install step."

  - action: 'aws:runPowerShellScript'
    name: 'InstallFMEForm'
    onFailure: Abort
    inputs:
      runCommand:
        - |
          ###############################################################################
          # Step 4: Install FME Form
          ###############################################################################

          [CmdletBinding()]
          param()

          # SSM Parameters
          $InstallDrive = '{{ InstallDrive }}'
          $S3Key = '{{ S3Key }}'
          $FloatingLicenseServer = '{{ FloatingLicenseServer }}'
          $FloatingLicensePort = [int]'{{ FloatingLicensePort }}'
          
          # Build paths internally
          $ExtractionPath = "${InstallDrive}\installer\fme-form-2025.2.2-extract"
          $InstallPath = "${InstallDrive}\FME\Form2025"

          # Color output functions
          function Write-Info {
              param([string]$Message)
              Write-Host "[INFO] $Message" -ForegroundColor Green
          }

          function Write-Warn {
              param([string]$Message)
              Write-Host "[WARN] $Message" -ForegroundColor Yellow
          }

          function Write-Error-Custom {
              param([string]$Message)
              Write-Host "[ERROR] $Message" -ForegroundColor Red
          }

          function Write-Success {
              param([string]$Message)
              Write-Host "[SUCCESS] $Message" -ForegroundColor Green
          }

          function Write-Step {
              param([string]$Message)
              Write-Host "[STEP] $Message" -ForegroundColor Cyan
          }

          Write-Info "FME Form 2025.2.2 Installation - Install"
          Write-Info "=========================================="

          # Use local installer path (parent of ExtractionPath)
          $installerFileName = Split-Path -Leaf $S3Key
          $localInstallerPath = Join-Path (Split-Path -Parent $ExtractionPath) $installerFileName

          # Prepare installation arguments for self-extracting EXE
          Write-Step "Preparing installation..."

          # Build MSI properties (passed to EXE via -sp); no /i here
          $msiParams = "/qb /norestart INSTALLLEVEL=3 ENABLE_POST_INSTALL_TASKS=no INSTALLDIR=`"$InstallPath`""

          # Add floating license server parameter if provided
            #   if ($FloatingLicenseServer) {
            #       $floatingServerArg = "${FloatingLicenseServer}:${FloatingLicensePort}"
            #       $msiParams += " FMEREG_CMDLINE=`"--floating $FloatingLicenseServer esri`""
            #       Write-Info "Adding floating license server to installation: $floatingServerArg"
            #   }

          # Use the self-extracting EXE with MSI parameters
          # Per Safe Software docs: exe -d"path" -s -sp"<msi_parameters>"
          $exeArgs = @(
              "-d`"$ExtractionPath`""
              "-s"
              "-sp`"$msiParams`""
          )

          Write-Info "Installation command (Self-extracting EXE with embedded MSI):"
          Write-Info "$localInstallerPath $($exeArgs -join ' ')"
          Write-Info ""
          Write-Info "Installation Parameters (passed via -sp):"
          Write-Info "  INSTALLLEVEL=3"
          Write-Info "  ENABLE_POST_INSTALL_TASKS=no"
          Write-Info "  INSTALLDIR=$InstallPath"
          if ($FloatingLicenseServer) {
              Write-Info "  FMEREG_CMDLINE=--floating $FloatingLicenseServer esri"
          }

          # Install FME Form from self-extracting EXE
          Write-Step "Installing FME Form 2025.2.2 from self-extracting executable..."
          Write-Info "Installation directory: $InstallPath"
          Write-Info "Timeout: 15 minutes"

          try {
              $stopwatch = [System.Diagnostics.Stopwatch]::StartNew()
              $timeoutSeconds = 900  # 15 minutes
              $lastProgressTime = 0
              $progressInterval = 60  # Report progress every 60 seconds
              
              $process = Start-Process -FilePath $localInstallerPath -ArgumentList $exeArgs -PassThru
              
              # Monitor process with timeout and progress reporting
              while (-not $process.HasExited) {
                  if ($stopwatch.Elapsed.TotalSeconds -gt $timeoutSeconds) {
                      Write-Error-Custom "Installation timeout exceeded (15 minutes)"
                      try { $process.Kill() } catch { }
                      exit 1
                  }
                  
                  # Report progress every 60 seconds
                  if ($stopwatch.Elapsed.TotalSeconds - $lastProgressTime -ge $progressInterval) {
                      $elapsedMinutes = [math]::Round($stopwatch.Elapsed.TotalMinutes, 1)
                      Write-Info "Installation in progress... ($elapsedMinutes minutes elapsed)"
                      $lastProgressTime = $stopwatch.Elapsed.TotalSeconds
                  }
                  
                  Start-Sleep -Milliseconds 500
              }
              
              $stopwatch.Stop()
              $elapsedTime = [math]::Round($stopwatch.Elapsed.TotalMinutes, 1)
              Write-Info "Installation process completed in $elapsedTime minutes"
              
              if ($process.ExitCode -eq 0) {
                  Write-Success "FME Form installed successfully"
              }
              elseif ($process.ExitCode -eq 2638) {
                  Write-Warn "Installation completed with exit code 2638 (self-extracting wrapper code, but MSI succeeded)"
                  Write-Success "FME Form installed successfully"
              }
              elseif ($process.ExitCode -eq 3010) {
                  Write-Warn "Installation completed successfully but requires a reboot (exit code 3010)"
              }
              else {
                  Write-Error-Custom "Installation failed with exit code: $($process.ExitCode)"
                  exit $process.ExitCode
              }
          }
          catch {
              Write-Error-Custom "Error during installation: $_"
              exit 1
          }

          Write-Success "Installation step completed"

  - action: 'aws:runPowerShellScript'
    name: 'VerifyInstallation'
    onFailure: Abort
    inputs:
      runCommand:
        - |
          ###############################################################################
                    # Step 5: Verify Installation
          ###############################################################################

          [CmdletBinding()]
          param()

          # SSM Parameters
          $InstallDrive = '{{ InstallDrive }}'
          
          # Build paths internally
          $InstallPath = "${InstallDrive}\FME\Form2025"

          # Color output functions
          function Write-Info {
              param([string]$Message)
              Write-Host "[INFO] $Message" -ForegroundColor Green
          }

          function Write-Warn {
              param([string]$Message)
              Write-Host "[WARN] $Message" -ForegroundColor Yellow
          }

          function Write-Success {
              param([string]$Message)
              Write-Host "[SUCCESS] $Message" -ForegroundColor Green
          }

          function Write-Step {
              param([string]$Message)
              Write-Host "[STEP] $Message" -ForegroundColor Cyan
          }

          Write-Info "FME Form 2025.2.2 Installation - Verification"
          Write-Info "=============================================="

          # Verify installation
          Write-Step "Verifying installation..."

          $fmeExe = Join-Path $InstallPath "fme.exe"
          if (Test-Path $fmeExe) {
              Write-Success "FME executable found: $fmeExe"
              
              # Get FME version
              try {
                  $versionOutput = & $fmeExe --version 2>&1
                  Write-Info "FME Version: $versionOutput"
              }
              catch {
                  Write-Warn "Could not retrieve FME version"
              }
          }
          else {
              Write-Warn "FME executable not found at expected location: $fmeExe"
              exit 1
          }

          Write-Success "Verification completed successfully"

  - action: 'aws:runPowerShellScript'
    name: 'ConfigureEnvironment'
    onFailure: Abort
    inputs:
      runCommand:
        - |
          ###############################################################################
                    # Step 6: Configure Environment
          ###############################################################################

          [CmdletBinding()]
          param()

          # SSM Parameters
          $InstallDrive = '{{ InstallDrive }}'
          $FloatingLicenseServer = '{{ FloatingLicenseServer }}'
          $FloatingLicensePort = [int]'{{ FloatingLicensePort }}'
          
          # Build paths internally
          $InstallPath = "${InstallDrive}\FME\Form2025"

          # Color output functions
          function Write-Info {
              param([string]$Message)
              Write-Host "[INFO] $Message" -ForegroundColor Green
          }

          function Write-Error-Custom {
              param([string]$Message)
              Write-Host "[ERROR] $Message" -ForegroundColor Red
          }

          function Write-Success {
              param([string]$Message)
              Write-Host "[SUCCESS] $Message" -ForegroundColor Green
          }

          function Write-Step {
              param([string]$Message)
              Write-Host "[STEP] $Message" -ForegroundColor Cyan
          }

          Write-Info "FME Form 2025.2.2 Installation - Environment Configuration"
          Write-Info "=========================================================="

          # Configure environment variables
          Write-Step "Configuring environment variables..."

          try {
              # Ensure FME_HOME is set to the install path
              $existingFMEHome = [Environment]::GetEnvironmentVariable("FME_HOME", "Machine")
              if ([string]::IsNullOrWhiteSpace($existingFMEHome)) {
                  Write-Info "Setting FME_HOME environment variable..."
                  [Environment]::SetEnvironmentVariable("FME_HOME", $InstallPath, "Machine")
                  Write-Success "FME_HOME set to: $InstallPath"
              }
              elseif ($existingFMEHome -ne $InstallPath) {
                  Write-Info "Updating FME_HOME from '$existingFMEHome' to '$InstallPath'..."
                  [Environment]::SetEnvironmentVariable("FME_HOME", $InstallPath, "Machine")
                  Write-Success "FME_HOME updated to: $InstallPath"
              }
              else {
                  Write-Info "FME_HOME already set correctly: $existingFMEHome"
              }

              # Add %FME_HOME% to system PATH if not already present
              $currentPath = [Environment]::GetEnvironmentVariable("Path", "Machine")
              $pathContainsFMEHomeVar = $currentPath -match '(?i)%FME_HOME%'
              if (-not $pathContainsFMEHomeVar) {
                  Write-Info "Adding %FME_HOME% to system PATH..."
                  [Environment]::SetEnvironmentVariable(
                      "Path",
                      "$currentPath;%FME_HOME%",
                      "Machine"
                  )
                  Write-Success "%FME_HOME% added to system PATH"
              }
              else {
                  Write-Info "%FME_HOME% already present in system PATH"
              }
          }
          catch {
              Write-Error-Custom "Error configuring environment variables: $_"
              exit 1
          }

          # Configure floating license server if provided
          if ($FloatingLicenseServer) {
              Write-Step "Configuring floating license server..."
              Write-Info "License Server: $FloatingLicenseServer"
              Write-Info "License Port: $FloatingLicensePort"
              Write-Info "Note: License server was configured during installation via FMEREG_CMDLINE parameter"
          }
          else {
              Write-Info "No floating license server specified. FME Form will run in trial/local license mode"
          }

          Write-Success "Environment configuration completed"

  - action: 'aws:runPowerShellScript'
    name: 'CleanupInstallationFiles'
    onFailure: Abort
    inputs:
      runCommand:
        - |
          ###############################################################################
          # Step 7: Cleanup Installation Files
          ###############################################################################

          [CmdletBinding()]
          param()

          # SSM Parameters
          $InstallDrive = '{{ InstallDrive }}'
          $S3Key = '{{ S3Key }}'
          
          # Build paths internally
          $ExtractionPath = "${InstallDrive}\installer\fme-form-2025.2.2-extract"

          # Color output functions
          function Write-Info {
              param([string]$Message)
              Write-Host "[INFO] $Message" -ForegroundColor Green
          }

          function Write-Warn {
              param([string]$Message)
              Write-Host "[WARN] $Message" -ForegroundColor Yellow
          }

          function Write-Success {
              param([string]$Message)
              Write-Host "[SUCCESS] $Message" -ForegroundColor Green
          }

          function Write-Step {
              param([string]$Message)
              Write-Host "[STEP] $Message" -ForegroundColor Cyan
          }

          Write-Info "FME Form 2025.2.2 Installation - Cleanup"
          Write-Info "=========================================="

          # Cleanup: Remove installer and extraction files
          Write-Step "Cleaning up installation files..."
          
          try {
              # Move MSI log file from extraction folder to logs folder
              Write-Step "Moving MSI log file from extraction folder to logs folder..."
              $installerFileName = Split-Path -Leaf $S3Key
              $localInstallerPath = Join-Path (Split-Path -Parent $ExtractionPath) $installerFileName
              $msiLogFileName = ([System.IO.Path]::GetFileNameWithoutExtension($installerFileName)) + ".txt"
              $msiLogSource = Join-Path $ExtractionPath $msiLogFileName
              $logsDir = Join-Path (Split-Path -Parent $ExtractionPath) "logs"
              $msiLogDest = Join-Path $logsDir (Split-Path -Leaf $msiLogSource)
              
              if (Test-Path $msiLogSource) {
                  if (-not (Test-Path $logsDir)) {
                      Write-Info "Creating logs directory: $logsDir"
                      New-Item -ItemType Directory -Path $logsDir -Force | Out-Null
                  }
                  Write-Info "Moving log file from: $msiLogSource"
                  Write-Info "To: $msiLogDest"
                  Move-Item -Path $msiLogSource -Destination $msiLogDest -Force
                  Write-Success "MSI log file moved successfully"
              }
              else {
                  Write-Warn "MSI log file not found at: $msiLogSource"
              }
              
              # Remove local installer copy
              $localInstallerPath = Join-Path (Split-Path -Parent $ExtractionPath) $installerFileName
              if (Test-Path $localInstallerPath) {
                  Write-Info "Removing installer from: $localInstallerPath"
                  Remove-Item -Path $localInstallerPath -Force -ErrorAction SilentlyContinue
                  Write-Success "Installer removed successfully"
              }
              
              # Remove extraction directory with small retry loop
              if (Test-Path $ExtractionPath) {
                  Write-Info "Removing extraction directory: $ExtractionPath"
                  for ($i = 1; $i -le 3; $i++) {
                      try {
                          Remove-Item -LiteralPath $ExtractionPath -Recurse -Force -ErrorAction Stop
                          Write-Success "Extraction directory removed successfully"
                          break
                      }
                      catch {
                          if ($i -eq 3) { throw }
                          Write-Warn "Attempt $i failed to remove extraction directory; retrying..."
                          Start-Sleep -Seconds 2
                      }
                  }
              }
              
              Write-Success "Cleanup completed successfully"
          }
          catch {
              Write-Warn "Error during cleanup: $_"
              Write-Info "You may need to manually remove:"
              Write-Info "  - $localInstallerPath"
              Write-Info "  - $ExtractionPath"
          }
